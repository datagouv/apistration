env:
  CI: true
  COVERAGE: true

name: Tests
on: [push]
jobs:
  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: siade
          POSTGRES_DB: siade_test
          POSTGRES_PASSWORD: wow*verysecret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis
        ports: ["6379:6379"]
        options: --entrypoint redis-server

    steps:
      - name: Dump Github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 321

      - name: Install libmagic-dev
        run: sudo apt-get install libmagic-dev

      - name: Create database
        run: bundle exec rails db:create db:schema:load RAILS_ENV=test

      - name: Check Swagger file is up-to-date
        run: ./bin/test_swagger.sh

      - name: Run tests
        run: COVERAGE=true bundle exec rspec

      - uses: joshmfrankel/simplecov-check-action@main
        if: "${{ github.actor != 'dependabot[bot]' }}"
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          minimum_suite_coverage: 95

      - name: Check Zeitwerk
        run: |
          echo "production: *test" >> config/database.yml
          bundle exec rails runner "print 'Test that production is loading for Zeitwerk'" -e production
        env:
          ZEITWERK_CHECK: true

      - name: Force push develop to master
        run: |
          if [ `git branch --show-current` = "develop" ] ; then
            git reset --hard && \
              git push --force origin develop:master && \
              git fetch && \
              [[ ! -s \"$(git rev-parse --git-dir)/shallow\" ]] || git fetch --unshallow

            exit 0
          fi
