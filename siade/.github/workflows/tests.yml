env:
  CI: true
  COVERAGE: true
  RUBY_VERSION: 3.1.2

name: Tests
on: [push]
jobs:
  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports: ["6379:6379"]
        options: --entrypoint redis-server

    steps:
      - name: Dump Github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install qpdf (PDF manipulation)
        run: sudo apt-get install qpdf libmagic-dev

      - name: Cache Gems
        uses: actions/cache@v1
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-1-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-1-

      - name: Bundle install
        run: |
          gem install bundler
          bundle config path vendor/bundle
          bundler install --jobs 4 --retry 3

      - name: Check Swagger file is up-to-date
        run: ./bin/test_swagger.sh

      - name: Run tests
        run: bundle exec rspec

      - name: Check Zeitwerk
        run: bundle exec rails runner "print 'Test that production is loading for Zeitwerk'" -e production

      - name: Force push develop to master
        run: |
          if [ `git branch --show-current` = "develop" ] ; then
            git reset --hard && \
              git push --force origin develop:master && \
              git fetch && \
              [[ ! -s \"$(git rev-parse --git-dir)/shallow\" ]] || git fetch --unshallow

            exit 0
          fi

