env:
  CI: true
  COVERAGE: true

name: Tests
on: [push]
jobs:
  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports: ["6379:6379"]
        options: --entrypoint redis-server

    steps:
      - name: Dump Github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 320

      - name: Install libmagic-dev
        run: sudo apt-get install libmagic-dev

      - name: Check Swagger file is up-to-date
        run: ./bin/test_swagger.sh

      - name: Run tests
        run: bundle exec rspec

      - name: Check Zeitwerk
        run: bundle exec rails runner "print 'Test that production is loading for Zeitwerk'" -e production
        env:
          ZEITWERK_CHECK: true

      - name: Force push develop to master
        run: |
          if [ `git branch --show-current` = "develop" ] ; then
            git reset --hard && \
              git push --force origin develop:master && \
              git fetch && \
              [[ ! -s \"$(git rev-parse --git-dir)/shallow\" ]] || git fetch --unshallow

            exit 0
          fi
