  actes_bilans:
    title: "Actes et bilans"
    description: |
      Liste des actes et bilans d'une unité légale inscrite au répertoire national des entreprises (RNE).
      Seuls les actes et bilans publiques sont distribués. L'INPI peut potentiellement posséder des actes et bilans "partiellement confidentiels".
    tags:
      - "Informations générales"
    attributes:
      actes:
        title: "Liste des documents contenant les actes de l'unité légale"
        description: |
          Ce tableau liste les documents, classés par
          date de mise à jour, et à défaut date de dépôt du document. Un document
          peut contenir un ou plusieurs actes dont le type est décrit
          dans la métadonnée.
        type: "array"
        items:
          type: "object"
          properties:
            id:
              title: "Identifiant de l'acte"
              type: "string"
              example: "65419234a1f7d1f2ba09bd8c"
            nom_document:
              title: "Nom du document à l'Inpi"
              description: "Nom du document déposé."
              type: "string"
              example: "X9wvz5eKvKQv_C0022A1001L257081D20230902H180411TPIJTES003PDBOR"
            date_depot:
              title: "Date de dépôt du document"
              type: "string"
              format: "date"
              example: "2023-08-08"
            date_mise_a_jour:
              title: "Date de mise à jour du document"
              type: "string"
              format: "date"
              example: "2023-11-01"
            types_actes:
              title: "Types d'actes contenus dans le document"
              type: "array"
              description: |
                Liste les types d'actes inclus dans le document retourné.
                Pour les documents qui ont été établis avant la création du répertoire des entreprises (RNE)
                et qui étaient autrefois transmis par les greffes au registre national du commerce et des sociétés (RNCS),
                le document est souvent constitué de plusieurs actes distincts (exemple: le même document peut contenir
                 une modification de l'adresse du siège social
                et une modification du capital social). Les actes qui sont maintenant déposés au guichet unique ne sont
                jamais regroupés dans un même document.
              nullable: true
              items:
                type: "object"
                properties:
                  type_acte:
                    title: "Type d'acte"
                    description: |
                      Intitulé décrivant le type de l'acte.
                      Les intitulés les plus fréquents sont : Acte, Certificat, Procès-verbal,
                      Statuts mis à jour, Extrait de procès-verbal, etc.
                    type: "string"
                    example: "Procès-verbal"
                  type_decision:
                    title: "Type de décision"
                    description: |
                      Intitulé décrivant le type de décision prise par l'acte.
                      Les intitulés sont par exemple : Décision d'augmentation, Modification(s) statutaire(s),
                      Augmentation du capital social, Fin de mission de commissaire aux comptes titulaire,
                      Nomination(s) d'administrateur(s), etc.
                    type: "string"
                    example: "Augmentation du capital social"
                    nullable: true
            url:
              title: "URL du document"
              type: "string"
              example: "https://entreprise.api.gouv.fr/proxy/inpi/download/%2FV+svyVVJGVCJroamyqjOrECaXHorkxJ39vZH1IMHz4N+6gvit9zgoQ=--rJ1ss+Brc7oVhloH--huyvWA83YgMFqOnjyKDmXQ=="
      bilans:
        title: "Liste des bilans de l'unité légale"
        description: |
          Ce tableau liste les documents, classés par date de mise à jour, et à défaut date de dépôt du document. Les comptes annuels sont déposés en très grande majorité directement au Guichet Unique de l'Inpi. Environ 30% (fin 2024) des dépôts de comptes se font encore auprès des greffes, ces anciennes voies de transmission ont pour objectif d'être fermées. 
        type: "array"
        items:
          type: "object"
          properties:
            id:
              title: "Identifiant du bilan"
              type: "string"
              example: "65419234a1f7d1f2ba09bd8c"
            nom_document:
              title: "Nom du bilan"
              description: "Nom du bilan à l'Inpi."
              type: "string"
              example: "X9wvz5eKvKQv_C0022A1001L257081D20230902H180411TPIJTES003PDBOR"
            date_depot:
              title: "Date de dépôt du bilan"
              description: "Ce champ indique la date de dépôt du bilan. Si le bilan a été déposé au guichet unique, la date de dépôt correspond à la date de où le paiement a été effectué. Si le bilan provient directement d'Infogreffe (cas des bilans avant 2023 et de certains bilans à compter de cette date), la date de dépôt correspond à la date de validation par les greffes."
              type: "string"
              format: "date"
              example: "2023-08-08"
            date_cloture:
              title: "Date de clôture du bilan"
              nullbale: true
              type: "string"
              format: "date"
              example: "2023-08-08"
            date_mise_a_jour:
              title: "Date de mise à jour du bilan"
              type: "string"
              format: "date"
              example: "2023-11-01"
            type:
              title: "Type de bilan"
              description: |
                Type du bilan déposé.
              type: "string"
              example: "bilan complet"
              enum:
                - bilan complet
                - bilan simplifié
                - bilan consolidé
                - bilan de type banque
                - bilan de type assurance
                - bilan de type agricole simplifié
            url:
              title: "URL du bilan"
              description: "URL pour télécharger le document bilan"
              type: "string"
              example: "https://entreprise.api.gouv.fr/proxy/inpi/download/%2FV+svyVVJGVCJroamyqjOrECaXHorkxJ39vZH1IMHz4N+6gvit9zgoQ=--rJ1ss+Brc7oVhloH--huyvWA83YgMFqOnjyKDmXQ=="

