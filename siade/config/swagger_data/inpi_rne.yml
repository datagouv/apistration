                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total des droits de vote indirects via des personnes morales"
                        description: "Pourcentage total des droits de vote indirects détenus par le biais d'une ou de plusieurs personnes morales."
                        type: "number"
                        example: 0.0
                      pleine_propriete:
                        title: "Proportion détenue en pleine propriété"
                        description: 'Pourcentage de droits de vote indirects via une personne morale détenus en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion détenue en nue-propriété"
