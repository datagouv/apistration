                        type: "number"
                        example: 0.0
                      usufruit:
                        title: "Proportion détenue en usufruit"
                        description: 'Pourcentage de droits de vote indirects via une personne morale détenus en usufruit.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
          pouvoirs_de_controle:
            title: "Pouvoirs de controle"
            description: "Une personne physique est considérée comme bénéficiaire effectif si elle possède un pouvoir de contrôle sur les organes de gestion, d'administration de la société ou sur l'assemblée générale des associés. Dans ce cas, ce tableau dresse le détail de cette détention de pouvoir."
            type: "object"
            additionalProperties: false
            properties:
              decision_ag:
                title: "Indique si le bénéficiaire détient du pouvoir de décision en Assemblée Générale"
                type: "boolean"
                example: false
              nommage_membres_conseil_administratif:
                title: "Indique si le bénéficiaire détient du pouvoir de nommage des membres du conseil d'administration"
                type: "boolean"
                example: false
              autres:
                title: "Indique si le bénéficiaire détient d'autres moyens de contrôle"
                type: "boolean"
                example: false
          representant_legal:
