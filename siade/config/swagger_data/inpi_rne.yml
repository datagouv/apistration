inpi_rne:
  extrait_rne:
    title: "Extrait RNE d'une unité légale"
    description: "Extrait du répertoire national des entreprises (RNE) d'une unité légale. Expose le document ainsi que l'extraction des données présentes dans le document."
    cache_duration: "Le cache est valide jusqu'à 3 heures du matin."
    tags: 
      - "Informations générales"
    attributes:
      document_url:
        type: string
        description: "URL de téléchargement de l'attestation d'immatriculation au registre national des entreprises (.pdf)"
        example: https://data.inpi.fr/export/companies?format=pdf&ids=["123456789"]
      identite_entreprise:
        type: object
        properties:
          denomination:
            type: string
            nullable: true
            description: Dénomination sociale de l'entreprise
            example: "TECH SOLUTIONS FRANCE"
          siren:
            type: string
            description: Numéro SIREN de l'entreprise
            pattern: '^\d{9}$'
            example: "123456789"
          date_immatriculation_rne:
            type: string
            format: date
            description: Date d'immatriculation au RNE
            example: "2018-03-15"
          date_debut_activite:
            type: string
            nullable: true
            format: date
            description: Date de début d'activité
            example: "2018-04-01"
          detail_cessation:
            type: string
            format: boolean
            description: Indique la raison de cessation d'activité. Systématiquement à null, l'api ne fournist pas cette information.
            example: null
            nullable: true
          dissolution:
            type: object
            properties:
              date:
                type: string
                format: date
                description: Date de dissolution de l'entreprise
                example: "2023-05-20"
                nullable: true
              poursuite_activite:
                type: boolean
                description: Indique si l'entreprise poursuit son activité après dissolution
                example: false
                nullable: true
              avec_liquidation:
                type: boolean
                description: Indique si la dissolution est suivie d'une liquidation. Systématiquement à null, l'api ne fournist pas cette information.
                example: true
                nullable: true
          date_fin_personne:
            type: string
            format: date
            description: Date de fin prévue de la personne
            example: "2117-03-14"
            nullable: true
          date_cloture_exercice:
            type: string
            description: Date de clôture de l'exercice (format DD/MM)
            pattern: '^\d{2}/\d{2}$'
            example: "30/06"
            nullable: true
          date_premiere_cloture_exercice:
            title: "Date de première clôture d'exercice"
            type: "string"
            format: "date"
            example: "2023-11-01"
            nullable: true
          nature_entreprise:
            type: string
            description: Nature de l'entreprise
            enum: ["COMMERCIALE", "ARTISANALE", "AGRICOLE", "LIBERALE"]
            example: "COMMERCIALE"
          forme_juridique:
            type: object
            properties:
              code:
                type: string
                description: Code de la forme juridique
                example: "5710"
              libelle:
                type: string
                description: Libellé de la forme juridique
                example: "SAS, société par actions simplifiée"
          associe_unique:
            type: boolean
            description: Indique si l'entreprise a un associé unique
            example: false
          activite_principales_objet_social:
            type: string
            description: Objet social de l'activités principales de l'entreprise
            example: "Développement, édition et commercialisation de logiciels informatiques"
            nullable: true
          code_APE:
            type: object
            properties:
              code:
                type: string
                description: Code APE/NAF de l'entreprise
                pattern: '^\d{4}[A-Z]$'
                example: "6201Z"
              libelle:
                type: string
                description: Libellé de l'activité principale
                example: "Programmation informatique"
          code_APRM:
            type: object
            properties:
              code:
                type: string
                description: Code APRM (Activité Principale Réglementée du Métier)
                pattern: '^\d{4}[A-Z]$'
                example: "6202A"
                nullable: true
              libelle:
                type: string
                description: Libellé de l'activité APRM
                example: "Conseil en systèmes et logiciels informatiques"
                nullable: true
          capital_social:
            type: object
            properties:
              montant:
                type: number
                format: double
                nullable: true
                description: Montant du capital social
                example: 50000.0
              devise:
                type: string
                description: Devise du capital
                example: "EUR"
          adresse_siege_social:
            type: object
            properties:
              voie:
                type: string
                description: Numéro et voie
                example: "42 RUE DE L'INNOVATION"
              code_postal:
                type: string
                description: Code postal
                pattern: '^\d{5}$'
                example: "69003"
              commune:
                type: string
                description: Commune
                example: "LYON 3E ARRONDISSEMENT"
              pays:
                type: string
                description: Pays
                example: "FRANCE"
              complement:
                type: string
                description: Complément d'adresse
                nullable: true
                example: "Bâtiment B - 2ème étage"
      dirigeants_et_associes:
        type: array
        description: Liste des dirigeants actifs de l'entreprise
        items:
          type: object
          properties:
            qualite:
              type: string
              description: Fonction dans l'entreprise
              example: "Président"
            nom:
              type: string
              description: Nom de famille
              example: "MARTIN"
            prenom:
              type: string
              description: Prénom
              example: "SOPHIE"
            date_naissance:
              type: string
              description: Date de naissance (format MM/YYYY)
              pattern: '^\d{2}/\d{4}$'
              example: "07/1985"
            commune_residence:
              type: string
              description: Commune de résidence
              example: "Lyon"
      etablissements:
        type: array
        description: Liste des établissements actifs
        items:
          type: object
          properties:
            type_etablissement:
              type: string
              description: Type d'établissement
              enum: ["Siège et principal", "Siège", "Secondaire"]
              example: "Siège et principal"
            date_debut_activite:
              type: string
              format: date
              description: Date de début d'activité
              example: "2018-04-01"
            siret:
              type: string
              description: Numéro SIRET de l'établissement
              pattern: '^\d{14}$'
              example: "12345678900001"
            code_APE:
              type: object
              properties:
                code:
                  type: string
                  description: Code APE/NAF de l'établissement
                  pattern: '^\d{4}[A-Z]$'
                  example: "6201Z"
                libelle:
                  type: string
                  description: Libellé de l'activité principale
                  example: "Programmation informatique"
            code_APRM:
              type: object
              properties:
                code:
                  type: string
                  description: Code APRM (Activité Principale Réglementée du Métier)
                  pattern: '^\d{4}[A-Z]$'
                  example: "6202A"
                  nullable: true
                libelle:
                  type: string
                  description: Libellé de l'activité APRM
                  example: "Conseil en systèmes et logiciels informatiques"
                  nullable: true
            nature_etablissement:
              type: string
              description: Nature de l'établissement
              example: "COMMERCIALE"
            activite_principale:
              type: string
              description: Description de l'activité
              example: "Programmation informatique, développement de logiciels"
            autre_activite:
              type: string
              description: Concaténation des autres activités non principales
              example: "Conseil en systèmes informatiques, maintenance de logiciels"
              nullable: true
            adresse:
              type: object
              properties:
                voie:
                  type: string
                  description: Numéro et voie
                  example: "42 RUE DE L'INNOVATION"
                code_postal:
                  type: string
                  description: Code postal
                  pattern: '^\d{5}$'
                  example: "69003"
                commune:
                  type: string
                  description: Commune
                  example: "LYON 3E ARRONDISSEMENT"
                pays:
                  type: string
                  description: Pays
                  example: "FRANCE"
                complement:
                  type: string
                  nullable: true
                  description: Complément d'adresse
                  example: "Bâtiment B - 2ème étage"
            statut:
              type: string
              description: Statut de l'établissement
              enum: ["actif", "fermé"]
              example: "actif"
      diffusion_commerciale: 
        type: boolean
        description: Autorisation de diffusion des données à des fins commerciales
        example: true
      diffusion_insee:
        type: boolean
        description: Autorisation de diffusion des données à l'INSEE
        example: true
      etablissements_fermes_total:
        type: integer
        description: Nombre d'établissements fermés
        minimum: 0
        example: 1
      observations:
        type: array
        description: Observations RCS/RNM
        items:
          type: object
          properties:
            fournisseur:
              type: string
              description: Fournisseur de l'observation
              enum:
                - "rcs"
                - "rnm"
              example: "rcs"
            numero:
              type: string
              description: Numéro de l'observation
              example: "2023-05-20-001"
            date:
              type: string
              format: date
              description: Date de l'observation
              example: "2023-05-20"
            texte:
              type: string
              description: Texte de l'observation
              example: "Augmentation de capital de 50000 à 75000 EUR"
  beneficiaires_effectifs:
    title: "Bénéficiaires effectifs"
    description: "Liste des bénéficiaires effectifs d'une unité légale inscrite au répertoire national des entreprises (RNE)."
    cache_duration: "Le cache est valide jusqu'à 3 heures du matin."
    tags:
      - "Informations générales"
    attributes:
      beneficiaire_uuid:
        title: "UUID du bénéficiaire effectif"
        type: "string"
        example: "21120ee0-d42b-44f6-a462-d3724cf6aeaf"
      nom:
        title: "Nom du bénéficiaire effectif"
        type: "string"
        example: "MARTIN"
      nom_usage:
        title: "Nom d'usage du bénéficiaire effectif"
        type: "string"
        example: "DUBOIS"
        nullable: true
      prenoms:
        title: "Liste des prénoms du bénéficiaire effectif"
        type: "array"
        example:
          - "JEAN"
          - "JACQUES"
        items:
          type: "string"
      date_naissance:
        type: "object"
        title: "Date de naissance du bénéficiaire effectif"
        additionalProperties: false
        properties:
          annee:
            title: "Année de la date de naissance"
            type: "string"
            example: "1990"
            nullable: true
          mois:
            title: "Mois de la date de naissance"
            type: "string"
            example: "01"
            nullable: true
            enum:
              - "01"
              - "02"
              - "03"
              - "04"
              - "05"
              - "06"
              - "07"
              - "08"
              - "09"
              - "10"
              - "11"
              - "12"
      nationalite:
        type: "string"
        title: "Nationalité du bénéficiaire effectif"
        example: "France"
        nullable: true
      pays_residence:
        type: "string"
        title: "Pays de résidence du bénéficiaire effectif"
        example: "FRANCE"
      modalites:
        title: "Liste des modalités de contrôle du bénéficiaire effectif"
        type: "object"
        additionalProperties: false
        properties:
          detention_de_capital:
            title: "Détention de capital"
            description: "Une personne physique est considérée comme bénéficiaire effectif si elle possède directement ou indirectement plus de 25 % du capital. Dans ce cas, ce tableau dresse le détail de cette détention de capital."
            type: "object"
            additionalProperties: false
            properties:
              parts_totale:
                title: "Total des parts détenues dans l'unité légale"
                description: "Pourcentage total du capital détenu et déclaré par le bénéficiaire qui correspond à la somme des parts directes et indirectes. Ce total est soit égal à 0%, soit supérieur ou égal à 25%. En effet, en dessous de ce ratio, la personne physique ne déclare pas son capital."
                type: "number"
                example: 51.0
              parts_directes:
                title: "Parts directes"
                type: "object"
                additionalProperties: false
                properties:
                  detention:
                    title: "Indique si le bénéficiaire détient des parts directes."
                    description: "Détermine si le bénéficiaire possède du capital direct (parts sociales ou actions) de l'unité légale. Par opposition à une détention indirecte du capital, via une personne morale."
                    type: "boolean"
                    example: true
                  # rdd:
                  #   title: "FIXME Detention part directe rdd"
                  #   type: 'number'
                  #   example: 51.0
                  pleine_propriete:
                    title: "Proportion détenue en pleine propriété"
                    description: 'Pourcentage de parts directes détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                    type: "number"
                    example: 42.0
                  nue_propriete:
                    title: "Proportion détenue en nue-propriété"
                    description: 'Pourcentage de parts directes détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                    type: "number"
                    example: 9.0
              parts_indirectes:
                title: "Parts indirectes"
                type: "object"
                additionalProperties: false
                properties:
                  detention:
                    title: "Indique si le bénéficiaire détient des parts indirectes"
                    description: "Détermine si le bénéficiaire possède du capital (parts sociales ou actions) de manière indirecte sur l'unité légale, c'est-à-dire via une personne morale."
                    type: "boolean"
                    example: false
                  # rdd:
                  #   title: "FIXME Detention part indirecte rdd"
                  #   type: 'number'
                  #   example: 0.0
                  par_indivision:
                    title: "Via une indivision"
                    description: 'Les parts indirectes peuvent être détenues par le biais d''une indivision. Après un décès, le patrimoine du défunt est en indivision, s’il y a plusieurs héritiers. Cela signifie que les biens de la succession appartiennent indistinctement à tous les héritiers sans que leurs parts respectives ne soient matériellement individualisées. Plus d''infos sur le lien suivant: <a href="https://www.economie.gouv.fr/particuliers/heritage-succession-indivision">Succession : qu''est-ce que l''indivision ?</a>'
                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total des parts indirectes en indivision"
                        description: "Pourcentage total de parts indirectes détenues par le biais d'une indivision."
                        type: "number"
                        example: 0.0
                      pleine_propriete:
                        title: "Proportion détenue en pleine propriété"
                        description: 'Pourcentage de parts indirectes en indivision détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion détenue en nue-propriété"
                        description: 'Pourcentage de parts indirectes en indivision détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                  via_personnes_morales:
                    title: "Via une ou des personnes morales"
                    description: 'Les parts indirectes peuvent être détenues par le biais d''une ou de plusieurs personnes morales intermédiaires. Plus d''infos sur les différents mécanismes de détention du capital dans <a href="https://entreprise.api.gouv.fr//catalogue/inpi/rne/beneficiaires_effectifs#faq_entry_answer_0_api_entreprise_endpoint_inpi_rne_beneficiaires_effectifs">cette FAQ</a>.'
                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total des parts indirectes via des personnes morales"
                        description: "Pourcentage total de parts indirectes détenues par le biais d'une ou de plusieurs personnes morales."
                        type: "number"
                        example: 0.0
                      pleine_propriete:
                        title: "Proportion détenue en pleine propriété"
                        description: 'Pourcentage de parts indirectes via une personne morale détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion détenue en nue-propriété"
                        description: 'Pourcentage de parts indirectes via une personne morale détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
          vocation_a_devenir_titulaire_de_parts:
            title: "Vocation par l’effet d’un acte juridique à devenir titulaire de parts"
            description: "Dans le cas d'un GIE ou GEIE (Groupements d'intérêt économique), une personne physique est considérée comme bénéficiaire effectif si elle a vocation par l’effet d’un acte juridique à devenir titulaire de plus de 25 % du capital. Dans ce cas, ce tableau dresse le détail de cette future détention de capital."
            type: "object"
            additionalProperties: false
            properties:
              parts_directes:
                title: "Parts directes"
                type: "object"
                additionalProperties: false
                properties:
                  # rdd:
                  #   title: "Vocation par l'effet d’un acte juridique à devenir titulaire directe pleine propriété rdd"
                  #   type: 'boolean'
                  #   example: false
                  pleine_propriete:
                    title: "Proportion future détenue en pleine propriété"
                    description: 'Pourcentage de parts directes qui ont vocation à être détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                    type: "number"
                    example: 0.0
                  nue_propriete:
                    title: "Proportion future détenue en nue-propriété"
                    description: 'Pourcentage de parts directes qui ont vocation à être détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                    type: "number"
                    example: 0.0
              parts_indirectes:
                title: "Parts indirectes"
                type: "object"
                additionalProperties: false
                properties:
                  par_indivision:
                    title: "Via une indivision"
                    description: 'Les parts indirectes peuvent être détenues par le biais d''une indivision. Après un décès, le patrimoine du défunt est en indivision, s’il y a plusieurs héritiers. Cela signifie que les biens de la succession appartiennent indistinctement à tous les héritiers sans que leurs parts respectives ne soient matériellement individualisées. Plus d''infos sur le lien suivant: <a href="https://www.economie.gouv.fr/particuliers/heritage-succession-indivision">Succession : qu''est-ce que l''indivision ?</a>'
                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total futur des parts indirectes en indivision"
                        description: "Pourcentage total de parts indirectes qui ont vocation à être détenues par le biais d'une indivision."
                        type: "number"
                        example: 0.0
                      # rdd:
                      #   title: "Vocation par l'effet d’un acte juridique à devenir titulaire indirecte pleine propriété rdd"
                      #   type: 'boolean'
                      #   example: false
                      pleine_propriete:
                        title: "Proportion future détenue en pleine propriété"
                        description: 'Pourcentage de parts indirectes en indivision qui ont vocation à être détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion future détenue en nue-propriété"
                        description: 'Pourcentage de parts indirectes en indivision qui ont vocation à être détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                  via_personnes_morales:
                    title: "Via une ou des personnes morales"
                    description: 'Les parts indirectes peuvent être détenues par le biais d''une ou de plusieurs personnes morales intermédiaires. Plus d''infos sur les différents mécanismes de détention du capital dans <a href="https://entreprise.api.gouv.fr//catalogue/inpi/rne/beneficiaires_effectifs#faq_entry_answer_0_api_entreprise_endpoint_inpi_rne_beneficiaires_effectifs">cette FAQ</a>.'
                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total futur des parts indirectes via des personnes morales"
                        description: "Pourcentage total de parts indirectes qui ont vocation à être détenues par le biais d'une ou de plusieurs personnes morales."
                        type: "number"
                        example: 0.0
                      pleine_propriete:
                        title: "Proportion future détenue en pleine propriété"
                        description: 'Pourcentage de parts indirectes via une personne morale qui ont vocation à être détenues en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion future détenue en nue-propriété"
                        description: 'Pourcentage de parts indirectes via une personne morale qui ont vocation à être détenues en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0

          droits_de_vote:
            title: "Détention de droits de vote"
            description: "Une personne physique est considérée comme bénéficiaire effectif si elle possède directement ou indirectement plus de 25 % des droits de vote de la société. Dans ce cas, ce tableau dresse le détail de cette détention de droit de vote."
            type: "object"
            additionalProperties: false
            properties:
              total:
                title: "Total des droits de vote détenus dans l'unité légale"
                description: "Pourcentage total des droits de vote détenus et déclarés par le bénéficiaire qui correspond à la somme des droits de vote directs et indirects. Ce total est soit égal à 0%, soit supérieur ou égal à 25%. En effet, en dessous de ce ratio, la personne physique ne déclare pas ses droits de vote."
                type: "number"
                example: 0.0
              # detention_vote_directe_rdd:
              #   title: "FIXME Detention vote directe rdd"
              #   type: 'number'
              #   example: 51.0
              directes:
                title: "Droits de vote directs"
                type: "object"
                additionalProperties: false
                properties:
                  detention:
                    title: "Indique si le bénéficiaire détient des droits de vote directs."
                    description: "Détermine si le bénéficiaire possède des droits de vote directs dans l'unité légale. Par opposition à une détention indirecte des droits de vote, via une personne morale."
                    type: "boolean"
                    example: true
                  pleine_propriete:
                    title: "Proportion détenue en pleine propriété"
