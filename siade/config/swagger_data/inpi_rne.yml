                    type: "number"
                    example: 0.0
                  usufruit:
                    title: "Proportion détenue en usufruit"
                    description: 'Pourcentage de droits de vote directs détenus en usufruit.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                    type: "number"
                    example: 0.0
              # detention_vote_indirecte_rdd:
              #   title: "FIXME Detention vote indirecte rdd"
              #   type: 'number'
              #   example: 0.0
              indirectes:
