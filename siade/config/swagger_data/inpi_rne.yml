                type: "object"
                additionalProperties: false
                properties:
                  detention:
                    title: "Indique si le bénéficiaire détient des droits de vote indirects"
                    description: "Détermine si le bénéficiaire possède des droits de vote indirects dans l'unité légale. Par opposition à une détention indirecte des droits de vote, via une personne morale."
                    type: "boolean"
                    example: false
                  par_indivision:
                    title: "Via une indivision"
                    description: 'Les droits de vote indirects peuvent être détenus par le biais d''une indivision. Plus d''infos sur le lien suivant: <a href="https://www.economie.gouv.fr/particuliers/heritage-succession-indivision">Succession : qu''est-ce que l''indivision ?</a>'
                    type: "object"
                    additionalProperties: false
                    properties:
                      total:
                        title: "Total des droits de vote indirects en indivision"
                        description: Pourcentage total de droits de vote indirects détenus par le biais d'une indivision.
                        type: "number"
                        example: 0.0
                      pleine_propriete:
                        title: "Proportion détenue en pleine propriété"
                        description: 'Pourcentage de droits de vote indirects en indivision détenus en pleine propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      nue_propriete:
                        title: "Proportion détenue en nue-propriété"
                        description: 'Pourcentage de droits de vote indirects en indivision détenus en nue-propriété.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
                        type: "number"
                        example: 0.0
                      usufruit:
                        title: "Proportion détenue en usufruit"
                        description: 'Pourcentage de droits de vote indirects en indivision détenus en usufruit.<br/>Plus d''infos sur les différents des droits sur un bien sur le lien suivant: <a href="https://www.service-public.fr/particuliers/vosdroits/F33076">Usufruit, nue-propriété, pleine propriété : quelles différences ?</a>'
