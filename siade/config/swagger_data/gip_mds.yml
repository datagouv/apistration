gip_mds:
  effectifs_annuels_entreprise:
    title: "Effectifs annuels d'une unité légale"
    tags:
      - "Informations générales"
    description: "Effectifs annuels des régimes général et agricole d'une unité légale, issus du répertoire commun des déclarants (RCD)."
    parameters:
      nature_effectif:
        description: "Nature de l'effectif demandé. Par défaut, l'effectif moyen est renvoyé."
        schema:
          type: 'string'
          default: 'moyen'
          enum:
            - 'moyen'
            - 'boeth'
            - 'ecap'
            - 'assujettissement_oeth'
    attributes:
      siren:
        title: "Siren de l'unité légale"
        type: "string"
        example: "130025265"
      annee:
        title: "Année de référence"
        type: "string"
        example: "2017"
      effectifs_annuel:
        title: "Effectif annuel de l'établissement"
        type: "array"
        items:
          type: 'object'
          additionalProperties: false
          required:
            - regime
            - nature
            - value
            - date_derniere_mise_a_jour
          properties:
            regime:
              title: "Type de régime"
              type: "string"
              example: "regime_general"
              enum:
                - 'regime_general'
                - 'regime_agricole'
            value:
              title: "Valeur"
              description: "Cette valeur est à null si il n'y a pas d'effectif dans le régime"
              type: "number"
              example: 12.34
              nullable: true
            nature:
              title: "Nature de l'effectif"
              type: "string"
              enum:
                - 'effectif_moyen_annuel'
                - 'effectif_boeth_annuel'
                - 'effectif_ecap_annuel'
                - 'effectif_assujettissement_oeth_annuel'
            date_derniere_mise_a_jour:
              title: "Date de la dernière mise à jour de la donnée"
              type: "string"
              example: "2018-01-01"
              nullable: true
  effectifs_mensuels_etablissement:
    title: "Effectifs mensuels d'un établissement"
    tags:
      - "Informations générales"
    description: "Effectifs mensuels des régimes général et agricole d'un établissement, issus du répertoire commun des déclarants (RCD)."
    parameters:
      profondeur:
        description: "Nombre de mois à remonter dans le temps. Par défaut cette valeur est à 0, ce renvoi le mois en cours. Il n'est pas possible de remonter à plus de 13 mois."
        schema:
          type: 'integer'
          default: 0
          minimum: 0
          maximum: 12
      nature_effectif:
        description: "Nature de l'effectif demandé. Par défaut, l'effectif moyen est renvoyé."
        schema:
          type: 'string'
          default: 'moyen'
          enum:
            - 'moyen'
            - 'boeth'
            - 'ecap'
            - 'assujettissement_oeth'
    attributes:
      siret:
        title: "Siret de l'établissement"
        type: "string"
        example: "13002526500013"
      effectifs_mensuels:
        title: "Effectif mensuels de l'établissement"
        type: "array"
        items:
          type: 'object'
          additionalProperties: false
          required:
            - regime
            - annee
            - nature
            - mois
            - value
            - date_derniere_mise_a_jour
          properties:
            regime:
              title: "Type de régime"
              type: "string"
              example: "regime_general"
              enum:
                - 'regime_general'
                - 'regime_agricole'
            value:
              title: "Valeur"
              description: "Cette valeur est à null si il n'y a pas d'effectif dans le régime"
              type: "number"
              example: 12.34
              nullable: true
            nature:
              title: "Nature de l'effectif"
              type: "string"
              enum:
                - 'effectif_moyen_mensuel'
                - 'effectif_boeth_mensuel'
                - 'effectif_ecap_mensuel'
                - 'effectif_assujettissement_oeth_mensuel'
            annee:
              title: "Année"
              type: "string"
              maxLength: 4
              minLength: 4
              example: "2021"
            mois:
              title: "Mois"
              type: "string"
              example: "01"
              maxLength: 2
              minLength: 2
              enum:
                - '01'
                - '02'
                - '03'
                - '04'
                - '05'
                - '06'
                - '07'
                - '08'
                - '09'
                - '10'
                - '11'
                - '12'
            date_derniere_mise_a_jour:
              title: "Date de la dernière mise à jour de la donnée"
              type: "string"
              example: "2018-01-01"
              nullable: true
