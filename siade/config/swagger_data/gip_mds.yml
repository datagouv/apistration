           - Effectif BOETH mensuel (EMM BOTEH), c'est-à-dire le nombre de salariés de l'entreprise (salariés, stagiaires et PMSMP) qui sont bénéficiaires de l'obligation d’emploi des travailleurs handicapés (BOETH). Ce statut recouvre plusieurs situations décrites dans la documentation.
