gip_mds:
  effectifs_annuels_entreprise:
    title: "Effectifs annuels d'une unité légale"
    tags:
      - "Informations générales"
    description: "Effectifs annuels des régimes général et agricole d'une unité légale, issus de l'Urssaf et de la MSA depuis le répertoire commun des déclarants opéré par le GIP-MDS. Inclut l'effectif moyen et les effectifs liés à l'obligation d'emploi des travailleurs handicapés."
    parameters:
      year:
        description: "Année de référence des effectifs."
        schema:
          type: 'string'
          example: '2020'
      nature_effectif:
        description: "Indique la nature de l'effectif transmis. Si ce paramètre n'est pas complété en appel, l'effectif moyen annuel (EMA) sera renvoyé par défaut. L'API permet d'accéder à 4 natures d'effectif :
           \n
           - Effectif moyen annuel (EMA), c'est-à-dire le nombre de salariés en contrat 'actif'  hors exclusions. Ces exclusions sont décrites dans la documentation.
           \n
           - Effectif BOETH annuel (EMA BOTEH), c'est-à-dire le nombre de salariés de l'entreprise (salariés, stagiaires et PMSMP) qui sont bénéficiaires de l'obligation d’emploi des travailleurs handicapés (BOETH). Ce statut recouvre plusieurs situations décrites dans la documentation.
           \n
           - Effectif ECAP annuel (EMA ECAP), c'est-à-dire le nombre de salariés de l'entreprise occupant un emploi qui, de par ses exigences en matière d'aptitude, rend difficile un recrutement de travailleurs handicapés. Cet effectif « emplois exigeant des conditions d’aptitudes particulières » (ECAP) est utilisé par l'URSSAF pour calculer une réduction de la contribution employeur si l'entreprise n'emploie pas assez de travailleurs handicapés.
           \n
           - Effectif d'assujettissement OETH annuel (EMA OETH), c'est-à-dire le nombre de salariés en contrat 'actif', hors exclusions, différentes de celles de l'effectif moyen mensuel (EMM). Cet effectif est utilisé par l'URSSAF pour calculer le niveau d'obligation d'emploi de travailleurs handicapés de l'entreprise."
        schema:
          type: 'string'
          default: 'moyen'
          enum:
            - 'moyen'
            - 'boeth'
            - 'ecap'
            - 'assujettissement_oeth'
    attributes:
      siren:
        title: "Siren de l'unité légale"
        type: "string"
        example: "130025265"
      annee:
        title: "Année de référence"
        description: "Année des effectifs renvoyés, c'est-à-dire l'année mentionnée en appel. Les effectifs annuels sont disponibles seulement une fois l'année écoulée (fin janvier N+1). Pour avoir le dernier effectif disponible, il est donc recommandé d'appeler l'année N-1."
        type: "string"
        example: "2017"
      effectifs_annuel:
        title: "Effectif annuel de l'établissement"
        type: "array"
        items:
          type: 'object'
          additionalProperties: false
          required:
            - regime
            - nature
            - value
            - date_derniere_mise_a_jour
          properties:
            regime:
              title: "Type de régime"
              type: "string"
              example: "regime_general"
              enum:
                - 'regime_general'
                - 'regime_agricole'
            value:
              title: "Valeur de l'effectif"
              description: "Valeur de l'effectif annuel. Cette valeur est à null s'il n'y a pas d'effectif dans le régime."
              type: "number"
              example: 12.34
              nullable: true
            nature:
              title: "Nature de l'effectif"
              description: "Indique la nature de l'effectif transmis. Quatre natures d'effectif sont renvoyées par l'API :
               \n
               - Effectif moyen annuel (EMA), c'est-à-dire le nombre de salariés en contrat 'actif'  hors exclusions. Ces exclusions sont décrites dans la documentation.
               \n
               - Effectif BOETH annuel (EMA BOTEH), c'est-à-dire le nombre de salariés de l'entreprise (salariés, stagiaires et PMSMP) qui sont bénéficiaires de l'obligation d’emploi des travailleurs handicapés (BOETH). Ce statut recouvre plusieurs situations décrites dans la documentation.
               \n
               - Effectif ECAP annuel (EMA ECAP), c'est-à-dire le nombre de salariés de l'entreprise occupant un emploi qui, de par ses exigences en matière d'aptitude, rend difficile un recrutement de travailleurs handicapés. Cet effectif « emplois exigeant des conditions d’aptitudes particulières » (ECAP) est utilisé par l'URSSAF pour calculer une réduction de la contribution employeur si l'entreprise n'emploie pas assez de travailleurs handicapés.
               \n
               - Effectif d'assujettissement OETH annuel (EMA OETH), c'est-à-dire le nombre de salariés en contrat 'actif', hors exclusions, différentes de celles de l'effectif moyen mensuel (EMM). Cet effectif est utilisé par l'URSSAF pour calculer le niveau d'obligation d'emploi de travailleurs handicapés de l'entreprise."
              type: "string"
              enum:
                - 'effectif_moyen_annuel'
                - 'effectif_boeth_annuel'
                - 'effectif_ecap_annuel'
                - 'effectif_assujettissement_oeth_annuel'
            date_derniere_mise_a_jour:
              title: "Date de la dernière mise à jour de la donnée"
              type: "string"
              example: "2018-01-01"
              nullable: true
  effectifs_mensuels_etablissement:
    title: "Effectifs mensuels d'un établissement"
    tags:
      - "Informations générales"
    description: "Effectifs mensuels des régimes général et agricole d'un établissement, issus de l'Urssaf et de la MSA depuis le répertoire commun des déclarants opéré par le GIP-MDS. Inclut l'effectif moyen et les effectifs liés à l'obligation d'emploi travailleurs handicapés."
    parameters:
      year:
        description: "Année de référence des effectifs."
        schema:
          type: 'string'
          example: '2020'
      month:
        description: "Mois de référence des effectifs (format: 01 à 12)."
        schema:
          type: 'string'
          example: '01'
          enum:
            - '01'
            - '02'
            - '03'
            - '04'
            - '05'
            - '06'
            - '07'
            - '08'
            - '09'
            - '10'
            - '11'
            - '12'
      profondeur:
        description: "Nombre de mois à renvoyer, en amont de la date choisie. Ce paramètre permet de renvoyer les effectifs de plusieurs mois en même temps, antérieurs à la date choisie, et au maximum 13 mois. Par exemple si la date indiquée est 03/2025 et ce paramètre de profondeur est 3. Les effectifs de janvier, février et mars 2025 seront renvoyés."
        schema:
          type: 'integer'
          default: 0
          minimum: 0
          maximum: 12
      nature_effectif:
        description: "Indique la nature de l'effectif transmis. Si ce paramètre n'est pas complété en appel, l'effectif moyen mensuel (EMM) sera renvoyé par défaut. L'API permet d'accéder à 4 natures d'effectif :
           \n
           - Effectif moyen mensuel (EMM), c'est-à-dire le nombre de salariés en contrat 'actif'  hors exclusions. Ces exclusions sont décrites dans la documentation.
