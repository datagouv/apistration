           \n
           - Effectif d'assujettissement OETH mensuel (EMM OETH), c'est-à-dire le nombre de salariés en contrat 'actif', hors exclusions, différentes de celles de l'effectif moyen mensuel (EMM). Cet effectif est utilisé par l'URSSAF pour calculer le niveau d'obligation d'emploi de travailleurs handicapés de l'entreprise."
        schema:
          type: 'string'
          default: 'moyen'
          enum:
            - 'moyen'
            - 'boeth'
            - 'ecap'
            - 'assujettissement_oeth'
    attributes:
      siret:
        title: "Siret de l'établissement"
        type: "string"
        example: "13002526500013"
      effectifs_mensuels:
        title: "Effectif mensuels de l'établissement"
        type: "array"
        items:
          type: 'object'
          additionalProperties: false
          required:
            - regime
            - annee
            - nature
            - mois
            - value
            - date_derniere_mise_a_jour
          properties:
            regime:
              title: "Type de régime"
              type: "string"
              example: "regime_general"
              enum:
                - 'regime_general'
                - 'regime_agricole'
            value:
              title: "Valeur de l'effectif"
              description: "Valeur de l'effectif mensuel. Cette valeur est à null s'il n'y a pas d'effectif dans le régime."
              type: "number"
              example: 12.34
              nullable: true
            nature:
              title: "Nature de l'effectif"
              description: "Indique la nature de l'effectif transmis. Quatre natures d'effectif sont renvoyées par l'API :
                 \n
                 - Effectif moyen mensuel (EMM), c'est-à-dire le nombre de salariés en contrat 'actif'  hors exclusions. Ces exclusions sont décrites dans la documentation.
                 \n
                 - Effectif BOETH mensuel (EMM BOTEH), c'est-à-dire le nombre de salariés de l'entreprise (salariés, stagiaires et PMSMP) qui sont bénéficiaires de l'obligation d’emploi des travailleurs handicapés (BOETH). Ce statut recouvre plusieurs situations décrites dans la documentation.
                 \n
                 - Effectif ECAP mensuel (EMM ECAP), c'est-à-dire le nombre de salariés de l'entreprise occupant un emploi qui, de par ses exigences en matière d'aptitude, rend difficile un recrutement de travailleurs handicapés. Cet effectif « emplois exigeant des conditions d’aptitudes particulières » (ECAP)  est utilisé par l'URSSAF pour calculer une réduction de la contribution employeur si l'entreprise n'emploie pas assez de travailleurs handicapés.
                 \n
                 - Effectif d'assujettissement OETH mensuel (EMM OETH), c'est-à-dire le nombre de salariés en contrat 'actif', hors exclusions, différentes de celles de l'effectif moyen mensuel (EMM). Cet effectif est utilisé par l'URSSAF pour calculer le niveau d'obligation d'emploi de travailleurs handicapés de l'entreprise."
              type: "string"
              enum:
                - 'effectif_moyen_mensuel'
                - 'effectif_boeth_mensuel'
                - 'effectif_ecap_mensuel'
                - 'effectif_assujettissement_oeth_mensuel'
            annee:
              title: "Année de l'effectif"
              type: "string"
              maxLength: 4
              minLength: 4
              example: "2021"
            mois:
              title: "Mois de l'effectif"
              type: "string"
              example: "01"
              maxLength: 2
              minLength: 2
              enum:
                - '01'
                - '02'
                - '03'
                - '04'
                - '05'
                - '06'
                - '07'
                - '08'
                - '09'
                - '10'
                - '11'
                - '12'
