carif_oref:
  certifications_qualiopi_france_competences:
      title: "Qualiopi & habilitations France compétences"
      description: "Certifications Qualiopi et habilitations France compétences attestant que l'établissement est habilité à délivrer une formation certifiante."
      tags:
        - "Certifications professionnelles"
      attributes:
        siret:
          title: "Siret de l'établissement"
          type: "string"
          example: "12000101100010"
        code_uai:
          title: "Code UAI de l'établissement"
          description: "Code UAI de l'établissement agrée. Cet identifiant unique est affecté aux établissements de l'éducation nationale."
          example: "0123456A"
          type: "string"
          nullable: true
        unite_legale_avec_plusieurs_nda:
          title: "Indique si l'unité légale de l'établissement a plusieurs NDA"
          description: "Dans de rares cas, l'unité légale d'un établissement peut avoir plusieurs numéros de déclaration d'activité (NDA). Tous ces numéros d'activités (qui ne sont pas fournis par cette API délivrant uniquement les NDA d'un établissement) ne sont pas forcément propagés sur les établissements."
          example: false
          nullable: false
          type: "boolean"
        declarations_activites_etablissement:
          type: "array"
          description: "Informations relatives au numéro de déclaration d'activité de l'établissement (NDA) si celui-ci en possède un. Cette clé renvoie un tableau car, dans de rares cas, un établissement peut avoir plusieurs NDA (environ 30 établissements sur 120 000)."
          items:
            type: "object"
            properties:
              numero_de_declaration:
                title: "Numéro de déclaration d'activité"
                description: "Numéro de déclaration d'activité (NDA) de l'établissement."
                type: "string"
                example: "11910843391"
              actif:
                title: "Indique que le NDA est actif"
                description: "Ce champ indique le numéro de déclaration d'activité (NDA) de l'établissement est actif. Cette valeur est toujours égale à 'true' et est conservée pour des raisons de retrocompatibilité"
                type: "boolean"
                example: true
              date_derniere_declaration:
                title: "Date de dernière déclaration"
                description: "Cette date indique le jour où l'établissement a transmi son bilan pédagogique et financier (BPF), indispensable pour maintenir actif le numéro de déclaration d'activité (NDA). Cette date est transmise au format AAAA-MM-DD."
                type: "string"
                format: "date"
                example: "2021-01-30"
              date_debut_exercice:
                title: "Date de début d'exercice fiscal"
                description: "Cette date correspond au début du dernier exercice fiscal analysé pour le bilan pédagogique et financier. Cette date est transmise au format AAAA-MM-DD."
                type: "string"
                format: "date"
                example: "2021-01-30"
              date_fin_exercice:
                title: "Date de fin d'exercice fiscal"
                description: "Cette date correspond à la fin du dernier exercice fiscal analysé pour le bilan pédagogique et financier. Cette date est transmise au format AAAA-MM-DD."
                type: "string"
                format: "date"
                example: "2021-01-30"
              certification_qualiopi:
                type: "object"
                description: "Informations relatives à la certification Qualiopi. Cette certification est liée à une numéro de déclaration d'activité."
                properties:
                  action_formation:
                    title: "Certication Action Formation"
                    description: "Indique si l'établissement est certifié Action Formation."
                    type: "boolean"
                    example: false
                  bilan_competences:
                    title: "Certification Bilan Compétences"
                    description: "Indique si l'établissement est certifié Bilan Compétences."
                    type: "boolean"
                    example: false
                  validation_acquis_experience:
                    title: "Certification VAE"
                    description: "Indique si l'établissement est certifié VAE (Validation des Acquis de l'Experience)."
                    type: "boolean"
                    example: false
                  apprentissage:
                    title: "Certification Apprentissage"
                    description: "Indique si l'établissement est certifié Action de Formation par Apprentissage."
                    type: "boolean"
                    example: false
                  obtention_via_unite_legale:
                    title: "Indique si le certificat Qualiopi est propagé depuis le SIREN de l'unité légale"
                    description: |
                      Lorsqu'une unité légale a un seul NDA et donc un seul Qualiopi, celui-ci est automatiquement propagé à tous ses établissements, d'après les règles de la délégation générale à l'emploi et à la formation professionnelle (DGEFP), ce champ est alors à `true` et indique que le NDA associé à l'établissement est issu de l'unité légale. Dans le cas contraire, si le NDA ne provient pas d'une propagation depuis le SIREN, ce champ est à `false`. Ce second cas est bien plus rare car il intervient lorsqu'il existe plusieurs NDA associés à plusieurs SIRET, la propagation est alors uniquement faite pour certains SIRET déclarés. Enfin, ce champ peut être à "null" si l'organisme n'a pas fait de demande Qualiopi.
                    type: "boolean"
                    example: true
                    nullable: true
              specialites:
                type: "object"
                description: "Informations relatives aux spécialités relevant du numéro de déclaration d'activité et figurant dans le bilan pédagogique et financier. Un établissement peut ne pas avoir de spécialités, et l'API en transmet jusqu'à trois, leur ordre n'a pas d'importance. Les spécialités possibles sont détaillées dans la documentation métier de l'API : https://entreprise.api.gouv.fr/catalogue/carif_oref/certifications_qualiopi_france_competences#faq_entry_answer_1_api_entreprise_endpoint_carif_oref_certifications_qualiopi_france_competences"
                properties:
                  specialite_1:
                    type: "object"
                    description: "Informations relatives à la première spécialité"
                    properties:
                      code:
                        title: "Code spécialité 1"
                        description: "Code de la première spécialité de l'établissement agrée"
                        type: "string"
                        example: "313"
                        nullable: true
                      libelle:
                        title: "Libellé spécialité 1"
                        description: "Libellé de la première spécialité de l'établissement agrée"
                        type: "string"
                        example: "Finances, banque, assurances"
                        nullable: true
                  specialite_2:
                    type: "object"
                    description: "Informations relatives à la seconde spécialité"
                    properties:
                      code:
                        title: "Code spécialité 2"
                        description: "Code de la seconde spécialité de l'établissement agrée"
                        type: "string"
                        example: "326"
                        nullable: true
                      libelle:
                        title: "Libellé spécialité 2"
                        description: "Libellé de la seconde spécialité de l'établissement agrée"
                        type: "string"
                        example: "Informatique, traitement de l'information, réseaux de transmission des données"
                        nullable: true
                  specialite_3:
                    type: "object"
                    description: "Informations relatives à la troisième spécialité"
                    properties:
                      code:
                        title: "Code spécialité 3"
                        description: "Code de la troisième spécialité de l'établissement agrée"
                        type: "string"
                        example: "327"
                        nullable: true
                      libelle:
                        title: "Libellé spécialité 3"
                        description: "Libellé de la troisième spécialité de l'établissement agrée"
                        type: "string"
                        nullable: true
                        example: "Langues"
        habilitations_france_competence:
          type: "array"
          description: "Informations relatives aux habilitations France Compétences obtenues par l'établissement lorsque celui-ci a demandé à être certifié. La liste des habilitations France Compétences n'est pas figée et est mise à jour régulièrement par les organismes certificateurs."
          items:
            type: "object"
            properties:
              code:
                title: "Code de l'habilitation"
                description: "Code de l'habilitation France Compétences."
                type: "string"
                example: "RNCP10013"
              actif:
                title: "Indique si l'habilitation est active"
                description: "Une habilitation est active lorsque l'enregistrement de la certification en en cours. "
                type: "boolean"
                example: true
              date_actif:
                title: "Date à laquelle l'habilitation est passée en état active"
                type: "string"
                format: "date"
                nullable: true
                example: "2030-01-30"
              date_fin_enregistrement:
                title: "Date de fin d'enregistrement"
                description: "Date de fin d'enregistrement de l'habilitation de l'établissement agrée. Cette date est transmise au format AAAA-MM-DD."
                type: "string"
                format: "date"
                nullable: true
                example: "2030-01-30"
              date_decision:
                title: "Date de décision"
                description: "Date de décision de l'habilitation de l'établissement agrée. Cette date est transmise au format AAAA-MM-DD."
                type: "string"
                format: "date"
                nullable: true
                example: "2020-01-30"
              habilitation_pour_former:
                title: "Habilitation à former"
                description: "Indique que cette habilitation autorise à former/préparer les candidats à une certification inscrite au répertoire national des compétences professionnelles (RNCP) ou au répertoire spécifique (RS). Cette habilitation vise à s'assurer que les organismes de formation proposant des offres de formation certifiantes, sont bien habilités à préparer des élèves à cette certification."
                type: "boolean"
                example: true
              habilitation_pour_organiser_l_evaluation:
                title: "Habilitation à organiser l'évaluation"
                description: "Indique que cette habilitation autorise à mettre en place des épreuves pour évaluer les compétences des candidats visant une certification inscrite au répertoire national des compétences professionnelles (RNCP) ou au répertoire spécifique (RS)."
                type: "boolean"
                example: true
              sirets_organismes_certificateurs:
                type: "array"
                description: "Liste des SIRETs des organismes certificateurs ayant délivré à l'établissement les habilitations à former et/ou organiser l'évaluation de leur certification."
                items:
                  type: "string"
                  example: "12345678901234"
