  scolarite_perimetre:
    title: "Statut élève scolarisé et boursier - recherche par périmètre géographique"
    description: "Statut scolarisé d'un élève du primaire, collège ou lycée et statut boursier, recherché sur un périmètre géographique (département ou région) sans connaître l'établissement exact."
    tags:
      - Statut élève scolarisé
    parameters:
      annee_scolaire:
        title: "Année scolaire"
        description: "Année scolaire recherchée au format AAAA-AAAA ou AAAA."
        type: string
        pattern: '^(\d{4}$|^\d{4}-\d{4})$'
        examples:
          court:
            summary: "format court"
            value: "2022"
          long:
            summary: "format long"
            value: "2022-2023"
        required: true
      degre_etablissement:
        title: "Degré d'établissement"
        description: "Degré de l'établissement scolaire : 1D pour le premier degré (écoles maternelles et élémentaires) ou 2D pour le second degré (collèges et lycées)."
        type: string
        enum:
          - "1D"
          - "2D"
        example: "2D"
        required: true
      codes_bcn_departements:
        title: "Codes BCN des départements"
        description: |+
          Liste des codes BCN des départements du périmètre de recherche. Exactement un type de périmètre doit être fourni.

          Référentiel : [N_DEPARTEMENT](https://bcn.depp.education.fr/bcn/workspace/viewTable/n/N_DEPARTEMENT)
        type: array
        items:
          type: string
        example: ["075"]
      codes_bcn_regions:
        title: "Codes BCN des régions académiques"
        description: |+
          Liste des codes BCN des régions académiques du périmètre de recherche. Exactement un type de périmètre doit être fourni.

          Référentiel : [N_REGION_ACADEMIQUE](https://bcn.depp.education.fr/bcn/workspace/viewTable/n/N_REGION_ACADEMIQUE)
        type: array
        items:
          type: string
        example: ["10"]
