infogreffe:
  mandataires_sociaux:
    title: "Mandataires sociaux"
    description: "Liste des mandataires sociaux d'une société inscrite au RCS, délivrée par Infogreffe."
    tags:
      - "Informations générales"
    type: "array"
    example:
      data:
        - type: personne_physique
          fonction: PRESIDENT
          nom: GAUQUELIN
          prenom: ARNAUD
          date_naissance: '1969-08-24'
          date_naissance_timestamp: -11235600
          lieu_naissance: FLERS
          pays_naissance: FRANCE
          code_pays_naissance: FR
          nationalite: FRANCAISE
          code_nationalite: FR
        - numero_identification: '784824153'
          type: personne_morale
          fonction: COMMISSAIRE AUX COMPTES TITULAIRE
          raison_sociale: MAZARS - SOCIETE ANONYME A DIRECTOIRE ET CONSEIL DE SURVEILLANCE
          code_greffe: '9201'
          libelle_greffe: NANTERRE
      meta:
        personnes_physiques_count: 1
        personnes_morales_count: 1
        count: 2
    items:
      required: ["fonction"]
      properties:
        numero_identification:
          title: "Numéro d'identification"
          description: "Ce champ est uniquement disponible pour une personne morale."
          type: "string"
          example: "784824153"
        type:
          title: "Type de mandataire social"
          description: "Ce champ permet de faire la distinction entre les personnes physiques et morales."
          type: "string"
          example: "personne_morale"
          enum:
            - "personne_morale"
            - "personne_physique"
        fonction:
          title: "Fonction au sein de l'entreprise"
          description: "Ce champ décrit la fonction du mandataire social au sein de l'entreprise. Cette information est disponible pour les personnes morales et physiques."
          type: 'string'
          example: 'COMMISSAIRE AUX COMPTES SUPPLEANT'
        nom:
          title: 'Nom'
          description: 'Nom du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: 'Henri'
          nullable: true
        prenom:
          title: 'Prénom'
          description: 'Prénom du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: 'Martin'
          nullable: true
        date_naissance:
          title: 'Date de naissance'
          description: 'Date de naissance du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: '1965-01-27'
          nullable: true
        date_naissance_timestamp:
          title: "Date de naissance (timestamp)"
          description: 'Date de naissance délivrée au format timestamp. Ce champ est disponible uniquement pour une personne physique.'
          type: "integer"
          example: -155_523_600
          nullable: true
        lieu_naissance:
          title: 'Lieu de naissance'
          description: 'Lieu de naissance du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: 'ROUBAIX'
          nullable: true
        pays_naissance:
          title: 'Pays de naissance'
          description: 'Pays de naissance du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: 'FRANCE'
          nullable: true
        code_pays_naissance:
          title: "Code pays ISO 3166 Alpha 2 du pays de naissance"
          description: 'Code à deux lettres indiquant le pays de naissance du mandataire social, suivant la norme ISO 3166 Alpha 2. Ce champ est disponible uniquement pour une personne physique.'
          type: "string"
          example: "FR"
          nullable: true
        nationalite:
          title: 'Nationalité de la personne physique'
          description: 'Nationalité du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
          type: 'string'
          example: 'FRANCAISE'
          nullable: true
        code_nationalite:
          title: "Code pays ISO 3166 Alpha 2"
          description: 'Code à deux lettres indiquant le pays de nationalité du mandataire social, suivant la norme ISO 3166 Alpha 2. Ce champ est disponible uniquement pour une personne physique.'
          type: "string"
          example: "FR"
          nullable: true
        raison_sociale:
          title: "Raison sociale"
          description: 'Raison sociale de la personne morale mandataire social. Ce champ est disponible uniquement pour une personne morale.'
          type: "string"
          example: "BCRH & ASSOCIES - SOCIETE A RESPONSABILITE LIMITEE A ASSOCIE UNIQUE"
          nullable: true
        code_greffe:
          title: "Code du greffe de l'entreprise"
          description: 'Code du greffe auquel la personne morale mandataire social est rattachée. Ce champ est disponible uniquement pour une personne morale. Tous les codes greffe sont disponibles ici : https://opendata.datainfogreffe.fr/explore/dataset/liste-des-greffes/table/'
          type: "string"
          example: "9201"
          nullable: true
        libelle_greffe:
          title: "Libellé du greffe de l'entreprise"
          description: 'Nom du greffe auquel la personne morale mandataire social est rattachée. Ce champ est disponible uniquement pour une personne morale. Tous les libellés sont disponibles ici : https://opendata.datainfogreffe.fr/explore/dataset/liste-des-greffes/table/'
          type: "string"
          example: "NANTERRE"
          nullable: true
    meta:
      personnes_physiques_count:
        title: "Nombre de personnes physiques"
        description: "Nombre de personnes physiques parmi les mandataires sociaux."
        type: "integer"
        example: 10
      personnes_morales_count:
        title: "Nombre de personnes morales"
        description: "Nombre de personnes morales parmi les mandataires sociaux."
        type: "integer"
        example: 2
      count:
        title: "Nombre total de mandataires sociaux"
        description: "Somme des personnes morales et physiques."
        type: "integer"
        example: 12

  extraits_rcs:
    title: "Extrait RCS"
    description: "Extrait d'une partie des données du registre du commerce et des sociétés (RCS) ; ainsi que les commentaires laissés par les greffiers."
    tags:
      - "Informations générales"
    attributes:
      date_extrait:
        type: 'string'
        title: "Date d'extrait"
        example: '1999-06-11'
        nullable: true
      date_immatriculation:
        type: 'string'
        title: "Date d'immatriculation au RCS"
        description: "Il s'agit du jour d'immatriculation de l'entreprise au RCS. À compter de cette date, les sociétés jouissent de la personnalité morale. Cette date d'immatriculation n'est pas la même que celle délivrée par l'Insee. Elle ne correspond pas non plus à la date du début d'activité."
        example: '1998-07-12'
        nullable: true
      mandataires_sociaux:
        title: "Mandataires sociaux"
        description: "Liste des mandataires sociaux d'une société inscrite au RCS. Certaines informations telles que la date de naissance complète ne figurent pas dans cette API. Pour plus d'exhaustivité, appeler l'API Mandataires sociaux - Infogreffe."
        type: "array"
        items:
          required: ["fonction"]
          properties:
            numero_identification:
              title: "Numéro d'identification"
              description: "Ce champ est uniquement disponible pour une personne morale."
              type: "string"
              example: "784824153"
            type:
              title: "Type de mandataire social"
              description: "Ce champ permet de faire la distinction entre les personnes physiques et morales."
              type: "string"
              example: "personne_morale"
              enum:
                - "personne_morale"
                - "personne_physique"
            fonction:
              title: "Fonction au sein de l'entreprise"
              description: "Ce champ décrit la fonction du mandataire social au sein de l'entreprise. Cette information est disponible pour les personnes morales et physiques."
              type: 'string'
              example: 'COMMISSAIRE AUX COMPTES SUPPLEANT'
            nom:
              title: 'Nom'
              description: 'Nom du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
              type: 'string'
              example: 'Henri'
              nullable: true
            prenom:
              title: 'Prénom'
              description: 'Prénom du mandataire social. Ce champ est disponible uniquement pour une personne physique.'
              type: 'string'
              example: 'Martin'
              nullable: true
            date_naissance:
              title: 'Mois et année de naissance'
              description: "Mois et année de naissance du mandataire social. Ce champ est disponible uniquement pour une personne physique."
              type: 'string'
              example: '1965-01'
              nullable: true
            raison_sociale:
              title: "Raison sociale"
              description: 'Raison sociale de la personne morale mandataire social. Ce champ est disponible uniquement pour une personne morale.'
              type: "string"
              example: "BCRH & ASSOCIES - SOCIETE A RESPONSABILITE LIMITEE A ASSOCIE UNIQUE"
              nullable: true
      observations:
        type: array
        title: "Ensemble des observations du greffier"
        description: "Ce champ regroupe tous les messages laissés par le greffier et inscrits dans les observations."
        items:
          type: object
          properties:
            numero:
              type: 'string'
              title: "Numéro de l'observation"
              example: '123456'
            libelle:
              type: 'string'
              title: "Libellé de l'observation"
              example: "LA SOCIETE NE CONSERVE AUCUNE ACTIVITE A SON ANCIEN SIEGE"
            date:
              type: 'string'
              title: "Date de l'observation"
              example: "2000-01-01"
      nom_commercial:
        type: 'string'
        title: "Nom commercial"
        example: "DECATHLON"
        nullable: true
      adresse_siege: 
        type: 'object'
        title: "Adresse de l'établissement siège"
        properties: &infogreffe_adresse_properties
          nom_postal:
            type: "string"
            title: "Nom postal"
            nullable: true
          numero:
            type: "string"
            title: "Numéro rue"
            nullable: true
          type:
            type: "string"
            title: "Type"
            nullable: true
          voie:
            type: "string"
            title: "Nom de la voie"
            nullable: true
          ligne_1:
            type: "string"
            title: "Ligne 1 adresse"
            nullable: true
          ligne_2:
            type: "string"
            title: "Ligne 2 adresse"
            nullable: true
          localite:
            type: "string"
            title: "Localité"
            nullable: true
          code_postal:
            type: "string"
            title: "Code postal"
            nullable: true
          bureau_distributeur:
            type: "string"
            title: "Bureau distributeur"
            nullable: true
          pays:
            type: "string"
            title: "Pays"
            nullable: true
      etablissement_principal:
        type: "object"
        title: "Informations sur l'établissement principal"
        properties:
          adresse: 
            type: 'object'
            title: "Adresse de l'établissement principal"
            properties: *infogreffe_adresse_properties
          activite:
            type: "string"
            title: "Activité de l'établissement principal"
            nullable: true
          origine_fonds:
            type: "string"
            title: "Origine des fonds"
            description: "Origine des fonds de l'entreprise"
            example: "CREATION"
            nullable: true
          mode_exploitation:
            type: "string"
            title: "Mode d'exploitation"
            description: "Mode d'exploitation de l'entreprise"
            example: "EXPLOITATION DIRECTE"
            nullable: true
          code_ape:
            type: "string"
            title: "Code APE"
            description: "Le code APE (activité principale exercée) permet d'identifier la branche d'activité principale. Il est attribué par l'Insee lors de l'immatriculation ou la déclaration d'activité de l'entreprise. Ce code de 4 chiffres + 1 lettre est extrait de la nomenclature d'activité française (NAF) de l'Insee.
            \n
            \n
            À noter qu'une entreprise n'ayant pas encore de code APE peut se voir affecter la valeur '00.00Z' de manière provisoire.
            \n
            \n
            Plus d'informations métier : https://entreprendre.service-public.fr/vosdroits/F33050
            Nomemclature d'activité française - NAF rév.2 de l'Insee : https://www.insee.fr/fr/information/2120875"
            example: "6420Z"
      capital:
        type: "object"
        title: "Capital de l'entreprise"
        properties:
          montant:
            type: "number"
            title: "Montant du capital"
            description: "Montant du capital de création de l'entreprise."
            example: 50123.6
            nullable: true
          devise:
            type: "string"
            title: "Devise"
            description: "Devise du capital de création de l'entreprise."
            example: "EUROS"
            nullable: true
          code_devise:
            type: "string"
            title: "Code devise"
            description: "Code de la devise du capital de création de l'entreprise."
            example: "EUR"
            nullable: true
      greffe:
        type: "object"
        title: "Greffe"
        description: "Informations sur le greffe."
        properties:
          valeur:
            type: "string"
            title: "Greffe"
            description: "Nom du greffe en charge de l'entreprise."
            example: "COLMAR"
          code:
            type: "string"
            title: "Code greffe"
            description: "Code du greffe en charge de l'entreprise."
            example: "6851"
      personne_physique:
        type: "object"
        title: "Personne physique"
        description: "Informations sur l'entreprise s'il s'agit d'une personne physique. Les champs sont vides si l'entreprise est une personne morale."
        properties:
          adresse: 
            type: 'object'
            title: "Adresse"
            properties: *infogreffe_adresse_properties
          nationalite:
            type: "object"
            title: "Nationalité"
            description: "Nationalité de la personne physique."
            properties:
              valeur:
                type: "string"
                title: "Nationalité (valeur)"
                description: "Nationalité de la personne physique."
                example: "FRANÇAISE"
                nullable: true
              code:
                type: "string"
                title: "Code Pays"
                description: "Code pays de la nationalité de la personne physique."
                example: "FR"
                nullable: true
          nom:
            type: "string"
            title: "Nom"
            description: "Nom de la personne physique."
            example: "MARTIN"
            nullable: true
          prenom:
            type: "string"
            title: "Prénom"
            description: "Prénom de la personne physique."
            example: "JEAN-MARIE"
            nullable: true
          naissance:
            type: "object"
            title: "Naissance"
            description: "Informations de naissance de la personne physique (lieu, date, pays)"
            properties:
              pays:
                type: "object"
                title: "Pays de naissance"
                description: "Pays de naissance de la personne physique"
                properties:
                  valeur:
                    type: "string"
                    title: "Nom du pays de naissance"
                    description: "Nom du pays de naissance de la personne physique"
                    example: "FRANCE"
                    nullable: true
                  code:
                    type: "string"
                    title: "Code du pays de naissance"
                    description: "Code du pays de naissance de la personne physique"
                    example: "FR"
                    nullable: true
              date:
                type: "string"
                title: "Date de naissance"
                description: "Date de naissance de la personne physique"
                example: "1972-01-30"
                nullable: true
              lieu:
                type: "string"
                title: "Lieu de naissance"
                description: "Lieu de naissance de la personne physique"
                example: "MONTPELLIER"
                nullable: true
      personne_morale:
        type: "object"
        title: "Personne morale"
        description: "Informations sur l'entreprise s'il s'agit d'une personne morale. Les champs sont vides si l'entreprise est une personne physique."
        properties:
          forme_juridique:
            type: "object"
            title: "Forme juridique"
            description: "Forme juridique de la personne morale"
            properties:
              valeur:
                type: 'string'
                title: "Forme juridique (valeur)"
                example: "SOCIETE PAR ACTIONS SIMPLIFIEES"
                nullable: true
              code:
                type: 'string'
                title: "Code forme juridique"
                description: "Code représentant la forme juridique de l'entreprise. Attention, la nomenclature est différente de celle de l'INSEE."
                example: "SASh"
                nullable: true
          denomination:
            type: 'string'
            title: "Dénomination de la personne morale"
            example: '2X INVEST'
            nullable: true
          date_cloture_exercice_comptable:
            type: 'string'
            title: "Date de clôture de l'exercice comptable"
            description: "Mois et jour de l'année où l'exercice comptable de l'entreprise est clôturé"
            example: "02-24"
            nullable: true
          date_fin_de_vie:
            type: 'string'
            title: "Date de fin de vie de l'entreprise"
            description: "Date à laquelle l'entreprise cesse d'exister, sauf potentiel renouvellement. Correspond souvent à la date de création + 100 ans."
            example: "2075-05-18"
            nullable: true
