insee:
  adresse_etablissement:
    title: "Adresse de l'établissement"
    description: "Adresse d'un établissement présent dans le répertoire Sirene. Tous les établissements sont appelables, y compris les non-diffusibles."
    tags:
      - "Informations générales"
    attributes: &insee_adresse_etablissement_attributes
      numero_voie:
        title: "Numéro dans la voie"
        type: "string"
        example: "22"
      indice_repetition_voie:
        title: "Indice de répétition du numéro dans la voie"
        description: "Plus d'informations : https://www.sirene.fr/sirene/public/variable/indrep"
        type: "string"
        nullable: true
        enum:
          - "bis"
          - "ter"
          - "quarter"
          - "quinquies"
          -
      type_voie:
        title: "Type de la voie de localisation"
        example: "RUE"
        description:
          "Le type de la voie de localisation est indiquée en abrégé et en majuscules.
          L'information n'est pas toujours renseignée. Pour certaines petites communes, 
          l'information n'existe pas. 
          \n
          \n
          Plus d'informations : https://www.sirene.fr/sirene/public/variable/typvoie"
        type: "string"
        nullable: true
        enum: <%= YAML.load_file(Rails.root.join('config/data/insee/types_de_voie.yml')).values.map(&:upcase).concat([nil]).to_json %>
      libelle_voie:
        title: "Libellé de la voie"
        example: "DE LA PAIX"
      complement_adresse:
        title: "Complément d'adresse"
        type: "string"
        description: "Le complément d'adresse correspond à des éléments situés à l'extérieur du bâtiment qui permettent de compléter l'adresse (résidence, bâtiment, entrée, etc..)"
        example: "ZAE SAINT GUENAULT"
        nullable: true
      code_commune:
        title: "Code commune"
        description:
          "Le code commune désigne le code de la commune de localisation de l'établissement. Le code renvoyé correspond à la date de l'appel, ce qui implique que toute modification du code commune est repercutée sur l'ensemble des établissements concernés, y compris ceux qui sont fermés. 
          Cette valeur est à 'null' pour les entreprises à l'étranger.
          \n
          \n
          Les codes sont listés dans la table d'appartenance géographique fournie par l'INSEE et disponible ici: https://www.insee.fr/fr/information/2028028"
        type: "string"
        example: "75112"
        nullable: true
      code_postal:
        title: "Code postal"
        example: "75016"
        type: "string"
      distribution_speciale:
        title: "Distribution spéciale"
        description: |
          La distribution spéciale reprend les éléments particuliers qui accompagnent une adresse de distribution spéciale. C'est un élément constitutif de l'adresse.
          Voici la liste non-exhaustive des modalités renvoyées :  
          \n
          \n
          - BP : Boîte postale
          \n
          - TSA : Tri par service à l'arrivée
          \n
          - LP : Local postal
          \n
          - RP : Référence postale
          \n
          - SP : Secteur postal
          \n
          - CP : Case postale
          \n
          - CE : Case entreprise
          \n
          - CS : Course spéciale
          \n
          - POSTE RESTANTE
          \n
          - CEDEX : Courrier d'entreprise à distribution exceptionnelle
          \n
          - CIDEX : Courrier individuel à distribution exceptionnelle
          \n
          - CASE, NIVEAU : Mots utilisés pour la distribution interne du courrier à LA DEFENSE
          \n
          - CASIER : Utilisé pour le centre commercial des Quatre Temps
          \n
          - SILIC, SENIA, MAREE, FLEURS : Utilisés sur le site de Rungis
          \n
          \n
          Plus d'informations sur les modalités :
          * https://www.sirene.fr/sirene/public/variable/distributionSpecialeEtablissement
          * https://www.sirene.fr/sirene/public/variable/l5-disp"
        example: "CS 72809"
        enum:
          - "BP"
          - "TSA"
          - "LP"
          - "RP"
          - "SP"
          - "CP"
          - "CE"
          - "CS"
          - "POSTE RESTANTE"
          - "CEDEX"
          - "CIDEX"
          - "CASE, NIVEAU"
          - "CASIER"
          - "SILIC, SENIA, MAREE, FLEURS"
      code_cedex:
        title: "Code cedex"
        nullable: true
        description: "Plus d'informations: https://fr.wikipedia.org/wiki/Courrier_d%27entreprise_%C3%A0_distribution_exceptionnelle"
        example: "75590"
      libelle_cedex:
        title: "Libellé du code cedex"
        type: "string"
        nullable: true
        example: "PARIS CEDEX 12"
        description: "Cette variable indique le libellé correspondant au code cedex de l'établissement si celui-ci est non 'null'. Ce libellé est le libellé utilisé dans la ligne 6 d'adresse pour l'acheminement postal."
      libelle_commune:
        title: "Nom de la commune pour une adresse en France"
        description: "Cette valeur est à 'null' pour les établissements à l'étranger."
        type: "string"
        example: "PARIS 12"
        nullable: true
      libelle_commune_etranger:
        title: "Nom de la commune pour une adresse à l'étranger."
        description: "Cette valeur est à 'null' pour les établissements en France."
        type: "string"
        nullable: true

      code_pays_etranger:
        title: "Code du pays pour les établissements situés à l'étranger"
        description: "La nomenclature des codes pays se trouve ici: https://www.insee.fr/fr/information/2028273"
        type: "string"
        example: "99132"
        nullable: true
      libelle_pays_etranger:
        title: "Nom du pays pour les établissements situés à l'étranger"
        type: "string"
        nullable: true
        example: "ROYAUME-UNI"

    meta:
      date_derniere_mise_a_jour: &insee_date_derniere_mise_a_jour
        type: "integer"
        example: 1618396818
        description: "Date de la dernière mise à jour à l'INSEE."

    links:
      entreprise:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/entreprises/130025265/"
        description: "Lien vers la ressource 'Donnée Sirene d'une unité légale' correspondant à cette adresse d'établissement pour obtenir les données de référence de l'unité légale."
      etablissement:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/13002526500013"
        description: "Lien vers la ressource 'Donnée Sirene d'un établissement' correspondant à cette adresse d'établissement pour obtenir les données de référence de l'établissement."

  adresse_etablissement_diffusable:
    title: "Adresse d'un établissement diffusible"
    description: "Adresse de l'établissement diffusible présente dans le répertoire Sirene. Pour appeler un établissement non-diffusible, se référer à l'API 'Adresse d'un établissement'."
    tags:
      - "Informations générales"
    attributes: *insee_adresse_etablissement_attributes

  unite_legale:
    title: "Données Sirene d'une unité légale"
    description: "Obtenir les informations de référence d'une unité légale (entreprises, associations et administrations) telles que le type d'entreprise, son activité et son état administratif."
    tags:
      - "Informations générales"
    attributes: &insee_unite_legale_attributes
      siret_siege_social:
        title: "SIRET du siège social"
        type: "string"
        example: "13002526500013"
      type:
        title: "Type de personne"
        type: "string"
        enum:
          - "personne_physique"
          - "personne_morale"
        example: "personne_morale"
        description:
          "Indique si l'unité légale est une personne morale ou une personne physique.
          Cette valeur est déterminée à l'aide du code juridique : '1000' correspondant à une personne physique."
      personne_morale_attributs:
        type: "object"
        title: "Attributs de la personne morale"
        description:
          "Attributs associés à la personne morale. Les valeurs sont à
          'null' pour les personnes physiques."
        properties:
          raison_sociale:
            title: "Raison sociale de l'unité légale"
            type: "string"
            example: "DINUM"
            nullable: true
      personne_physique_attributs:
        type: "object"
        title: "Attributs de la personne physique"
        description: "Attributs associés à la personne physique. Les
          valeurs sont à 'null' pour les personnes morales."
        properties:
          pseudonyme:
            title: "Pseudonyme"
            type: "string"
            example: "DJ Falcon"
            nullable: true
            description: "Le pseudonyme correspond au nom qu'une
              personne utilise pour se désigner dans l'exercice
              de son activité, généralement littéraire ou artistique."
          prenom_usuel:
            title: "Prénom usuel"
            type: "string"
            example: "Jean"
            nullable: true
            description: "Le prénom usuel est le prénom par lequel
              une personne choisit de se faire appeler dans la
              vie courante. Ce prénom fait partie de ceux qui lui ont
              été donnés à sa naissance et qui sont inscrits à
              l'état civil."
          prenom_1:
            title: "Prénom numéro 1 déclaré"
            type: "string"
            example: "Jean"
            nullable: true
          prenom_2:
            title: "Prénom numéro 2 déclaré"
            type: "string"
            example: "Jacques"
            nullable: true
          prenom_3:
            title: "Prénom numéro 3 déclaré"
            type: "string"
            example: "Pierre"
            nullable: true
          prenom_4:
            title: "Prénom numéro 4 déclaré"
            type: "string"
            example: "Paul"
            nullable: true
          nom_usage:
            title: "Nom d'usage"
            type: "string"
            example: "Dupont"
            nullable: true
            description: "Nom que la personne physique a choisi d'utiliser."
          nom_naissance:
            title: "Nom de naissance"
            type: "string"
            example: "Dubois"
            nullable: true
          sexe:
            title: "Genre"
            type: "string"
            example: "M"
            enum:
              - "M"
              - "F"
              - null
            nullable: true
            description: "Caractère féminin ou masculin de la personne
              physique. Cette valeur peut ne pas être renseignée
              pour une personne physique."
      categorie_entreprise:
        title: "Catégorie de l'unité légale"
        type: "string"
        example: "GE"
        enum:
          - "GE"
          - "ETI"
          - "PME"
          - null
        description: "Il s'agit d'une
          variable statistique calculée par l'INSEE. Elle ne peut
          prendre que 3 valeurs:
          \n
          \n
          - GE: Grande Entreprise
          \n
          - ETI: Entreprise de Taille Intermédiaire
          \n
          - PME: Petite ou Moyenne Entreprise
          \n
          \n
          Celle-ci peut-être 'null' dans
          certains cas : quand il s’agit d’une unité légale nouvellement
          créée, ou bien d’une unité légale cessée, ou encore d’une unité
          légale hors champ du calcul de la catégorie (unité légale
          agricole ou ne faisant pas partie du système productif).
          \n
          \n
          Définition de 'catégorie d'entreprise' par l'INSEE : https://www.insee.fr/fr/metadonnees/definition/c1057"
      numero_tva_intracommunautaire:
        title: "Numéro de TVA intracommunautaire"
        type: "string"
        example: "FR07130025265"
        description: "Le numéro de TVA intracommunautaire est un numéro d’identification individuel attribué aux entreprises assujetties à la TVA et domiciliées au sein de l’Union européenne. Le numéro renvoyé par l'API est calculé par API Entreprise à l'aide du numéro de SIREN, cette donnée est donc théorique. 
          \n
          \n
          Dans le cas où l’établissement siège est à l’étranger la valeur est systématiquement 'null'
          \n
          \n
          Plus d'informations sur la méthode de calcul : LIEN TODO"
      diffusable_commercialement:
        title: "Diffusable commercialement"
        type: "boolean"
        example: true
        description: "Indique si l'unité légale est : 
          \n
          \n
          - une unité légale diffusible : 'true'
          \n
          - une unité légale non-diffusible : 'false'. Dans ce cas, les
          informations obtenues ne doivent en aucun cas être accessibles
          au grand public.
          \n
          \n
          Plus d'informations sur les conditions de diffusion : LIEN TODO"
      forme_juridique:
        type: "object"
        title: "Attributs de la forme juridique"
        properties:
          code:
            title: "Code de la forme juridique de l'unité légale."
            type: "string"
            example: "7120"
            description: "Il existe plus de 300 catégories juridiques, identifiables par un code spécifique à quatre chiffres. Leur nomenclature comporte 3 niveaux. Le premier niveau de classement contient 9 grandes catégories identifiables avec le premier chiffre du code : 
              \n
              \n
              - 0 : Organisme de placement collectif en valeurs mobilières sans personnalité morale
              \n
              - 1 : Entrepreneur individuel. La catégorie juridique des personnes physiques est '1000'.
              \n
              - 2 : Groupement de droit privé non doté de la personnalité morale
              \n
              - 3 : Personne morale de droit étranger
              \n
              - 4 : Personne morale de droit public soumise au droit commercial
              \n
              - 5 : Société commerciale
              \n
              - 6 : Autre personne morale immatriculée au RCS
              \n
              - 7 : Personne morale et organisme soumis au droit administratif
              \n
              - 8 : Organisme privé spécialisé
              \n
              - 9 : Groupement de droit privé
              \n
              \n
              Nomenclature exhaustive des codes fournie par l'INSEE : https://www.insee.fr/fr/information/2028129"
          libelle:
            title: "Libellé associé au code de la forme juridique de l'unité légale."
            type: "string"
            example: "Service central d'un ministère"
            description: "indique le libellé correspondant au code juridique.
            Si le code ne correspond à aucun libellé la valeur 'non référencé' est utilisée.
            \n
            \n
            Nomenclature exhaustive fournie par l'INSEE : https://www.insee.fr/fr/information/2028129"
      activite_principale:
        title: "Attributs de l'activité principale"
        type: "object"
        properties:
          code:
            title: "Code de l'activité principale (APE) de l'unité légale"
            type: "string"
            example: "8411Z"
            description: "Ce code est extrait de la nomenclature
              NAF. A noter qu'une entreprise n'ayant pas encore
              de code APE peut se voir affecter la valeur 00.00Z
              de manière provisoire."
          libelle:
            title: "Libellé associé au code APE"
            type: "string"
            nullable: true
            example: "Administration publique générale"
            description:
              "Si le code n'est pas renseigné dans la nomenclature 'Naf Rév2'
              (nomenclature en vigueur), le libellé n'est pas
              renseigné ici. Si le code ne correspond à aucun
              libellé au sein de la nomenclature 'Naf Rév2', la
              valeur 'non référencé' est utilisée.
              \n
              \n
              Nomenclature 'Naf Rév2' de l'INSEE : https://www.insee.fr/fr/information/2406147"
          nomenclature:
            title: "Nomenclature associée au code"
            type: "string"
            example: "NAFRev2"
      tranche_effectif_salarie:
        type: "object"
        title: "Attributs de la tranche d'effectif salarié"
        properties:
          code:
            type: "string"
            nullable: true
            example: "51"
          intitule:
            type: "string"
            nullable: true
            example: "2 000 à 4 999 salariés"
          date_reference:
            type: "string"
            nullable: true
            example: "2016"
          de:
            type: "integer"
            example: 2000
            nullable: true
          a:
            type: "integer"
            example: 4999
            nullable: true
      etat_administratif:
        title: "État administratif de l'unité légale"
        type: "string"
        enum:
          - "A"
          - "C"
        example: "A"
        description: "
          - A = Active
          \n
          - C = Cessée
          "
      date_cessation:
        title: "Date de cessation de l'unité légale"
        type: "integer"
        nullable: true
        example: 1634133818
        description: "Cette valeur est renvoyée sous format timestamp"
      date_creation:
        title: "Date de cessation de l'unité légale"
        type: "integer"
        example: 1634103818
        description: "Cette valeur est renvoyée sous format timestamp"
    links:
      siege_social:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294"
        description: "Lien vers la ressource établissement correspondant au siège social"
      siege_social_adresse:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294/adresse"
        description: "Lien vers la ressource adresse de l'établissement correspondant au siège social"
    meta:
      date_derniere_mise_a_jour: *insee_date_derniere_mise_a_jour

  unite_legale_diffusable:
    title: "Données de référence d'une entité légale diffusable commercialement"
    description: "Obtenir les informations de référence d'une unité légale, qui est soit uneentreprise, soit une administration, soit une association, présente dans le répertoire Sirene. Ce endpoint ne renvoi que des entités diffusable commercialement."
    tags:
      - "Informations générales"
    attributes:
      <<: *insee_unite_legale_attributes
      diffusable_commercialement:
        title: "Diffusable commercialement"
        type: "boolean"
        example: true
        enum:
          - true
        description: "Détermine si l'unité légale est une entreprise
          non-diffusible. Cette valeur est toujours à true. Si vous voulez pouvoir récupérer des unités légales
          non-diffusible, référez-vous à la documentation du endpoint /insee/unites_legales/:siren"

  etablissement:
    title: "Données de référence d'un établissement"
    description: "Obtenir des informations générales concernant un établissement du répertoire Sirene."
    tags:
      - "Informations générales"
    attributes: &insee_etablissement_attributes
      siege_social:
        type: "boolean"
        example: true
        enum:
          - true
          - false
        description: "Indique si l'établissement est le siège social de l'entreprise"
      etat_administratif:
        type: "string"
        enum:
          - "A"
          - "F"
        example: "A"
        description: "État administratif de l'établissement.
          \n
          \n
          - A = Actif
          \n
          - F = Fermé"
      date_fermeture:
        title: "Date de fermeture de l'établissement"
        type: "integer"
        nullable: true
        example: 1634133818
        description: "Cette valeur est renvoyée sous format timestamp"
      activite_principale:
        type: "object"
        properties:
          code:
            type: "string"
            example: "8411Z"
            description: "Code de l'activité principale (APE) de l'établissement. Ce code est extrait de la nomenclature NAF. A noter qu'un établissement n'ayant pas encore de code APE peut se voir affecter la valeur 00.00Z de manière provisoire."
          libelle:
            type: "string"
            nullable: true
            example: "Administration publique générale"
            description:
              "Libellé associé au code APE. Si le code n'est pas renseigné dans la nomenclature 'Naf Rév2' (nomenclature en vigueur), le libellé n'est pas renseigné ici. Si le code ne correspond à aucun libellé au sein de la nomenclature 'Naf Rév2', la valeur 'non référencé' est utilisée.
              \n
              \n
              Nomenclature 'Naf Rév2' de l'INSEE : https://www.insee.fr/fr/information/2406147"
          nomenclature:
            type: "string"
            example: "NAFRev2"
            description: "Nomenclature associée au code"
      tranche_effectif_salarie:
        type: "object"
        properties:
          code:
            type: "string"
            nullable: true
            example: "51"
          intitule:
            type: "string"
            nullable: true
            example: "2 000 à 4 999 salariés"
          date_reference:
            type: "string"
            nullable: true
            example: "2016"
          de:
            type: "integer"
            example: 2000
            nullable: true
          a:
            type: "integer"
            example: 4999
            nullable: true
      diffusable_commercialement:
        type: "boolean"
        example: true
        enum:
          - true
          - false
        description: "Détermine si l'établissemenr est un établissement diffusible commercialement."
      date_creation:
        type: "integer"
        example: 1634103818

    links:
      entreprise:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/entreprises/306138900"
        description: "Lien vers la ressource entreprise correspondant à cet établissement"

    meta:
      date_derniere_mise_a_jour: *insee_date_derniere_mise_a_jour

  etablissement_diffusable:
    title: "Données de référence d'un établissement diffusible"
    description: "Obtenir des informations générales concernant un établissement diffusible du répertoire Sirene."
    tags:
      - "Informations générales"
    attributes:
      <<: *insee_etablissement_attributes
      diffusable_commercialement:
        title: "Diffusable commercialement"
        type: 'boolean'
        example: true
        enum:
          - true
        description: "Détermine si l'établissement est un établissement
          non-diffusible. Cette valeur est toujours à true. Si vous voulez pouvoir récupérer des établissements
          non-diffusible, référez-vous à la documentation du endpoint INSEE établissement"

  siege_unite_legale:
    title: "Données de référence du siège d'une unité légale"
    description: "Obtenir des informations générales concernant le siège d'une unité légale du répertoire Sirene."
    tags:
      - "Informations générales"

  siege_diffusable_unite_legale:
    title: "Données de référence du siège d'une unité légale diffusible"
    description: "Obtenir des informations générales concernant le siège d'une unité légale diffusable du répertoire Sirene."
    tags:
      - "Informations générales"
