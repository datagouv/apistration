  adresse_etablissement_diffusable:
    title: "Adresse établissement en open data"
    description: "Adresse d'un établissement inscrit au répertoire Sirene, si celui-ci n'a pas choisi la diffusion partielle."
    tags:
      - "Informations générales"
    attributes: *insee_adresse_etablissement_attributes_diffusible

  unite_legale:
    title: "Données unité légale"
    description: "Informations de référence d'une unité légale (entreprise, association ou administration) inscrite au répertoire Sirene. Avec les données protégées des unités légales en diffusion partielle."
    tags:
      - "Informations générales"
    attributes: *insee_unite_legale_attributes
    links:
      siege_social:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294"
        description: "Lien vers la ressource 'Données de référence d'un établissement' correspondant au siège social de cette unité légale."
      siege_social_adresse:
        type: "string"
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294/adresse"
        description: "Lien vers la ressource 'Adresse d'un établissement' correspondant au siège social de cette unité légale."
    meta:
      date_derniere_mise_a_jour: *insee_date_derniere_mise_a_jour
      redirect_from_siren:
        type: 'string'
        title: "Siren d'origine de la requête"
        description: "Si la requête a été effectuée sur un siren qui a été redirigé vers un autre siren, cette variable contient le siren d'origine de la requête. Cela arrive parfois lorsque la base Sirene possède des unités légales en doublons. Ces doublons sont généralement temporaires.
          \n
          Si cette variable est renseignée, le paramètre data->siren est différent du paramètre d'appel, et cette variable est le siren d'entrée."
        example: "306138900"
        nullable: true

  unite_legale_diffusable:
    title: "Données unité légale en open data"
    description: "Informations de référence publiques d'une unité légale (entreprise, association ou administration) inscrite au répertoire Sirene."
    tags:
      - "Informations générales"
    attributes: *insee_unite_legale_attributes_diffusible

  etablissement:
    title: "Données établissement"
    description: "Informations générales concernant un établissement inscrit au répertoire Sirene. Avec les données protégées des établissements en diffusion partielle."
    tags:
      - "Informations générales"
    attributes: *insee_etablissement_attributes
    links:
      unite_legale: *link_unite_legale
    meta:
      date_derniere_mise_a_jour: *insee_date_derniere_mise_a_jour
      redirect_from_siret:
        type: 'string'
        title: "Siret d'origine de la requête"
        description: "Si la requête a été effectuée sur un siret qui a été redirigé vers un autre siret , cette variable contient le siret d'origine de la requête. Cela arrive parfois lorsque la base Sirene possède des unités légales en doublons. Ces doublons sont généralement temporaires.
          \n
          Si cette variable est renseignée, le paramètre data->siret est différent du paramètre d'appel, et cette variable est le siret d'entrée.
          \n
          \n
          A noter que le siret de redirection est systématiquement le siret du siège social de l'unité légale : en effet la base Sirene ne possède pas la correspondance exacte entre un siret doublon et le siret d'origine.
          "
        example: "30613890000010"
        nullable: true

  etablissement_diffusable:
    title: "Données établissement en open data"
    description: "Informations générales publiques concernant un établissement inscrit au répertoire Sirene."
    tags:
      - "Informations générales"
    attributes: *insee_etablissement_attributes_diffusible

  siege_unite_legale:
    title: "Données siège social"
    description: "Informations générales concernant le siège social d'une unité légale inscrite au répertoire Sirene. Avec les données protégées des sièges sociaux en diffusion partielle."
    tags:
      - "Informations générales"

  siege_diffusable_unite_legale:
    title: "Données siège social en open data"
    description: "Informations générales publiques concernant le siège d'une unité légale inscrite au répertoire Sirene."
    tags:
      - "Informations générales"

  successions:
    title: "Liens de succession"
    description: "Liste des prédécesseurs et successeurs d'un établissement."
    tags:
      - "Informations générales"
    attributes:
      predecesseurs:
        title: "Établissements prédécesseurs"
        description: "Liste des établissements prédécesseurs de l'établissement appelé."
        type: "array"
        items:
          type: "object"
          properties:
            siret:
              title: "SIRET"
              type: "string"
              example: "30613890001294"
              description: "SIRET de l'établissement prédécesseur."
            date_succession: &date_succession_properties
              title: "Date d'effet du lien de succession"
              type: "date"
              example: "2021-10-15"
              description: "Date à laquelle la succession a eu lieu."
            transfert_siege: &transfert_siege_properties
              title: "Transfert de siège"
              type: "boolean"
              example: true
              description: "Indique si la succession est un transfert de siège. Pour en savoir plus, consulter cette rubrique : http://entreprise.api.gouv.fr/catalogue/insee/successions#definition-transfert-siege."
            continuite_economique: &continuite_economique_properties
              title: "Continuité économique"
              type: "boolean"
              example: true
              description: "Indique si la succession est une continuité économique. Pour en savoir plus, consulter cette rubrique : http://entreprise.api.gouv.fr/catalogue/insee/successions#definition-continuite-economique."
      successeurs:
        title: "Établissements successeurs"
        description: "Liste des établissements successeurs de l'établissement appelé."
        type: "array"
        items:
          type: "object"
          properties:
            siret:
              title: "SIRET"
              type: "string"
              example: "30613890001294"
              description: "SIRET de l'établissement successeur."
            date_succession: *date_succession_properties
            transfert_siege: *transfert_siege_properties
            continuite_economique: *continuite_economique_properties

