qualifelec:
  certificats:
    title: Certification Qualifelec
    description: "Certification délivrée par Qualifelec attestant des qualification d'une entreprise dans le génie électrique et énergétique."
    tags:
      - Prochainement
    parameters:
      siret:
        type: string
        description: "Siret de l'entreprise dont vous souhaitez obtenir la certification et les qualifications."
        example: "12345678901234"
        required: true
    attributes:
      certifications:
        title: "Liste des certifications Qualifelec de l'entreprise"
        type: array
        items:
          title: "Informations de la certification Qualifelec"
          type: object
          properties:
            document_url:
              title: "URL de téléchargement du certificat Qualifelec"
              type: string
              description: "Ce lien délivre le certificat Qualifelec de l'entreprise au format PDF tel qu'accessible depuis le site https://www.qualifelec.fr/."
              example: "https://www.qualifelec.fr/certifmoteur/4/3631.pdf"
            label_certificat:
              title: 'Label du certificat'
              type: string
              description: "Titre officiel du certificat"
              example: "Installations Électriques Logement Commerce Petit Tertiaire - LCPT"
            numero_certificat:
              title: 'Numéro du certificat'
              type: number
              description: "Le numéro d'attribution du certificat"
              example: 05430
            rge:
              title: "Label RGE de l'entreprise"
              type: boolean
              description: "Indique si l'entreprise est également labellisée RGE, soit \"Reconnu Garant de l'Environnement\". Ce label concerne les entreprises spécialisées dans les travaux d'efficacité énergétique en rénovation et l'installation d'équipements utilisant des énergies renouvelables."
              example: true
            date_debut_certificat:
              title: 'Date de début du certificat'
              type: string
              format: date
              description: "Date de début de validité du certificat"
              example: '2019-01-01'
            date_fin_certificat:
              title: 'Date de fin du certificat'
              type: string
              format: date
              description: "Date de fin de validité du certificat"
              example: '2021-12-31'
            date_debut_qualification:
              title: 'Date de début de la qualification'
              type: string
              format: date
              description: "Date de début de validité de la qualification"
              example: '2019-01-01'
            date_fin_qualification:
              title: 'Date de fin de la qualification'
              type: string
              format: date
              description: "Date de fin de validité de la qualification"
              example: '2024-12-31'
            indices:
              title: "Liste des codes des indices associés au certificat"
              type: array
              minItems: 1
              items:
                title: "Code des indices"
                type: string
                example: "E1"
                description: "Les codes des indices sont disponibles sur la documentation de l'API"
            assurance_decennale: 
              title: "Assurance décennale"
              type: string
              description: "Nom de l’assurance décennale"
              example: "AXA"
            date_debut_assurance_decennale:
              title: "Date de début de l’attestation d'assurance décennale"
              type: string
              format: date
              description: "Date de début de validité de l’attestation d’assurance décennale"
              example: '2024-01-31'
            date_fin_assurance_decennale:
              title: "Date de fin de l’attestation d'assurance décennale"
              type: string
              format: date
              description: "Date de fin de validité de l’attestation d’assurance décennale"
              example: '2024-12-31'
            assurance_civile:
              title: "Assurance responsabilité civile"
              type: string
              description: "nom de l’assurance responsabilité civile"
              example: "HISCOX"
            date_debut_assurance_civile:
              title: "Date de début de l'assurance responsabilité civile"
              type: string
              format: date
              description: "Date de début de validité de l’attestation d’assurance responsabilité civile"
              example: '2024-01-31'
            date_fin_assurance_civile:
              title: "Date de fin de l'assurance responsabilité civile"
              type: string
              format: date
              description: "Date de fin de validité de l’attestation d’assurance responsabilité civile"
              example: '2024-12-31'
