cnav:
  commons:
    cache_duration: "La durée du cache est de 1 heure."
  aeje:
    title: Participation familiale EAJE
    description: "Participation familiale EAJE"
    tags:
      - Prochainement
    attributes:
      allocataires:
        title: "Données d'identité de l'allocataire et du conjoint"
        type: array
        minItems: 1
        description: "Liste des données d'identité de l'allocataire appelé et de celles du conjoint le cas échéant. La provenance de ces données n'est pas sourcée précisément et diffère selon la CAF ou la MSA."
        items:
          type: object
          properties:
            nom_naissance:
              title: Nom
              type: string
              description: Nom de naissance de l'allocataire ou du conjoint.
              example: "JACQUES"
            nom_usage:
              title: Nom d'usage
              type: string
              description: Nom d'usage de l'allocataire ou du conjoint.
              example: "DUPONT"
              nullable: true
            prenoms:
              title: Prénoms
              type: string
              description: Prénoms de l'allocataire ou du conjoint.
              example: "JEAN-PIERRE THOMAS"
            date_naissance:
              title: Date de naissance
              description: Date de naissance de l'allocataire ou du conjoint au format AAAA-MM-JJ.
              type: string
              example: '2000-01-20'
            sexe:
              title: "Sexe"
              type: string
              description: Sexe de l'allocataire ou du conjoint.
              example: "M"
              enum:
                - F
                - M
            code_cog_insee_commune_naissance:
              title: Code Cog de la ville de naissance
              type: string
              description: Code Cog de la ville de naissance
              example: '75113'
      enfants:
        type: array
        title: "Données d'identité des enfants composant la famille"
        description: "Liste des données d'identité des enfants composant la famille, le cas échéant. La provenance de ces données n'est pas sourcée précisément et diffère selon la CAF ou la MSA."
        items:
          type: object
          properties:
            nom_naissance:
              title: "Nom de naissance"
              type: string
              description: Nom de naissance de l'enfant.
              example: "DUPONT"
            nom_usage:
              title: "Nom d'usage"
              type: string
              description: Nom d'usage de l'enfant.
              example: null
              nullable: true
            prenoms:
              title: "Prénoms"
              type: string
              description: Prénoms de l'enfant.
              example: "JEAN-PIERRE THOMAS JUNIOR"
            date_naissance:
              title: Date de naissance
              description: Date de naissance de l'enfant au format AAAA-MM-JJ.
              type: string
              example: '2000-01-20'
            sexe:
              title: "Sexe"
              type: string
              description: Sexe de l'enfant.
              example: "M"
              enum:
                - F
                - M
            code_cog_insee_commune_naissance:
              title: Code Cog de la ville de naissance
              type: string
              description: Code Cog de la ville de naissance
              example: '75113'
      adresse:
        title: "Adresse de la famille"
        type: object
        description: "Adresse de la famille au format de La Poste. Cette adresse est déclarative. Si l'usager a changé d'adresse et n'a pas actualisé son adresse auprès de la CAF ou de la MSA, l'information sera donc obsolète."
        properties:
          destinataire:
            title: "Identité du destinataire"
            type: string
            example: "Monsieur JEAN JACQUES"
            description: "Identité du destinataire : Civilité, titre ou qualité + nom et
              prénom"
          complement_information:
            title: "Complément d'information du destinataire ou point de remise"
            type: string
            nullable: true
            example: null
          complement_information_geographique:
            title: "Complément d'information du point géographique"
            type: string
            nullable: true
            example: null
          numero_libelle_voie:
            title: "Voie"
            type: string
            description: Numéro et libellé de la voie.
            example: "1 RUE DE LA GARE"
            nullable: true
          lieu_dit:
            title: "Lieu-dit"
            type: string
            nullable: true
            example: null
            description: "Lieu-dit ou service particulier de distribution : poste restante,
              boîte postale."
          code_postal_ville:
            title: "Code postal"
            type: string
            description: Code postal et localité de destination.
            example: '75002'
          pays:
            title: "Pays"
            type: string
            example: 'FRANCE'
      parametres_calcul_participation_familiale:
        title: "Paramètre pris en compte pour le calcul du tarif"
        description: "Liste des paramètres pris en compte lors du calcul tarifaire de l'allocation"
        type: object
        properties:
          nombre_enfants_a_charge:
            title: "Nombre d'enfants à charge"
            description: "Nombre d'enfants à charge des allocataires"
            type: integer
            example: 2
          nombre_enfants_beneficiaire_AEEH:
            title: Nombre d'enfants beneficiaire de l'AEEH
            description: Nombre d'enfants beneficiaire de l'AEEH
            type: integer
            example: 3
          base_ressources_annuelles:
            title: "Ressource annuelles"
            description: "Ressource annuelles déclarée par les allocataires"
            type: object
            properties:
              valeur:
                title: "Valeur"
                description: "Montant des ressources annuelles"
                type: integer
                example: 40923
              annee_calcul:
                title: "Année du calcul des ressources"
                type: integer
                description: "Année lors de laquelle le calcul du quotient familial demandé a été effectué. Cette année peut différer de l'année effective du quotient familial.
                  \n\n
                  Pour la CAF, le quotient familial est recalculé uniquement si de nouvelles informations sont venues rectifier la situation de l'allocataire. 
                  \n
                  Pour la MSA, le quotient familial est systématiquement recalculé ; l'année correspond donc toujours à l'année courante."
                example: 2023
  c2s:
    title: Statut complémentaire santé solidaire (C2S)
    description: "Statut bénéficiaire de la complémentaire santé solidaire (C2S).
      \n\n
      Retourne également des informations sur les dates d'ouverture des droits.
      \n
      Pour plus d'informations sur cette API et obtenir un accès en avant-première, veuillez contacter l'équipe API Particulier.
      \n
      **Données disponibles en bac à sable :** [Liste de payloads de test](https://github.com/etalab/siade_staging_data/blob/develop/payloads/complementaire_sante_solidaire)"
    tags:
      - Statut Complémentaire Santé Solidaire (C2S)
    attributes:
      est_beneficiaire:
        title: "Statut bénéficiaire de la complémentaire de santé solidaire (C2S)"
        type: boolean
        example: true
        description: "Indique que le particulier est bénéficiaire de la complémentaire de santé solidaire au moment de l'appel."
      avec_participation:
        title: "C2S avec participation financière"
        type: boolean
        example: false
        nullable: true
        description: "Indique que la C2S du particulier bénéficiaire est avec participation financière.
          \n 
          Si ce champ est à false, cela signifie que la C2S est sans participation financière de la part de l'allocataire.
          \n
          Ce champ est null dans le cas où le particulier n'est pas bénéficiaire de la C2S."
      date_debut_droit:
        title: "Date d'ouverture du droit en cours à la C2S"
        type: string
        nullable: true
        description: |
          Date de début du droit à la complémentaire santé solidaire du particulier bénéficiaire.
          \n
          \n
          Cette date est relative à la prestation en cours. C'est-à-dire :
          \n
          - Dans le cas d'une attribution l'année en cours N, la date de début correspondra à la date de l'attribution ;
          - Dans le cas d'une attribution l'année passée N-1, qui est renouvelée en année N, la date de début correspondra à la date d'attribution l'année passée N-1 ;
          - Dans le cas où, en année N-2 un allocataire était bénéficiaire, puis ne l'était plus en année N-1, puis l'est à nouveau dans l'année en cours N, la date de début correspond à la date d'attribution de la prestation en cours (et donc de l'année N).
          \n
          \n
          Ce champ est null dans le cas où le particulier n'est pas bénéficiaire de la C2S.
        example: '1992-11-29'
  quotient_familial_v2:
    title: Quotient familial CAF & MSA
    description: "Quotient familial délivré par la CAF ou la MSA et composition de la famille de l'allocataire.
      \n
      Pour plus d'informations sur cette API et obtenir un accès en avant-première, veuillez contacter l'équipe API Particulier.
      \n
      **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/api_particulier_v2_cnav_quotient_familial_v2)"
    cache_duration: "La durée du cache est de 24 heure."
    tags:
      - Quotient familial CAF & MSA
    attributes:
      allocataires:
        title: "Données d'identité de l'allocataire et du conjoint"
        type: array
        minItems: 1
        description: "Liste des données d'identité de l'allocataire appelé et de celles du conjoint le cas échéant. La provenance de ces données n'est pas sourcée précisément et diffère selon la CAF ou la MSA."
        items:
          type: object
          properties:
            nom_naissance:
              title: Nom
              type: string
              description: Nom de naissance de l'allocataire ou du conjoint.
              example: "JACQUES"
            nom_usage:
              title: Nom d'usage
              type: string
              description: Nom d'usage de l'allocataire ou du conjoint.
              example: "DUPONT"
              nullable: true
            prenoms:
              title: Prénoms
              type: string
              description: Prénoms de l'allocataire ou du conjoint.
              example: "JEAN-PIERRE THOMAS"
            date_naissance:
              title: Date de naissance
              description: Date de naissance de l'allocataire ou du conjoint au format AAAA-MM-JJ.
              type: string
              example: '2000-01-20'
            sexe:
              title: "Sexe"
              type: string
              description: Sexe de l'allocataire ou du conjoint.
              example: "M"
              enum:
                - F
                - M
      enfants:
        type: array
        title: "Données d'identité des enfants composant la famille"
        description: "Liste des données d'identité des enfants composant la famille, le cas échéant. La provenance de ces données n'est pas sourcée précisément et diffère selon la CAF ou la MSA."
        items:
          type: object
          properties:
            nom_naissance:
              title: "Nom de naissance"
              type: string
              description: Nom de naissance de l'enfant.
              example: "DUPONT"
            nom_usage:
              title: "Nom d'usage"
              type: string
              description: Nom d'usage de l'enfant.
              example: null
              nullable: true
            prenoms:
              title: "Prénoms"
              type: string
              description: Prénoms de l'enfant.
              example: "JEAN-PIERRE THOMAS JUNIOR"
            date_naissance:
              title: Date de naissance
              description: Date de naissance de l'enfant au format AAAA-MM-JJ.
              type: string
              example: '2000-01-20'
            sexe:
              title: "Sexe"
              type: string
              description: Sexe de l'enfant.
              example: "M"
              enum:
                - F
                - M
      adresse:
        title: "Adresse de la famille"
        type: object
        description: "Adresse de la famille au format de La Poste. Cette adresse est déclarative. Si l'usager a changé d'adresse et n'a pas actualisé son adresse auprès de la CAF ou de la MSA, l'information sera donc obsolète."
        properties:
          destinataire:
            title: "Identité du destinataire"
            type: string
            example: "Monsieur JEAN JACQUES"
            description: "Identité du destinataire : Civilité, titre ou qualité + nom et
              prénom"
          complement_information:
            title: "Complément d'information du destinataire ou point de remise"
            type: string
            nullable: true
            example: null
          complement_information_geographique:
            title: "Complément d'information du point géographique"
            type: string
            nullable: true
            example: null
          numero_libelle_voie:
            title: "Voie"
            type: string
            description: Numéro et libellé de la voie.
            example: "1 RUE DE LA GARE"
            nullable: true
          lieu_dit:
            title: "Lieu-dit"
            type: string
            nullable: true
            example: null
            description: "Lieu-dit ou service particulier de distribution : poste restante,
              boîte postale."
          code_postal_ville:
            title: "Code postal"
            type: string
            description: Code postal et localité de destination.
            example: '75002'
          pays:
            title: "Pays"
            type: string
            example: 'FRANCE'
      quotient_familial:
        title: "Informations du quotient familial (QF)"
        type: object
        description: "Données relatives à l'attribution du quotient familial CAF ou MSA."
        properties:
          fournisseur:
            title: "Fournisseur du QF"
            type: string
            description: Indique si le quotient familial de l'allocataire provient de la CAF ou de la MSA.
            example: MSA
            enum:
              - CNAF
              - MSA
          valeur:
            title: "Valeur du QF"
            type: integer
            description: Valeur du quotient familial calculé par la CAF ou la MSA.
            example: 1045
          annee:
            title: "Année effective du QF"
            type: integer
            description: "Ce champ indique l'année effective du quotient familial appelé. C'est-à-dire l'année à laquelle s'applique le quotient familial. Cette année peut être différente de l'année de calcul du quotient si ce dernier a été recalculé suite à la réception d'informations rectifiant la situation de l'allocataire.
              \n\n
              - Si aucune année et aucun mois n'ont été renseignés en paramètres d'appel, le quotient familial retourné sera celui du mois de l'année en cours.
              - Si aucune année n'a été renseignée et que le mois est renseigné, le quotient familial retourné sera celui du mois spécifié pour l'année en cours. En revanche, si la date finalement composée avec cette règle s'avère dans le futur (mois postérieur au moins en cours), l'API renvoie un erreur 400.
              "
            example: 2023
          mois:
            title: "Mois effectif du QF"
            type: integer
            description: "Mois effectif du quotient familial. C'est-à-dire le mois auquel s'applique le quotient familial. Ce mois peut être différent du mois de calcul du quotient si ce dernier a été recalculé suite à la réception d'informations rectifiant la situation de l'allocataire.
              \n\n
              - Si aucun mois et aucune année n'ont été renseignés en paramètres d'appel, le quotient familial retourné sera celui du mois de l'année en cours.
              - Si le mois est renseigné mais qu'aucune année n'est saisie, le quotient familial retourné sera celui du mois spécifié pour l'année en cours. En revanche, si la date finalement composée avec cette règle s'avère dans le futur (mois postérieur au moins en cours), l'API renvoie un erreur 400.
              - Si aucun mois n'a été renseigné mais que l'année a été spécifiée en paramètres d'appel, le quotient familial retourné sera celui du mois en cours pour l'année spécifiée."
            example: 6
          annee_calcul:
            title: "Année du calcul du QF"
            type: integer
            description: "Année lors de laquelle le calcul du quotient familial demandé a été effectué. Cette année peut différer de l'année effective du quotient familial.
              \n\n
              Pour la CAF, le quotient familial est recalculé uniquement si de nouvelles informations sont venues rectifier la situation de l'allocataire. 
              \n
              Pour la MSA, le quotient familial est systématiquement recalculé ; l'année correspond donc toujours à l'année courante."
            example: 2023
          mois_calcul:
            title: "Mois du calcul du QF"
            type: integer
            description: "Mois lors duquel le calcul du quotient familial demandé a été effectué. Ce mois peut différer du mois effectif du quotient familial.
              \n\n
              Pour la CAF, le quotient familial est recalculé uniquement si de nouvelles informations sont venues rectifier la situation de l'allocataire. 
              \n
              Pour la MSA, le quotient familial est systématiquement recalculé ; le mois correspond donc toujours au mois en cours."
            example: 9

