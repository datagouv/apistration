ants:
  extrait_immatriculation_vehicule:
    title: "Extrait d'immatriculation véhicule"
    tags:
      - "Prochainement"
    description: "Extrait d'immatriculation du véhicule avec l'identité du demandeur du dossier"
    parameters:
      immatriculation:
        name: "Immatriculation"
        type: "string"
        description: "Identifiant de l'immatriculation du véhicule"
        required: true
        example: "AA-123-BB"
    attributes:
      identite_particulier:
        title: "Identité"
        type: "object"
        description: "Identité du demandeur du dossier d'immatriculation"
        properties:
          nom:
            title: "Nom"
            type: "string"
            description: "Le nom du demandeur du dossier d'immatriculation"
            example: "MARTIN"
          prenom:
            title: "Prénom"
            type: "string"
            description: "Le prénom du demandeur du dossier d'immatriculation (si personne physique)"
            example: "JEAN"
      adresse_particulier:
        title: "Adresse"
        type: "object"
        description: "L'adresse du demandeur dans l'État membre d'immatriculation"
        properties:
          complement_information:
            title: "Complément information de l'adresse"
            type: "string"
            nullable: true
            description: "Complément d'adresse"
            example: null
          num_voie:
            title: "Numéro de voie"
            type: "string"
            nullable: true
            description: "Numéro de voie"
            example: "15"
          type_voie:
            title: "Type de voie"
            type: "string"
            nullable: true
            description: "Type de voie"
            example: "RUE"
          libelle_voie:
            title: "Libellé de voie"
            type: "string"
            nullable: true
            description: "Libellé de voie"
            example: "DE LA REPUBLIQUE"
          code_postal_ville:
            title: "Code postal"
            type: "string"
            description: "Code postal de la ville"
            example: "75001"
          libelle_commune:
            title: "Libellé de commune"
            type: "string"
            description: "Libellé de commune"
            example: "PARIS"
          lieu_dit:
            title: "Lieu-dit"
            type: "string"
            nullable: true
            description: "Lieu-dit ou quartier"
            example: null
          etage_escalier_appartement:
            title: "Étage, escalier ou appartement"
            type: "string"
            nullable: true
            description: "Étage, escalier ou numéro d'appartement"
            example: "ESCALIER 2"
          extension:
            title: "Extension de l'adresse"
            type: "string"
            nullable: true
            description: "Extension de l'adresse, si applicable (Bis, Ter, etc.)"
            example: "B"
      statut_rattachement:
        title: "Statut de rattachement au véhicule"
        type: "string"
        description: "Le statut du demandeur du dossier d'immatriculation. Si le véhicule est en location longue durée (LLD, LCB, LCL), alors il s'agit du locataire. Dans les autres cas, c'est 'titulaire' ou 'cotitulaire'"
        enum:
          - locataire
          - titulaire
          - cotitulaire
        example: "titulaire"
      donnees_immatriculation_vehicule:
        title: "Données d'immatriculation du véhicule"
        type: "object"
        description: "Informations relatives à l'immatriculation du véhicule"
        required:
          - numero_immatriculation
          - date_premiere_immatriculation
          - statut_location
        properties:
          numero_immatriculation:
            title: "Numéro d'immatriculation"
            type: "string"
            description: "Le numéro d'immatriculation du véhicule"
            example: "AA-123-BB"
          date_premiere_immatriculation:
            title: "Date de première immatriculation"
            type: "string"
            description: "La date de la première immatriculation du véhicule"
            example: "2024-01-15"
          statut_location:
            title: "Statut de location"
            type: "object"
            description: "Le statut de location du véhicule, si applicable. Les codes LLD, LCB, LCL correspondent à une location longue durée"
            required:
              - code
              - label
            properties:
              code:
                title: "Code du statut de location"
                type: "string"
                description: "Le code du statut de location selon la nomenclature officielle"
                example: "LLD"
                nullable: true
              label:
                title: "Label du statut de location"
                type: "string"
                description: "Le label descriptif du statut de location"
                example: "Location Longue Durée"
                nullable: true
      caracteristiques_techniques_vehicule:
        title: "Extrait des caractéristiques techniques du véhicule"
        type: "object"
        description: "Informations techniques et caractéristiques du véhicule"
        required:
          - marque
          - type_variante_version
          - denomination_commerciale
          - masse_charge_maximale
          - categorie_vehicule
          - genre_national
          - cylindree
          - type_carburant
          - taux_co2
          - classe_environnementale
        properties:
          marque:
            title: "Marque du véhicule"
            type: "string"
            description: "La marque du véhicule"
            example: "PEUGEOT"
          type_variante_version:
            title: "Type Variante Version"
            type: "string"
            description: "Les Type Variante Version (TVV) du véhicule"
            example: "ABCDEF-G1H234"
          denomination_commerciale:
            title: "Dénomination commerciale"
            type: "string"
            description: "La dénomination commerciale du véhicule"
            example: "308"
          masse_charge_maximale:
            title: "Masse en charge maximale"
            type: "number"
            description: "La masse en charge maximale admissible du véhicule en service dans l'État membre d'immatriculation"
            example: 1850
          categorie_vehicule:
            title: "Catégorie du véhicule"
            type: "object"
            description: "La catégorie du véhicule (CE)"
            required:
              - code
              - label
            properties:
              code:
                title: "Code de la catégorie du véhicule"
                type: "string"
                description: "Le code de la catégorie du véhicule selon la classification européenne"
                enum:
                  - M1
                  - M2
                  - M3
                  - N1
                  - N2
                  - N3
                  - O1
                  - O2
                  - O3
                  - O4
                  - L1e
                  - L2e
                  - L3e
                  - L4e
                  - L5e
                  - L6e
                  - L7e
                example: "M1"
              label:
                title: "Label de la catégorie du véhicule"
                type: "string"
                description: "Le label de la catégorie du véhicule"
                example: "Véhicule de transport de personnes comportant au maximum 8 places assises outre le siège du conducteur"
          genre_national:
            title: "Genre national"
            type: "object"
            description: "Le genre national du véhicule"
            required:
              - code
              - label
            properties:
              code:
                title: "Code du genre national"
                type: "string"
                description: "Le code du genre national selon la classification française"
                enum:
                  - VP
                  - CTTE
                  - VASP
                  - TCP
                  - TRR
                  - CAM
                  - REM
                  - RESP
                  - SRAT
                  - SREM
                  - CL
                  - CYCL
                  - MTL
                  - MTT1
                  - MTT2
                  - MOTO
                  - MAGA
                  - QM
                  - TRA
                example: "VP"
              label:
                title: "Label du genre national"
                type: "string"
                description: "Le label du genre national"
                example: "Véhicule Particulier"
          cylindree:
            title: "Cylindrée"
            type: "number"
            description: "La cylindrée (en cm3)"
            example: 1600
          type_carburant:
            title: "Type de carburant"
            type: "object"
            description: "Le type de carburant ou la source d'énergie"
            required:
              - code
              - label
            properties:
              code:
                title: "Code du type de carburant"
                type: "string"
                description: "Le code du type de carburant selon la nomenclature officielle"
                enum:
                  - AC
                  - EE
                  - EG
                  - EH
                  - EL
                  - EM
                  - EN
                  - EP
                  - EQ
                  - ER
                  - ES
                  - ET
                  - FE
                  - FG
                  - FH
                  - FL
                  - FN
                  - GA
                  - GF
                  - GG
                  - GH
                  - GL
                  - GM
                  - GN
                  - GO
                  - GP
                  - GQ
                  - GZ
                  - H2
                  - HE
                  - HH
                  - HY
                  - NE
                  - NH
                  - PE
                  - PH
                  - PL
                example: "ES"
              label:
                title: "Label du type de carburant"
                type: "string"
                description: "Le label du type de carburant"
                example: "Essence"
          taux_co2:
            title: "Taux de CO2"
            type: "number"
            description: "Le taux de CO2 (en g/km)"
            example: 120
          classe_environnementale:
            title: "Classe environnementale"
            type: "object"
            description: "L'indication de la classe environnementale de réception CE : mention de la version applicable en vertu de la directive 70/220/CEE ou de la directive 88/77/CEE"
            required:
              - code
              - label
            properties:
              code:
                title: "Code de la classe environnementale"
                type: "string"
                description: "Le code de la classe environnementale selon les normes européennes"
                enum:
                  - Euro 1
                  - Euro 2
                  - Euro 3
                  - Euro 4
                  - Euro 5
                  - Euro 5a
                  - Euro 5b
                  - Euro 6
                  - Euro 6b
                  - Euro 6c
                  - Euro 6d-TEMP
                  - Euro 6d
                  - Euro 6e
                  - Euro VI
                example: "Euro 6"
              label:
                title: "Label de la classe environnementale"
                type: "string"
                description: "Le label de la classe environnementale"
                example: "Norme européenne d'émission Euro 6"
