response:
  headers:
    x_response_cached:
      description: "Indique si la réponse a été caché."
    x_cache_expires_in:
      description: "Secondes avant que le cache n'expire. Si le cache est vide, ce header est vide (mais présent)."
    cache_duration_1_hour: "La durée du cache est de 1 heure."
parameters:
  header:
    cache_control:
      description: 'Si cette valeur est fixée à "no-cache", le système de cache est alors ignoré et la donnée est directement récupérée depuis le fournisseur de données.'
  siren:
    description: "Siren de l'entreprise"
    examples:
      siren_octo_technology:
        value: "418166096"
        summary: SIREN Octo Technology
      siren_non_diffusible:
        value: "005572466"
        summary: SIREN entreprise non diffusible
      siren_artisant:
        value: "301123626"
        summary: SIREN entreprise artisanale
      siren_fntp:
        value: "339379984"
        summary: SIREN pour FNTP
      siren_cnetp:
        value: "542036207"
        summary: SIREN pour CNETP
      siren_opqibi:
        value: "515228211"
        summary: SIREN pour OPQIBI
      siren_entrepreneur_individuel:
        value: "389839937"
        summary: SIREN d'un entrepeneur individuel (cessé)
      siren_marques_brevets_modeles:
        value: "542065479"
        summary: SIREN d'une entreprise ayant des marques, brevets et modèles (INPI)

  siret:
    description: "Siret de l'établissement"
    examples:
      siret_octo_technology:
        value: "41816609600069"
        summary: SIRET Octo Technology
      siret_non_diffusible:
        value: "00557246600026"
        summary: SIRET établissement non diffusible
      siret_msa:
        value: "81104725700019"
        summary: SIRET pour MSA
      siret_probtp:
        value: "43841606700017"
        summary: SIRET pour ProBTP
      siret_qualibat:
        value: "78824266700020"
        summary: SIRET pour Qualibat
      siret_entrepreneur_individuel:
        value: "38983993700015"
        summary: SIRET d'un entrepreneur individuel (fermé)
      siret_ademe:
        value: "42878198300039"
        summary: SIRET pour ADEME RGE
      siret_qualifelec:
        value: "42054064300376"
        summary: SIRET pour Qualifelec
      siret_qualiopi:
        value: "81841109200013"
        summary: SIRET pour Qualiopi

  siret_or_rna:
    description: "Siret de l'association ou le numéro RNA"
    examples:
      openstreetmap_france: &openstreetmap_france
        value: W751212517
        summary: ID RNA Openstreetmap France
      croix_rouge:
        value: "77567227221138"
        summary: SIRET de la Croix-Rouge France

  siren_or_rna:
    description: "Siren de l'association ou le numéro RNA"
    examples:
      openstreetmap_france: *openstreetmap_france
      croix_rouge:
        value: "775672272"
        summary: SIREN de la Croix-Rouge France

  siret_or_eori:
    description: "Siret ou numéro EORI de l'entreprise"
    examples:
      french_siret:
        value: "16002307300010"
        summary: "Siret français"
      french_eori:
        value: "FR16002307300010"
        summary: "Numéro EORI français"
      spanish_eori:
        value: "ESA08536583"
        summary: "Numéro EORI espagnol"

  context:
    description: >-
      "**Cadre de la requête**


      Par exemple : aides publiques, marchés publics ou gestion d’un référentiel tiers utilisé pour tel type d’application."
    example: "Context de test"
  recipient:
    description: >-
      "**Bénéficiaire de l’appel**


      SIRET de l’administration destinatrice des données."
    example: "13002526500013"

  recipient_FC:
    description: >-
      "**Bénéficiaire de l’appel**


      SIRET de l’administration destinatrice des données.

      Ce paramètre est obligatoire dans le cadre des appels via FranceConnect"
    example: "13002526500013"
  object:
    description: >-
      "**La raison de l’appel ou l’identifiant de la procédure.**


      L’identifiant peut être interne à votre organisation ou bien un numéro de marché publique, un nom de procédure ; l’essentiel est que celui-ci vous permette de tracer et de retrouver les informations relatives à l’appel. En effet, vous devez pouvoir justifier de la raison d’un appel auprès du fournisseur de données. Description courte ( < 50 caractères )."
    example: "marché numéro 127"

  civility: &civility
    nomUsage: 
      type: "string"
      description: "Nom d'usage. Ne pas renseigner si présence de jeton FranceConnect."
      example: "DUPONT"
    nomNaissance: 
      type: "string"
      description: "Nom de naissance. Ne pas renseigner si présence de jeton FranceConnect. Le champ est obligatoire pour les appels non FranceConnecté"
      example: "JEAN"
    prenoms: 
      description: "Liste des prénoms. Ne pas renseigner si présence de jeton FranceConnect."
      type: "array"
      minItems: 1
      example: ['PIERRE', 'RICHARD']
    anneeDateDeNaissance:
      description: "Année de naissance. Ne pas la renseigner si celle-ci est inconnue ou en cas de présence de jeton FranceConnect."
      type: integer
      example: 1990
    moisDateDeNaissance:
      description: "Mois de naissance. Ne pas le renseigner si celui-ci est inconnu ou en cas de présence de jeton FranceConnect. Cette valeur est ignorée si anneeDateDeNaissance est vide."
      type: integer
      example: 1
    jourDateDeNaissance:
      description: "Jour de naissance. Ne pas le renseigner si celui-ci est inconnu ou en cas de présence de jeton FranceConnect. Cette valeur est ignorée si moisDateDeNaissance ou anneeDateDeNaissance est vide."
      type: integer
      example: 1
    codeCogInseeCommuneDeNaissance:
      type: string
      minLength: 5
      maxLength: 5
      example: '08480'
      description: "Code Insee à 5 chiffres du lieu de naissance de la personne sur 5 chiffres. Ne pas remplir si la personne est née à l'étranger ou si présence de jeton FranceConnect. En l'absence de jeton FranceConnect et du triplet (nomCommuneNaissance, anneeDateDeNaissance, codeInseeDepartementNaissance), le champ est obligatoire si la personne est née en France"
    codePaysLieuDeNaissance:
      description: "Code Insee à 5 chiffres du pays de naissance (France = 99100). Obligatoire si absence de jeton FranceConnect."
      type: string
      minLength: 5
      maxLength: 5
      example: '99100'
    sexeEtatCivil:
      description: "Sexe de la personne, masculin ou féminin. Obligatoire si absence de jeton FranceConnect."
      type: string
      example: M
      enum:
        - M
        - F
    nomCommuneNaissance:
      type: string
      minLength: 1
      example: 'Gennevilliers'
      description: "Nom de la commune de naissance. En l'absence de jeton FranceConnect et du codeInseeLieuDeNaissance, ce paramètre est obligatoire si la personne est née en France"
    codeInseeDepartementNaissance:
      type: string
      minLength: 2
      maxLength: 3
      example: '92'
      description: "Code INSEE du département de naissance. En l'absence de jeton FranceConnect et du codeInseeLieuDeNaissance, ce paramètre est obligatoire si la personne est née en France"
