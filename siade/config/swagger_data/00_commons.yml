response:
  headers:
    x_response_cached:
      description: "Indique si la réponse a été caché."
    x_cache_expires_in:
      description: "Secondes avant que le cache n'expire. Si le cache est vide, ce header est vide (mais présent)."
    cache_duration_1_hour: "La durée du cache est de 1 heure."
parameters:
  header:
    cache_control:
      description: 'Si cette valeur est fixée à "no-cache", le système de cache est alors ignoré et la donnée est directement récupérée depuis le fournisseur de données.'
  siren:
    description: "Siren de l'entreprise"
    examples:
      siren_octo_technology:
        value: "418166096"
        summary: SIREN Octo Technology
      siren_non_diffusible:
        value: "005572466"
        summary: SIREN entreprise non diffusible
      siren_artisant:
        value: "301123626"
        summary: SIREN entreprise artisanale
      siren_fntp:
        value: "339379984"
        summary: SIREN pour FNTP
      siren_cnetp:
        value: "542036207"
        summary: SIREN pour CNETP
      siren_opqibi:
        value: "515228211"
        summary: SIREN pour OPQIBI
      siren_entrepreneur_individuel:
        value: "389839937"
        summary: SIREN d'un entrepeneur individuel (cessé)
      siren_marques_brevets_modeles:
        value: "542065479"
        summary: SIREN d'une entreprise ayant des marques, brevets et modèles (INPI)

  siret:
    description: "Siret de l'établissement"
    examples:
      siret_octo_technology:
        value: "41816609600069"
        summary: SIRET Octo Technology
      siret_non_diffusible:
        value: "00557246600026"
        summary: SIRET établissement non diffusible
      siret_msa:
        value: "81104725700019"
        summary: SIRET pour MSA
      siret_probtp:
        value: "43841606700017"
        summary: SIRET pour ProBTP
      siret_qualibat:
        value: "78824266700020"
        summary: SIRET pour Qualibat
      siret_entrepreneur_individuel:
        value: "38983993700015"
        summary: SIRET d'un entrepreneur individuel (fermé)
      siret_ademe:
        value: "42878198300039"
        summary: SIRET pour ADEME RGE
      siret_qualifelec:
        value: "42054064300376"
        summary: SIRET pour Qualifelec
      siret_qualiopi:
        value: "81841109200013"
        summary: SIRET pour Qualiopi

  siret_or_rna:
    description: "Siret de l'association ou le numéro RNA"
    examples:
      openstreetmap_france: &openstreetmap_france
        value: W751212517
        summary: ID RNA Openstreetmap France
      croix_rouge:
        value: "77567227221138"
        summary: SIRET de la Croix-Rouge France

  siren_or_rna:
    description: "Siren de l'association ou le numéro RNA"
    examples:
      openstreetmap_france: *openstreetmap_france
      croix_rouge:
        value: "775672272"
        summary: SIREN de la Croix-Rouge France

  siret_or_eori:
    description: "Siret ou numéro EORI de l'entreprise"
    examples:
      french_siret:
        value: "16002307300010"
        summary: "Siret français"
      french_eori:
        value: "FR16002307300010"
        summary: "Numéro EORI français"
      spanish_eori:
        value: "ESA08536583"
        summary: "Numéro EORI espagnol"

  context:
    description: >-
      "**Cadre de la requête**


      Par exemple : aides publiques, marchés publics ou gestion d’un référentiel tiers utilisé pour tel type d’application."
    example: "Context de test"
  recipient:
    description: >-
      "**Bénéficiaire de l’appel**


      SIRET de l’administration destinatrice des données."
    example: "13002526500013"

  recipient_FC:
    description: >-
      "**Bénéficiaire de l’appel**


      SIRET de l’administration destinatrice des données.

      Ce paramètre est obligatoire dans le cadre des appels via FranceConnect"
    example: "13002526500013"
  object:
    description: >-
      "**La raison de l’appel ou l’identifiant de la procédure.**


      L’identifiant peut être interne à votre organisation ou bien un numéro de marché publique, un nom de procédure ; l’essentiel est que celui-ci vous permette de tracer et de retrouver les informations relatives à l’appel. En effet, vous devez pouvoir justifier de la raison d’un appel auprès du fournisseur de données. Description courte ( < 50 caractères )."
    example: "marché numéro 127"

  civility:
    nomNaissance:
      type: "string"
      description: |-
        **Nom de naissance, également appelé nom de famille**. Le nom de naissance est indiqué sur l'acte de naissance, de mariage, sur le livret de famille, etc. Le nom de famille/naissance figure toujours sur la pièce d'identité en premier, avant le nom d'usage si le particulier en a un. 
        
        En cas de changement de nom de naissance, une mention avec le nouveau nom de famille est inscrite sur l'acte de naissance. Pour appeler l'API, le nom de naissance/famille nécessaire est bien le nom de famille modifié.
      example: "DURANT"
    nomUsage: 
      type: "string"
      description: |-
        **Nom d'usage**. Si le particulier a un nom d'usage, c'est le nom qu'il utilise généralement au quotidien. Le nom d'usage est facultatif et peut changer au cours de la vie. Il correspond au nom de famille/naissance d'un parent, d'un époux ou d'une épouse, seul ou accolé au nom de famille/naissance. Par exemple, le nom d'usage ne peut pas être le nom de famille/naissance d'un concubin ou d'un partenaire de pacs. 
        
        Si le particulier en a fait la demande, le nom d'usage peut être inscrit derrière le nom de naissance sur la carte d'identité ou le passeport ; il peut également être celui utilisé par l'administration sur les courriers. Le nom d'usage ne remplace pas le nom de famille/naissance qui reste le seul mentionné. 
        Dans nos APIs, le nom d'usage n'est jamais identique au nom de famille.
        
        Pour en savoir plus : https://www.service-public.fr/particuliers/vosdroits/F868.
      example: "DUPONT DURANT"
    prenoms: 
      description: |-
        **Liste des prénoms**. Dans certains cas, fournir plusieurs prénoms maximise les chances que l'API retrouve le particulier car cela permet de limiter le risque d’homonymie.
      type: "array"
      minItems: 1
      example: ['PIERRE', 'RICHARD']
    anneeDateNaissance:
      description: |-
        **Année de naissance**. 
        
        Pour un particulier né en France, dans le cadre d'un appel à l'API avec l'utilisation du paramètre 'nomCommuneNaissance', ce paramètre est obligatoire (ainsi que le paramètre 'codeCogInseeDepartementNaissance') afin de retrouver le code COG de la commune de naissance.
      type: integer
      example: 1990
    moisDateNaissance:
      description: |-
        **Mois de naissance**.
      type: integer
      example: 1
    jourDateNaissance:
      description: |-
        **Jour de naissance**.
      type: integer
      example: 1
    sexeEtatCivil:
      description: |- 
        **Sexe de la personne tel qu'indiqué sur les actes d'état civil**, comme par exemple l'acte de naissance ou de mariage. Dans la majorité des cas, il s'agit également de la mention indiquée sur la pièce d'identité et le passeport. Cette mention peut être masculin ('M') ou féminin ('F'). 
        Dans le cas d'un particulier ayant demandé une modification de sa mention de sexe à l'état civil, le changement est indiqué en marge de l'acte de naissance une fois la décision rendue. Le changement intervient sur les titres d'identité seulement si le particulier en demande le renouvellement.
      type: string
      example: M
      enum:
        - M
        - F
    codeCogInseePaysNaissance:
      description: |-
        **Code Insee à 5 chiffres du pays de naissance**. Code Insee France = 99100 ; liste de tous les codes Insee des pays étrangers depuis 1943 : https://explore.data.gouv.fr/fr/datasets/58c984b088ee386cdb1261f3/#/resources/150889d3-ffda-4ea5-8709-6ee67415294f.
      type: string
      minLength: 5
      maxLength: 5
      example: '99100'
    codeCogInseeCommuneNaissance:
      type: string
      minLength: 5
      maxLength: 5
      example: '08480'
      description: |-
        **Code Insee à 5 chiffres de la commune de naissance**. Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre est une des deux options disponibles pour renseigner la commune de naissance. En l'absence de l'utilisation de la seconde option (triplet 'nomCommuneNaissance', 'anneeDateNaissance', 'codeInseeDepartementNaissance').

        Ne pas remplir si la personne est née à l'étranger.
    nomCommuneNaissance:
      type: string
      minLength: 1
      example: 'Gennevilliers'
      description: |-
        **Nom en toute lettre de la commune de naissance**. Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre est une des deux options disponibles pour renseigner la commune de naissance. En l'absence de l'utilisation du 'codeCogInseeCommuneNaissance', ce paramètre est obligatoire si la personne est née en France ; il doit être obligatoirement accompagné des paramètres 'codeCogInseeDepartementNaissance' et 'anneeDateNaissance'.

        Ne pas remplir si la personne est née à l'étranger.
    codeCogInseeDepartementNaissance:
      type: string
      minLength: 2
      maxLength: 3
      example: '92'
      description: |-
        **Code INSEE du département de naissance**. Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre fait partie d'une des deux options disponibles pour renseigner la commune de naissance. Lorsque le paramètre 'nomCommuneNaissance' est utilisé, ce paramètre est obligatoire si la personne est née en France et permet de retrouver le code COG avec le paramètre 'anneeDateNaissance'.

        Ne pas remplir si la personne est née à l'étranger.
