mesri:
  scolarite:
    title: "Scolarité"
    description: "Cette API permet de confirmer qu'un étudiant est bien inscrit dans un établissement d'enseignement."
    tags:
      - "Scolarité étudiant"
    parameters:
      nom:
        description: "Nom de l'élève"
        type: string
        example: "Martin"
        required: true
      prenom:
        description: "Prénom de l'élève"
        type: string
        example: "Camille"
        required: true
      sexe:
        description: "Sexe de l'élève; Masculin ou Féminin"
        type: string
        enum:
          - "m"
          - "f"
        required: true
      date_naissance:
        description: "Date de naissance de l'élève au format AAAA-MM-JJ"
        type: string
        example: "2000-01-20"
        required: true
      code_etablissement: &code_etablissement
        title: "Code UAI de l'établissement de l'élève"
        description: "Le code d'unité administrative immatriculée (code UAI) est un code unique inscrit au répertoire national des établissements. Il est composé de 7 chiffres et d'une lettre ; les trois premiers chiffres correspondent au numéro de département de l'établissement.
        \n Pour retrouver facilement le code UAI d'un établissement à partir d' informations plus facilement connues des usagers (commune, code postal, etc.), vous pouvez utiliser l'[API \"Annuaire de l'éducation nationale\" ](https://api.gouv.fr/les-api/api-annuaire-education).
        \n ⚠️ L'établissement 0861288H (CNED Direction générale) n'existe pas dans l'API annuaire de l'éducation nationale, il faudra donc compléter la liste des établissements avec une ligne CNED à laquelle sera associée le code UAI qui sera en passé en entrée."
        type: string
        pattern: '^\d{7}\w$'
        example: "0890003V"
      annee_scolaire:
        title: "Année scolaire de l'élève"
        description: "Format AAAA-AAAA ou AAAA"
        type: string
        pattern: '^(\d{4}$|^\d{4}-\d{4})$'
        examples:
          court:
            summary: "format court"
            value: "2022"
          long:
            summary: "format long"
            value: "2022-2023"
        required: true

    attributes:
      eleve:
        title: "Informations sur l'élève"
        type: object
        properties:
          nom:
            description: "Nom de l'élève"
            type: string
            example: "Martin"
          prenom:
            description: "Prénom de l'élève"
            type: string
            example: "Camille"
          sexe:
            description: "Sexe de l'élève, Masculin ou Féminin"
            type: string
            example: "F"
            enum:
              - "M"
              - "F"
          date_naissance:
            description: "Date de naissance de l'élève au format AAAA-MM-JJ"
            type: string
            example: "2000-01-20"
      code_etablissement: *code_etablissement
      annee_scolaire:
        description: "Année scolaire de l'élève au format AAAA-AAAA"
        type: string
        pattern: '^\d{4}$|^\d{4}-\d{4}$'
        example: "2022-2023"
      est_scolarise:
        description: "Indique si l'élève est scolarisé dans l'établissement"
        type: boolean
        example: true
      est_boursier:
        description: "Indique si l'élève est boursier dans l'établissement"
        type: boolean
        example: false
      code_status_eleve:
        title: "Statut de l'élève"
        description: |+
          Indique le statut sous lequel l'élève est scolarisé dans l'établissement. Les valeurs possibles sont :
          - ST : Scolaire, il s'agit du statut de base renvoyé pour près de 95% des élèves. Ce statut concerne également les élèves qui suivent le CNED (Centre national d'éducation à distance). Ceux-ci peuvent être distingués par l'établissement car ils sont tous affectés au même : `0861288H (CNED DIRECTION GENERALE)`.
          - SQ : Scolaire Loi Quinquennale sur l'Emploi
          - AP : Apprenti
          - FQ : Stagiaire de la Formation Professionnelle
          - CQ : Contrat de Qualification
          - FC : Formation Continue
        type: string
        enum:
          - "ST"
          - "SQ"
          - "AP"
          - "FQ"
          - "CQ"
          - "FC"

