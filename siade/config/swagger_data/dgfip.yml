dgfip:
  attestations_fiscales:
    v3:
      title: &dgfip_attestations_fiscales_title "Attestation fiscale"
      description: &dgfip_attestations_fiscales_description "Attestation fiscale délivrée par la Direction générale des finances publiques (DGFIP), indiquant que l’entreprise est à jour de ses obligations fiscales."
      tags: &dgfip_attestations_fiscales_tags
        - "Attestations sociales et fiscales"
      document_url_properties: &document_url_properties
        title: "URL de téléchargement de l'attestation fiscale (.pdf)"
        type: 'string'
        description: "Ce lien donne accès à l'attestation fiscale au format PDF."
        example: "https://storage.entreprise.api.gouv.fr/siade/1569139162-b99824d9c764aae19a862a0af-attestation_fiscale_dgfip.pdf"
    v4:
      title: *dgfip_attestations_fiscales_title
      description: *dgfip_attestations_fiscales_description
      cache_duration: "Le cache est valide jusqu'au lendemain 8h."
      tags: *dgfip_attestations_fiscales_tags
      attributes:
        document_url: *document_url_properties
        document_url_expires_in:
          title: "Délai avant expiration de l'URL de téléchargement du document'"
          description: "Nombre de secondes avant expiration de l'URL de téléchargement du document. Il s'agit d'une expiration purement technique."
          type: 'integer'
          example: 86400
        date_delivrance_attestation:
          title: "Date de délivrance de l'attestation"
          description: "Date à laquelle l'attestation a été délivrée. Il s'agit en général de la date du jour de l'appel."
          type: 'date'
          example: '2023-04-11'
        date_periode_analysee:
          title: "Date de la période analysée"
          description: "La situation est appréciée au dernier jour du mois précédant la demande de délivrance de l'attestation.
            \n
            \n
            Source: https://bofip.impots.gouv.fr/bofip/8485-PGP.html/identifiant=BOI-DJC-ARF-20220209#Modalites_de_controle_des_o_26"
          example: '2023-03-31'
          type: 'date'

  liasses_fiscales:
    declarations:
      title: "Liasses fiscales"
      description: "Informations renseignées dans les liasses fiscales, issues des déclarations de résultat d’une entreprise auprès de la Direction générale des finances publiques (DGFIP)."
      tags:
        - "Informations financières"
      attributes:
        obligations_fiscales:
          type: 'array'
          title: "Règles d’imposition applicables au résultat de l'unité légale (nommé obf en interne)"
          description: "Une entité légale peut posséder plusieurs règles d'impositions, notamment si celle-ci fait partie d'un groupe."
          items:
            type: 'object'
            additionalProperties: false
            required:
              - id
              - code
              - libelle
              - reference
              - regime
            properties:
              id:
                title: "Identifiant interne dénommé OCFI de la DGFIP"
                description: "Identifiant technique interne de la DGFIP OCFI: Numéro d’OCcurrences FIscales, déterminé par le siren et par les obligations fiscales"
                type: 'string'
                example: '100209489259'
              code:
                type: 'string'
                title: "Code des règles d'imposition applicables au siren"
                description: "Les valeurs possibles sont les suivantes:
                  \n
                  \n
                  - IS: Impôt sur les sociétés
                  \n
                  - BIC: Bénéfices industriels et commerciaux
                  \n
                  - IS GROUPE: Impôt sur les sociétés dû par le groupe
                  \n
                  - BA: Bénéfices agricoles
                  \n
                  - BNC: Bénéfices non commerciaux"
                example: 'IS'
                enum:
                  - 'IS'
                  - 'BIC'
                  - 'IS GROUPE'
                  - 'BA'
                  - 'BNC'
              libelle:
                type: 'string'
                title: "Libellé des règles d'impositions applicables à l'unité légale."
                description: "La liste exhaustive se trouve dans la description du code."
                example: "Impôt sur les sociétés"
              reference:
                title: "Référence d'Obligation Fiscale (ROF)"
                type: 'string'
                description: "Il s'agit du code d'Obligation Fiscale (OBF) suivi d'un numéro
                  d'identifiant qui définit et individualise les obligations fiscales de l'unité légale
                  en fonction de ses activités"
                enum:
                  - IS1
                  - IS2
                  - IS3
                  - ISGROUPE1
                  - ISGROUPE2
                  - ISGROUPE3
                  - BA1
                  - BA2
                  - BA3
                  - BNC1
                  - BNC2
                  - BNC3
                  - BIC1
                  - BIC2
                  - BIC3
              regime:
                title: "Régime d'imposition"
                type: 'string'
                description: "Désigne les règles d’imposition du résultat fiscal de
                   l’entreprise obtenu du référentiel des occurrences fiscales (R-OCFI)"
        declarations:
          type: "array"
          items:
            type: 'object'
            additionalProperties: false
            required:
              - numero_imprime
              - regime
              - date_declaration
              - date_fin_exercice
              - duree_exercice
              - millesime
              - donnees
            properties:
              numero_imprime:
                title: "Numéro d'imprimé"
                type: 'string'
                description: "Numéro du formulaire de la liasse fiscale souscrit par
                  l’unité légale."
                example: "2033A"
              regime:
                title: "Régime d’imposition applicable au résultat fiscal de l'unité légale"
                type: 'object'
                additionalProperties: false
                required:
                  - code
                  - libelle
                properties:
                  code:
                    title: "Code du régime d’imposition applicable au résultat fiscal de l'unité légale"
                    type: 'string'
                    description: "Les valeurs possibles sont les suivantes:
                      \n
                      \n
                      - RN: Réel normal
                      \n
                      - RSI ou RS: Réel simplifié FIXME: A CONFIRMER le RS
                      \n
                      - RNMEMBRE: Réel normal groupe (groupe)
                      \n
                      - RNGROUPE: Réel normal groupe (tête) FIXME: Quel est la différence tête/groupe
                      \n
                      - DECC: Déclaration contrôlée"
                    enum:
                      - RN
                      - RS
                      - RSI
                      - RNMEMBRE
                      - RNGROUPE
                      - DECC
                  libelle:
                    title: "Libellé du régime d’imposition applicable au résultat fiscal de l'unité légale."
                    description: "La liste exhaustive se trouve dans la description du code"
                    type: 'string'
                    example: 'Réel simplifié'
              date_declaration:
                title: "Date de dépôt de la déclaration"
                type: 'string'
                description: "
                  - Si télédéclaration : date de saisie
                  \n
                  - Si dépôt papier : date de réception par les Services des Impôts des Entreprises"
                example: "2012-12-26"
              date_fin_exercice:
                title: "Date de fin d’exercice fiscal de l'unité légale"
                type: 'string'
                description: "Équivalent à la date de fin de la période d'imposition"
                example: "2012-12-31"
              duree_exercice:
                title: "Durée de l'exercice en jours"
                type: 'number'
                description: "Durée de l’exercice fiscal calculée à partir des dates de début et de fin de la période d’imposition déclarées sur la déclaration souscrite par l'unité légale.
                  \n
                  \n
                  Généralement cette valeur est de 365 jours, mais parfois 180 jours. Il y a une obligation fiscale déclarative au 31/12 de chaque année même s’il s’agit d’un dépôt provisoire."

                example: 365
              millesime:
                title: "Millesime"
                type: 'string'
                description: "Code composé de 6 caractères:
                  \n
                  - 4 caractères correspondant à l'année de création ou modification du formulaire. Les valeurs possibles vont de 2006 à l'année courante dès avril, l'année précédente sinon.
                    \n
                  - 2 caractères correspondant au numéro de version du formulaire, commençant à 01"
                example: "201701"
              donnees:
                title: "Données de l'imprimé"
                type: 'array'
                description: "Chaque entrée du tableau correspondant à couple code / valeur, spécifique au numéro d'imprimé référencé à la clé `numero_imprime`"
                items:
                  type: 'object'
                  additionalProperties: false
                  required:
                    - 'code_nref'
                    - 'valeurs'
                  properties:
                    code:
                      title: 'Code'
                      type: 'string'
                      description: "Code permettant d'identifier la donnée, constitué de 2 lettres de AA à ZZ (cf. Code EDI)"
                      example: 'GR'
                    code_EDI:
                      title: 'Code EDI'
                      type: 'string'
                      description: "Le code EDI est utilisé lorsque la liasses fiscale a été souscrite via la filière EDI/TDFC. Il permet l’échange des données de nature comptable et/ou fiscale avec la norme EDIFACT entre la DGFIP et les utilisateurs des téléprocédures EDI "
                      example: 'GR:C889:7111:1:TBX'
                    code_absolu:
                      title: 'Code absolu'
                      type: 'string'
                      description: 'Ce code interne à la DGFIP identifie une seule donnée sur un seul formulaire'
                      example: '2006744'
                    code_type_donnee:
                      title: 'Code Type Donnée'
                      description: 'Ce code détermine la nature de la donnée, le nombre et type des caractères qu’elle peut contenir'
                      type: 'string'
                      example: 'CCI'
                    intitule:
                      title: 'Intitulé'
                      description: 'Intitulé de la donnée. Désigne une donnée correspondant à une case à cocher présente en haut de certains
tableaux de la liasse fiscale'
                      type: 'string'
                      example: 'Déposé néant'
                    code_nref:
                      title: "A un code N-REF correspond un code absolu pour les liasses fiscales. Ces deux codes désignent une seule donnée présente sur un seul formulaire"
                      type: 'string'
                      example: '304651'
                    valeurs:
                      title: "Valeurs associés à l'entrée "
                      description: "Si une entrée de l'imprimé est répétable, le tableau contient plusieurs entrées et sont ordonnées en fonction de l'indice de répétition. Les indices ne sont pas forcément continue, il peut y avoir des valeurs manquantes. Lors que c'est le cas, celle-ci est remplacée par la valeur `null`"
                      type: "array"
                      minItems: 1
                      items:
                        type: 'string'
                      example:
                        - '4245'
                        - null
                        - '5672'

      meta:
        internal_id_itip:
          title: "Identifiant interne dénommé ITIP de la DGFIP"
          type: 'string'
          description: "Identifiant technique interne de la DGFIP ITIP: Identifiant Transversal Informatique de la Personne"
          example: '100004763104'


  chiffres_affaires:
    title: "Chiffre d'affaires"
    description: "Déclarations de chiffre d’affaires, des trois derniers exercices, faites auprès de la Direction générale des finances publiques (DGFIP)."
    tags:
      - "Informations financières"
    attributes:
      # id:
      #   title: "FIXME"
      #   type: "string"
      # type:
      #   title: "Exercice annuel"
      #   type: 'string'
      #   example: 'exercice'
      chiffre_affaires:
        title: "Chiffre d'affaires en euros"
        type: "number"
        example: 900_001
      date_fin_exercice:
        title: "Date de fin de l'exercice"
        type: "string"
        example: "2015-12-01"
  liens_capitalistiques:
    title: "Liens capitalistiques"
    description: "Actionnaires et filiales de l'entreprise déclarés dans les CERFA 2059F et 2059G des liasses fiscales de la DGFIP."
    tags:
      - "Informations financières"
    attributes:
      capital:
        title: "Composition du capital social"
        description: "Informations extraites du CERFA 2059F (nref: 2059F). Si la liasse est absente, l'ensemble des valeurs sont à null"
        type: "object"
        additionalProperties: false
        required:
          - actionnaires
          - repartition
          - depose_neant
        properties:
          actionnaires:
            title: "Liste des actionnaires"
            description: "Liste des actionnaires avec une structure normalisée (nref: structure standardisée issue du serializer)"
            type: "array"
            items:
              type: "object"
              additionalProperties: false
              required:
                - type
                - pourcentage
                - nombre_parts
                - personne_physique_attributes
                - personne_morale_attributes
                - adresse
              properties:
                type:
                  title: "Type d'actionnaire"
                  description: "Type de l'actionnaire, 'personne_morale' ou 'personne_physique' (nref: valeur fixe)"
                  type: "string"
                  enum:
                    - "personne_morale"
                    - "personne_physique"
                pourcentage:
                  title: "Pourcentage de détention"
                  description: "Pourcentage de détention de l'actionnaire (nref: 304861 pour personne morale, 304871 pour personne physique)"
                  type: "number"
                  example: 51.0
                nombre_parts:
                  title: "Nombre de parts"
                  description: "Nombre de parts détenues par l'actionnaire (nref: 304860 pour personne morale, 304870 pour personne physique)"
                  type: "number"
                  example: 510
                personne_physique_attributes:
                  title: "Attributs de la personne physique"
                  description: "Attributs spécifiques pour une personne physique. Si l'actionnaire n'est pas de type 'personne_physique', tous les champs seront null (nref: 306874, 304868, 304869, 304878, 905900, 905901, 905902)"
                  type: "object"
                  additionalProperties: false
                  required:
                    - civilite
                    - nom_patronymique_et_prenoms
                    - nom_marital
                    - date_naissance
                    # - ville_naissance
                    # - departement_naissance
                    # - pays_naissance
                  properties:
                    civilite:
                      title: "Civilité"
                      description: "Civilité de la personne physique (nref: 306874)"
                      type: "string"
                      example: "M"
                      nullable: true
                    nom_patronymique_et_prenoms:
                      title: "Nom patronymique et prénoms"
                      description: "Nom patronymique et prénoms (nref: 304868)"
                      type: "string"
                      example: "CHIRAC Jacques"
                      nullable: true
                    nom_marital:
                      title: "Nom marital"
                      description: "Nom marital (nref: 304869)"
                      type: "string"
                      example: "NS"
                      nullable: true
                    date_naissance:
                      title: "Date de naissance"
                      description: "Date de naissance (nref: 304878), le jour n'est pas renvoyé"
                      additionalProperties: false
                      type: object
                      required:
                        - annee
                        - mois
                      properties:
                        annee:
                          title: "Année de la date de naissance"
                          type: "string"
                          example: "1932"
                          nullable: true
                        mois:
                          title: "Mois de la date de naissance"
                          type: "string"
                          example: "11"
                          nullable: true
                    # ville_naissance:
                    #   title: "Ville de naissance"
                    #   description: "Ville de naissance (nref: 905900)"
                    #   type: "string"
                    #   example: "PARIS"
                    #   nullable: true
                    # departement_naissance:
                    #   title: "Département de naissance"
                    #   description: "Département de naissance (nref: 905901)"
                    #   type: "string"
                    #   example: "75005"
                    #   nullable: true
                    # pays_naissance:
                    #   title: "Pays de naissance"
                    #   description: "Pays de naissance (nref: 905902)"
                    #   type: "string"
                    #   example: "FRANCE"
                    #   nullable: true
                personne_morale_attributes:
                  title: "Attributs de la personne morale"
                  description: "Attributs spécifiques pour une personne morale. Si l'actionnaire n'est pas de type 'personne_morale', tous les champs seront null ou 'NS' (nref: 304859, 304857, 304858, 306875)"
                  type: "object"
                  additionalProperties: false
                  required:
                    - siren
                    - denomination
                    - complement_denomination
                    - forme_juridique
                  properties:
                    siren:
                      title: "SIREN"
                      description: "Identifiant SIREN de la personne morale (nref: 304859)"
                      type: "string"
                      example: "110001013"
                      nullable: true
                    denomination:
                      title: "Dénomination"
                      description: "Dénomination de la personne morale (nref: 304857)"
                      type: "string"
                      example: "GOUVERNEMENT PREMIER MINISTRE"
                      nullable: true
                    complement_denomination:
                      title: "Complément de dénomination"
                      description: "Complément de dénomination de la personne morale (nref: 304858)"
                      type: "string"
                      nullable: true
                    forme_juridique:
                      title: "Forme juridique"
                      description: "Forme juridique (nref: 306875)"
                      type: "string"
                      example: "NS"
                      nullable: true
                adresse:
                  title: "Adresse de l'actionnaire"
                  description: "Adresse de l'actionnaire (nref: pour personne morale [304862-304867] et pour personne physique [304872-304877])"
                  type: "object"
                  additionalProperties: false
                  required:
                    - numero
                    - voie
                    - lieu_dit_hameau
                    - code_postal
                    - ville
                    - pays
                  properties:
                    numero:
                      title: "Numéro"
                      description: "Numéro de l'adresse (nref personne morale: 304862 | 304872)"
                      type: "string"
                      example: "0057"
                      nullable: true
                    voie:
                      title: "Voie"
                      description: "Voie de l'adresse (nref personne morale: 304863 | personne physique: 304873)"
                      type: "string"
                      example: "RUE DE VARENNE"
                      nullable: true
                    lieu_dit_hameau:
                      title: "Lieu-dit / Hameau"
                      description: "Lieu-dit ou hameau (nref personne morale: 304864 | personne physique: 304874)"
                      type: "string"
                      nullable: true
                    code_postal:
                      title: "Code postal"
                      description: "Code postal (nref personne morale: 304865 | personne physique: 304875)"
                      type: "string"
                      example: "75007"
                      nullable: true
                    ville:
                      title: "Ville"
                      description: "Ville (nref personne morale: 304866 | personne physique: 304876)"
                      type: "string"
                      example: "PARIS"
                      nullable: true
                    pays:
                      title: "Pays"
                      description: "Pays, code iso 3166 (nref personne morale: 304867 | personne physique: 304877)"
                      type: "string"
                      example: "FR"
                      nullable: true
          repartition:
            title: "Répartition des actions"
            description: "Répartition des actions entre personnes physiques et personnes morales (nref: 309326 et 309325 pour personnes physiques, 309324 et 309323 pour personnes morales). Si la liasse est absente, l'ensemble des valeurs sont à null"
            type: "object"
            additionalProperties: false
            required:
              - personnes_physiques
              - personnes_morales
            properties:
              personnes_physiques:
                title: "Personnes physiques"
                description: "Détail des actions détenues par les personnes physiques (nref: total_actions 309326, nombre 309325)"
                type: "object"
                additionalProperties: false
                required:
                  - total_actions
                  - nombre
                properties:
                  total_actions:
                    title: "Total des actions"
                    description: "Total des actions des personnes physiques (nref: 309326)"
                    type: "number"
                    example: 490
                    nullable: true
                  nombre:
                    title: "Nombre d'actions"
                    description: "Nombre d'actions répertoriées pour les personnes physiques (nref: 309325)"
                    type: "number"
                    example: 2
                    nullable: true
              personnes_morales:
                title: "Personnes morales"
                description: "Détail des actions détenues par les personnes morales (nref: total_actions 309324, nombre 309323)"
                type: "object"
                additionalProperties: false
                required:
                  - total_actions
                  - nombre
                properties:
                  total_actions:
                    title: "Total des actions"
                    description: "Total des actions des personnes morales (nref: 309324)"
                    type: "number"
                    example: 510
                    nullable: true
                  nombre:
                    title: "Nombre d'actions"
                    description: "Nombre d'actions répertoriées pour les personnes morales (nref: 309323)"
                    type: "number"
                    example: 1
                    nullable: true
          depose_neant:
            title: "État du dépôt du formulaire 2059F"
            description: "Indique l'état du dépôt du formulaire 2059F concernant la composition du capital social :
             \n
             \n
             - false : l’imprimé est bien déposé et contient des données.
             \n
             - true : l’imprimé est déposé à néant (vide).
             \n
             - null : l’imprimé est complètement absent.
             \n
             \n
             (nref: 305767)"
            type: "boolean"
            example: false
            nullable: true
      participations:
        title: "Participations"
        description: "Informations sur les participations de l'entreprise (nref: 2059G)"
        type: "object"
        additionalProperties: false
        required:
          - filiales
          - nombre_filiales
          - depose_neant
        properties:
          filiales:
            title: "Liste des filiales"
            description: "Liste des filiales de l'entreprise (nref: siren 304960, denomination 304958, complement_denomination 304959, forme_juridique 306876, pourcentage_detention 304967, adresse [304961 à 304966])"
            type: "array"
            items:
              type: "object"
              additionalProperties: false
              required:
                - siren
                - denomination
                - complement_denomination
                - forme_juridique
                - pourcentage_detention
                - adresse
              properties:
                siren:
                  title: "SIREN de la filiale"
                  description: "Identifiant SIREN de la filiale (nref: 304960)"
                  type: "string"
                  example: "130007669"
                denomination:
                  title: "Dénomination"
                  description: "Dénomination de la filiale (nref: 304958)"
                  type: "string"
                  example: "ANSII"
                complement_denomination:
                  title: "Complément de dénomination"
                  description: "Complément de dénomination de la filiale (nref: 304959)"
                  type: "string"
                  nullable: true
                forme_juridique:
                  title: "Forme juridique"
                  description: "Forme juridique de la filiale (nref: 306876)"
                  type: "string"
                  example: "SA"
                pourcentage_detention:
                  title: "Pourcentage de détention"
                  description: "Pourcentage de détention dans la filiale (nref: 304967)"
                  type: "number"
                  example: 42.0
                adresse:
                  title: "Adresse de la filiale"
                  description: "Adresse de la filiale (nref: numéro 304961, voie 304962, lieu_dit_hameau 304963, code_postal 304964, ville 304965, pays 304966)"
                  type: "object"
                  additionalProperties: false
                  required:
                    - numero
                    - voie
                    - lieu_dit_hameau
                    - code_postal
                    - ville
                    - pays
                  properties:
                    numero:
                      title: "Numéro"
                      description: "Numéro de l'adresse (nref: 304961)"
                      type: "string"
                      example: "0051 BOULEVARD DE LA TOUR-MAUBOURG"
                    voie:
                      title: "Voie"
                      description: "Voie de l'adresse (nref: 304962)"
                      type: "string"
                      nullable: true
                    lieu_dit_hameau:
                      title: "Lieu-dit / Hameau"
                      description: "Lieu-dit ou hameau (nref: 304963)"
                      type: "string"
                      nullable: true
                    code_postal:
                      title: "Code postal"
                      description: "Code postal (nref: 304964)"
                      type: "string"
                      example: "75007"
                    ville:
                      title: "Ville"
                      description: "Ville (nref: 304965)"
                      type: "string"
                      example: "PARIS"
                    pays:
                      title: "Pays"
                      description: "Pays, code iso 3166 (nref: 304966)"
                      type: "string"
                      example: 'FR'
                      nullable: true
          nombre_filiales:
            title: "Nombre de filiales"
            description: "Nombre de filiales déclarées (nref: 309327)"
            type: "number"
            example: 1
          depose_neant:
            title: "État du dépôt du formulaire 2059G"
            description: "Indique l'état du dépôt du formulaire 2059G concernant les filiales et participations :
             \n
             \n
             - false : l’imprimé est bien déposé et contient des données.
             \n
             - true : l’imprimé est déposé à néant (vide).
             \n
             - null : l’imprimé est complètement absent.
