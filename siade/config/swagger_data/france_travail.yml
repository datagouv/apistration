france_travail:
  commons:
    parameters:
      identifiant:
        required: true
        description: Identifiant France Travail choisi par le particulier lors de la création de son espace personnel en ligne.
        type: string
        example: 'jean.dupont33'


  statut:
    title: Statut demandeur d'emploi
    description: |
        Données d'identité, de contact et de statut du demandeur d'emploi.
        **Paramètres d'appel :** Nom d’utilisateur France Travail choisi par le particulier lors de la création de son espace personnel en ligne
        **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/api_particulier_v2_pole_emploi_statut)

    tags:
      - Statut demandeurs d'emploi
    attributes:
      identifiant:
        title: Nom d'utilisateur France Travail
        type: string
        description: |
          Identifiant France Travail, tel qu'il a été renseigné
          en paramètre d'appel. Cet identifiant est le nom d'utilisateur
          tel que choisi par le particulier lors de la création de son
          espace personnel en ligne.
        example: martin.jacques
      civilite:
        title: Civilité
        description: Civilité du demandeur d'emploi, Madame ou Monsieur
        type: string
        example: M.
        enum:
        - MME
        - M.
      nom:
        title: Nom de naissance
        type: string
        description: Nom de naissance du demandeur d'emploi
        example: MARTIN
      nom_usage:
        title: Nom d'usage
        type: string
        description: Nom d'usage du demandeur d'emploi
        nullable: true
        example:
      prenom:
        title: Prénom
        type: string
        example: JACQUES
        description: Prénom ddu demandeur d'emploi, limité à 13 caractères
      sexe:
        title: Sexe
        type: string
        description: Sexe du demandeur d'emploi
        example: Masculin
      date_naissance:
        title: Date de naissance
        format: date
        type: string
        description: Date de naissance du demandeur d'emploi au format YYYY-MM-DD
        example: 1995-02-02
      code_certification_cnav:
        title: Code du statut de certification d'identité CNAV
        type: string
        description: |
          France Travail dépend d'un flux de certification
          d'identité émis par la CNAV, un particulier peut avoir été
          certifié ou non. Sont considérés comme certifiés, les statuts suivants :
            - VC IDENTITE CERTIFIEE
            - IC : IDENTITE ASSIMILEE CERTIFIEE
            - PC : IDENTITE CERTIFIEE PARTIELLEMENT
          Sont considérés comme non-certifiés :
            - AC : ATTENTE TRAITEMENT RETOUR CNAV
            - DC : DEMANDE CERTIF. ENVOYEE
            - EC : ECHEC DE CERTIFICATION CNAV
            - RC : REFUS PROPOSITION DE CERTIFICATION
            - null : IDENTITE NON CERTIFIEE
        example: VC
        enum:
        - VC
        - IC
        - PC
        - AC
        - DC
        - RC
        - null
      telephone:
        title: Téléphone principal
        type: string
        description: Numéro de téléphone principal du demandeur d'emploi
        example: '0636676767'
      telephone2:
        title: Téléphone secondaire
        type: string
        description: Numéro de téléphone secondaire du demandeur d'emploi
        nullable: true
        example: '1122334455'
      email:
        title: E-mail
        type: string
        nullable: true
        description: Adresse e-mail du demandeur d'emploi
        example: martin.jacques@france.fr
      adresse:
        title: Adresse
        type: object
        description: Adresse du demandeur d'emploi, déclarée par le particulier
          lors de son inscription à France Travail ou suite à une déclaration
          de changement d’adresse.
        properties:
          code_postal:
            type: string
            description: Code postal
            example: '75001'
          insee_commune:
            type: string
            example: '75101'
          localite:
            type: string
            example: 75001 Paris
          ligne_voie:
            type: string
            example: 21 RUE DES MARMOTS
          ligne_complement_destinataire:
            type: string
            nullable: true
            example: Appartement 42
          ligne_complement_adresse:
            type: string
            nullable: true
            example:
          ligne_complement_distribution:
            type: string
            nullable: true
            example:
          ligne_nom:
            type: string
            example: MARTIN
      date_inscription:
        title: Date d'inscription
        format: date
        type: string
        description: Date d'inscription à France Travail au format YYYY-MM-DD
        example: 2021-01-07
      date_cessation_inscription:
        title: Date de cessation d'inscription au format YYYY-MM-DD
        description: Date de cessation d'inscription à France Travail
        type: string
        format: date
        nullable: true
        example: 2023-03-12
      code_categorie_inscription:
        title: Code de la catégorie d'inscription
        description: |
          Code de la catégorie d'inscription du particulier à France Travail.
            - 1 : PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN TPS
            - 2 : PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PARTIEL
            - 3 : PERSONNE SANS EMPLOI DISPONIBLE DUREE DETERMINEE OU SAISON
            - 4 : PERSONNE SANS EMPLOI NON DISPONIBLE IMMEDIATEMENT
            - 5 : PERSONNE POURVUE D'UN EMPLOI A LA RECHERCHE D'UN AUTRE"
        type: integer
        example: 1
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
      libelle_categorie_inscription:
        title: Libellé de la catégorie d'inscription
        description: Libellé de la catégorie d'inscription du particulier
          à France Travail, associé au cod précédent.
        type: string
        example: PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN
          TPS
        enum:
        - PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN TPS
        - PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PARTIEL
        - PERSONNE SANS EMPLOI DISPONIBLE DUREE DETERMINEE OU SAISON
        - PERSONNE SANS EMPLOI NON DISPONIBLE IMMEDIATEMENT
        - PERSONNE POURVUE D'UN EMPLOI A LA RECHERCHE D'UN AUTRE

  indemnites:
    title: "Paiements versés par France Travail"
    description: "Ensemble des paiements versés par France Travail au particulier"
    tags:
      - Paiements versés par France Travail
    parameters:
      identifiant:
        required: true
        description: Identifiant France Travail choisi par le particulier lors de la création de son espace personnel en ligne.
        type: string
        example: 'jean.dupont33'
    attributes:
      identifiant:
        title: Nom d'utilisateur France Travail
        type: string
        description: Identifiant France Travail, tel qu'il a été renseigné en paramètre d'appel. Cet identifiant est le nom d'utilisateur tel que choisi par le particulier lors de la création de son espace personnel en ligne.
        example: 'jean.dupont33'
      paiements:
        title: "Paiements"
        description: "Liste des paiements versés"
        type: array
        minItems: 1
        items:
          title: "Paiement"
          type: object
          properties:
            date:
              title: Date du paiement
              type: string
              example: '2021-01-01'
            montant:
              title: Montant total
              description: Montant total du paiement. Il s'agit de la somme des allocations, aides et autres paiements, moins le prélèvement de l'impôt à la source.
              type: number
              example: 123.4
            allocations:
              title: Allocations
              description: Part du montant correspondant aux paiements d’allocations (Allocation d'aide au retour à l'emploi, Allocation de sécurisation professionnelle, Allocation de solidarité spécifique, Allocation pour les travailleurs indépendants, Rémunération de formation France Travail, Rémunération de fin de formation, Allocation de fin de droit, Allocation d'accompagnement personnalisé, Allocation de professionnalisation et de solidarité, Allocation décès, Allocation contrat engagement jeune).
              type: number
              example: 45.1
            aides:
              title: Aides
              description: Part du montant correspondant aux paiements d’aides (Aide à la reprise et à la création d’entreprise, Aide à la mobilité, Aide à la garde d'enfant pour parent isolé, Aide fin de droit, Aide aux congés non payés, Aide à la valorisation des acquis par l'expérience, Aide du fond de sécurisation du secteur automobile, Aide ponctuelle jeune, Aide régionale, Aide aux demandeurs d'emploi longue durée, Aide exceptionnelle de solidarité, Prime de reclassement).
              type: number
              example: 12.21
            autres:
              title: Autres paiements
              description: Part du montant correspondant à d’autres paiements (Prime de Noel, Indemnité différentielle de reclassement, Acompte, Avance, Reversement).
              type: number
              example: 2.34

