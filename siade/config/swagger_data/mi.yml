mi:
  v3/association:
    title: &association_title "Données du RNA d'une association"
    description: &association_description "Informations issues du répertoire national des associations (RNA), telles que la date de création, l’adresse du siège et les dirigeants."
    tags:
      - "Informations générales"
    attributes:
      rna_id:
        type: "string"
        title: "Identifiant RNA"
      titre:
        type: "string"
        example: "LA PRÉVENTION ROUTIERE"
      objet:
        type: "string"
        example: "Accroitre la sécurité des usagers en encourageant toutes mesures ou initiatives propres à réduire les accidents"
        description: "Il s'agit d'une description courte mais exhaustive des activités de l'organisme."
      siret:
        type: "string"
        nullable: true
        example:
      siret_siege_social:
        type: "string"
        example: "77571979202650"
        nullable: true
      date_creation:
        type: "string"
        example: "1955-01-01"
        description: "Il s'agit du jour de dépôt du dossier de
          création de l'association à la Préfecture."
      date_declaration:
        type: "string"
        example: "1955-01-01"
        description: "Jour de la dernière déclaration faîte par
          l'association."
      date_publication:
        type: "string"
        nullable: true
        example:
        description: "Jour de la publication au journal officiel
          de l'avis de création de l'association. Toutes les assoiations
          ne sont pas forcément 'déclarées'. La publication au
          Journal Officiel permet à l'association de devenir une
          personne morale, a contrario des 'associations de fait',
          non déclarées au JO."
      date_dissolution:
        type: "string"
        nullable: true
        example:
        description: "Si l'association est dissolue, ce champ indique
          la date de dissolution, autrement, il est indiqué 'null'."
      adresse_siege: &association_adresse_siege
        type: "object"
        additionalProperties: false
        title: "Adresse du siège social de l'association"
        properties: &association_adresse_properties
          complement:
            title: "Complément d'adresse"
            type: "string"
            example: ""
            nullable: true
          numero_voie:
            title: "Numéro de voie"
            type: "string"
            example: "33"
            nullable: true
          type_voie:
            title: "Type de voie"
            type: "string"
            example: "rue"
            nullable: true
          libelle_voie:
            title: "Libellé de la voie"
            type: "string"
            example: "de Modagor"
            nullable: true
          distribution:
            title: "Distribution"
            type: "string"
            nullable: true
          code_insee:
            title: "Code INSEE de la commune"
            type: "string"
            example: "75108"
            nullable: true
          code_postal:
            title: "Code postal de la commune"
            type: "string"
            example: "75009"
            nullable: true
          commune:
            title: "Nom de la commune"
            type: "string"
            example: "Paris"
            nullable: true
      etat:
        type: "boolean"
        example: true
      groupement:
        type: "string"
        nullable: true
        example:
        description: "Trois modalités possibles : si l'association
          n'est pas un groupement, il est indiqué 'Simple'
          ; si l'association est un groupement, la valeur est
          'Union' ou 'Fédération'. La valeur peut aussi être
          manquante (null)"
      mise_a_jour:
        type: "string"
        example: "1955-01-01"

  v3/document_association:
    title: "Divers documents d'une association"
    description: "Divers documents administratifs en PDF tels que les statuts, le récépissé de déclaration de création, la liste des dirigeants..."
    tags:
      - "Informations générales"
    type: "array"
    items:
      type: "object"
      additionalProperties: false
      properties:
        timestamp:
          example: "1631182730"
          description: "Date du dépot du document au format timestamp UNIX"
          type: "string"
        type:
          example: "Statuts"
          description: "Ce sont les différents types de documents, et de fait, pour chaque URL, celui-ci est indiqué. Voici une liste non-exhaustive des options possibles : 'Liste des dirigeants', 'Statuts', 'Procès verbal', 'Récépissé de dissolution', 'Récépissé de modification'..."
          type: "string"
        url:
          example: "https://storage.entreprise.api.gouv.fr/siade/1635505765-5cd08405e4163c9f7713447829aeef7284c3283d-document_asso.pdf"
          description: "L'URL du fichier"
          type: "string"
          nullable: true
        expires_in:
          title: "Nombre de secondes avant expiration du lien URL"
          type: "integer"
          nullable: true
        errors:
          title: "Détail de l'erreur survenue au traitement du fichier (URL fourni par le fournisseur de données invalide, fichier corrompu, ...)"
          type: "array"
          items:
            type: "string"
    meta:
      nombre_documents:
        example: 1
        description: "Le nombre total de documents disponibles"
        type: "integer"
      nombre_documents_deficients:
        example: 0
        description: "Le nombre de documents ignorés car déficients (indisponibles, PDF invalide etc...)"
        type: "integer"
  v4/unite_legale_shared:
    flat_attributes: &unite_legale_shared_flat_attributes
      rna:
        type: "string"
        title: "Numéro RNA"
        description: "Numéro identifiant de toute association inscrite au répertoire national des associations (RNA). Il est constitué de la lettre W suivie de 9 chiffres.
\n
\n
Cas particulier : Si l'association relève du droit local d'Alsace-Moselle, elle n'est pas immatriculée au RNA et ne possède donc pas de numéro RNA. Dans ce cas, le champ est vide.
        example: "W751080001"
        nullable: true
      ancien_id:
        type: "string"
        title: "Ancien identifiant de l'entité avant l'arrêté du 14 octobre 2009 portant la création du RNA"
        example: "1234567890"
        nullable: true
      siren:
        type: "string"
        title: "Numéro SIREN"
        description: "Numéro identifiant des associations inscrites au répertoire Sirene. Cet enregistrement n'est pas obligatoire : pour les associations qui n'ont pas de numéro SIREN, le champ est vide."
        example: "751080001"
        nullable: true
      nom:
        title: "Nom de l'association (raison sociale)"
        description: "Ce nom provient du répertoire national des associations (RNA) ou du répertoire Sirene. Si le régime de l'association est indiqué \"Loi 1901\", le nom provient toujours du RNA."
        type: "string"
        example: "LA PRÉVENTION ROUTIERE"
      active:
        title: "État de l'association"
        type: "boolean"
        example: true
        description: "L'association est active si elle est enregistrée à la Préfecture et si elle n'a pas été dissoute. Si le régime de l'association est \"Loi 1901\" l'information provient du RNA, autrement elle est issue du répertoire Sirene."
      sigle:
        title: "Sigle de l'association"
        description: "Ce sigle provient du répertoire national des associations (RNA) ou du répertoire Sirene. Si le régime de l'association est indiqué \"Loi 1901\", le nom provient toujours du RNA."
        type: "string"
        example: "LPR"
        nullable: true
      reconnue_utilite_publique:
        title: "Indique si l'association est reconnue d'utilité publique"
        type: "boolean"
        example: false
      siret_siege:
        title: "Numéro SIRET du siège social"
        description: "Les établissements sièges des  associations inscrites au répertoire Sirene ont un numéro identifiant : le SIRET. Pour les associations qui ne sont pas répertoriées, le champ est vide."
        type: "string"
        example: "75108000100013"
        nullable: true
      forme_juridique:
        type: "object"
        additionalProperties: false
        title: "Forme juridique"
        required:
          - code
          - libelle
        properties:
          code:
            title: "Code de la forme juridique de l'unité légale"
            type: "string"
            example: "9220"
            description: "Nomenclature exhaustive fournie par l'Insee : https://www.insee.fr/fr/information/2028129"
            nullable: true
          libelle:
            title: "Libellé associé au code de la forme juridique de l'unité légale"
            type: "string"
            example: "Association déclarée"
            description: "indique le libellé correspondant au code juridique.
            Si le code ne correspond à aucun libellé la valeur 'non référencé' est utilisée.
            \n
            \n
            Nomenclature exhaustive fournie par l'Insee : https://www.insee.fr/fr/information/2028129"
            nullable: true
      regime:
        title: "Régime de l'association"
        type: "string"
        description: "Les deux régimes possibles sont 'Loi 1901' et 'Alsace-Moselle'.
        \n
        \n
        Le régime \"Loi 1901\" est le cas général des associations établies en France. Les associations dont le siège se trouve en Alsace et en Moselle sont régies par un droit local, dit \"régime Alsace-Moselle\".
        \n
        \n
        Cette information provient des documents administratifs complémentaires (DAC).
        \n
        \n
        Pour en savoir plus sur les particularités du régime Alsace-Moselle : https://www.associations.gouv.fr/le-droit-local-des-associations-en-alsace-moselle.html"
        example: "Loi 1901"
        enum:
          - "Loi 1901"
          - "Alsace-Moselle"
      groupement:
        title: "Type de groupement"
        description: "Une association peut faire partie d'un groupement de type union ou fédération.
        \n
        \n
        Ce champ est à 'Simple' si l'association n'est pas membre d'un groupement."
        type: "string"
        example: "Simple"
        enum:
          - "Simple"
          - "Fédération"
          - "Union"
        nullable: true
      eligibilite_cec:
        title: "Indique si l'association est éligible au CEC"
        description: "Indique si l'association est éligible au compte d'engagement citoyen (CEC). Ce dispositif permet de bénéficier de droits à formation supplémentaires et vise valoriser l'engagement bénévole de responsables associatifs.

Pour en savoir plus sur le CEC : https://www.associations.gouv.fr/le-compte-d-engagement-citoyen-qu-est-ce-que-c-est.html "
        type: "boolean"
        example: false
        enum:
          - true
          - false
      raison_non_eligibilite_cec:
        title: "Raison de l'inéligibilité au CEC"
        description: "Ce champ est vide si l'association est éligible au CEC."
        type: "string"
        example: "L’association n’a pas trois ans d’existence"
        enum:
          - "L’association n’a pas trois ans d’existence"
          - "L’objet de l’association ne rentre pas dans les critères d’éligibilité au CEC"
          - "L’association n’a pas trois ans d’existence et son objet ne rentre pas dans les critères d’éligibilité au CEC"
        nullable: true
      impots_commerciaux:
        title: "Indique si l'association est assujettie aux impôts commerciaux"
        description: "En fonction de ses missions et de ses activités, une association peut être soumise aux impôts commerciaux (à la TVA ou à l’impôt sur les sociétés). Ce cas particulier concerne notamment les associations exerçant une activité lucrative.
        \n
        \n
        En savoir plus : https://www.associations.gouv.fr/l-association-et-les-impots-commerciaux.html"
        type: "boolean"
        example: true

      date_creation:
        title: "Date de création de l'association"
        description: "La date de création provient en priorité de la base RNA si celle-ci est présente, sinon de la base Sirene."
        type: "string"
        format: "date"
        example: "2015-01-01"
        nullable: true
      date_dissolution:
        title: "Date de dissolution de l'association"
        description: "La date de dissolution provient en priorité de la base RNA si celle-ci est présente, sinon de la base Sirene."
        type: "string"
        format: "date"
        example: "2016-01-01"
        nullable: true
      date_publication_reconnue_utilite_publique:
        title: "Date de publication de la reconnaissance d'utilité publique"
        type: "string"
        format: "date"
        example: "2017-01-01"
        nullable: true
      date_publication_journal_officiel:
        title: "Date de publication au Journal Officiel de la création de l'association"
        description: "Cette information est exclusive aux associations \"Loi 1901\" et provient du répertoire national des associations (RNA)."
        type: "string"
        format: "date"
        example: "2018-01-01"
        nullable: true
      adresse_siege: *association_adresse_siege
      adresse_gestion:
        type: "object"
        additionalProperties: false
        title: "Adresse de gestion de l'association"
        description: "L'adresse de gestion est l'adresse à laquelle se trouve les bureaux administratifs."
        properties: *association_adresse_properties
      alsace_moselle:
        title: "Attributs relatifs aux associations de droit local d'Alsace-Moselle"
        description: "Ces information proviennent des documents administratifs complémentaires (DAC). Les attributs sont vides si l'association est une association \"Loi 1901\"."
        type: "object"
        additionalProperties: false
        required:
          - tribunal_instance
          - volume
          - folio
          - date_publication_registre_association
        properties:
          tribunal_instance:
            title: "Tribunal d'instance"
            type: "string"
            example: "Tribunal d'instance de Strasbourg"
            nullable: true
            enum:
              - Tribunal d'instance de Metz
              - Tribunal d'instance de Saint-Avold
              - Tribunal d'instance de Sarrebourg
              - Tribunal d'instance de Sarreguemines
              - Tribunal d'instance de de Thionville
              - Tribunal d'instance de Haguenau
              - Tribunal d'instance d’Illkirch
              - Tribunal d'instance de Molsheim
              - Tribunal d'instance de Saverne
              - Tribunal d'instance de Schiltigheim
              - Tribunal d'instance de Sélestat
              - Tribunal d'instance de Strasbourg
              - Tribunal d'instance de Colmar
              - Tribunal d'instance de Guebwiller
              - Tribunal d'instance de Mulhouse
              - Tribunal d'instance de Thann
          volume:
            title: "Volume du registre du tribunal d'instance"
            type: "string"
            example: "122"
            nullable: true
          folio:
            title: "Folio du volume du registre du tribunal d'instance"
            type: "string"
            example: "082"
            nullable: true
          date_publication_registre_association:
            title: "Date de publication au registre des associations d'Alsace-Moselle"
            type: "string"
            format: "date"
            example: "2019-01-01"
            nullable: true
      composition_reseau:
        title: "Composition du réseau, de l'union ou de la fédération"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - nom
            - rna
            - siret
            - telephone
            - courriel
            - objet
            - adresse
            - site_web
          properties:
            nom:
              type: "string"
              title: "Nom du membre du réseau"
              example: "Association des parents d'élèves de l'école primaire de la ville"
            rna:
              type: "string"
              title: "Numéro RNA du membre du réseau"
              example: "W123456789"
              nullable: true
            siret:
              type: "string"
              title: "Numéro SIRET du membre du réseau"
              example: "12345678901234"
              nullable: true
            telephone:
              type: "string"
              title: "Numéro de téléphone du membre du réseau"
              example: "0123456789"
              nullable: true
            courriel:
              type: "string"
              title: "Courriel du membre du réseau"
              example: "reseau@association.fr"
              nullable: true
            objet:
              type: "string"
              title: "Objet du membre du réseau"
              example: "Promouvoir l'engagement des parents d'élèves dans l'éducation de leurs enfants"
            adresse: *association_adresse_siege
            site_web:
              title: "Site internet du membre du réseau"
              type: "string"
              example: "reseau-association.fr"
              nullable: true
      agrements:
        title: "Liste des agréments administratifs associés à l'association"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - "numero"
            - "date_attribution"
            - "type"
            - "niveau"
            - "attributeur"
            - "url"
          properties:
            numero:
              type: "string"
              title: "Numéro de l'agrément"
              description: "Ce champ étant libre, il n'y a pas de format spécifique."
              example: "05.11.2018"
            date_attribution:
              type: "string"
              format: "date"
              title: "Date d'attribution de l'agrément"
              example: "2018-11-05"
            type:
              type: "string"
              title: "Type d'agrément"
              description: "Liste non-exhaustive des agréments :
                \n
                \n
                - Agriculture
                \n
                - CIDFF
                \n
                - Consommation
                \n
                - Ecologie
                \n
                - Education nationale
                \n
                - Formation
                \n
                - Formation professionnelle
                \n
                - JEP
                \n
                - Santé
                \n
                - Service civique
                \n
                - Sport
                \n
                - Tourisme
                \n
                - Autre
                "
              example: "Formation"
            niveau:
              type: "string"
              title: "Niveau de l'agrément"
              example: "local"
              enum:
                - "national"
                - "local"
            attributeur:
              type: "string"
              title: "Nom de l'organisme qui a attribué l'agrément"
              example: "Ministère de l'Education nationale"
            url:
              type: "string"
              title: "URL de l'agrément"
              nullable: true
              example: "https://associations.api.gouv.fr/agrements/05.11.2018.pdf"

    unite_legale_etablissement_shared_attributes: &unite_legale_etablissement_shared_attributes
      siren:
        type: "string"
        title: "Numéro SIREN de l'association à laquelle l'établissement est lié"
        example: "123456789"
      siret:
        type: "string"
        title: "Numéro SIRET de l'établissement"
        example: "12345678900001"
      actif:
        type: "boolean"
        title: "Indique si l'établissement est actif"
        description: "Cette information provient du répertoire Sirene."
        example: true
      siege:
        type: "boolean"
        title: "Indique si l'établissement est le siège de l'association"
        description: "Cette information provient du répertoire Sirene."
        example: true
      nom:
        type: "string"
        title: "Enseigne de l'établissement"
        description: "Cette valeur est très rarement renseignée. Elle provient du répertoire Sirene ou des documents administratifs complémentaires (DAC)."
        example: "Croix rouge française"
        nullable: true
      telephone:
        type: "string"
        title: "Numéro de téléphone de l'établissement"
        description: "Cette information provient du répertoire Sirene ou des documents administratifs complémentaires (DAC)."
        example: "0123456789"
        nullable: true
      courriel:
        type: "string"
        title: "Courriel de l'établissement"
        description: "Cette information provient des documents administratifs complémentaires (DAC)."
        example: "contact@association.fr"
        nullable: true
      date_debut_activite:
        type: "string"
        format: "date"
        title: "Date de début d'activité de l'établissement"
        description: "Cette information provient du répertoire Sirene."
        example: "2019-01-01"
        nullable: true
      adresse:
        title: "Adresse de l'établissement"
        description: "Cette information provient du répertoire Sirene."
        type: "object"
        additionalProperties: false
        properties: *association_adresse_properties
      activite_principale: &activite_principale
        type: "object"
        additionalProperties: false
        title: &activite_principale_title "Activité principale"
        description: &activite_principale_title_description "Lorsque l'association est immatriculée au répertoire Sirene, elle se voit attribuer un code APE. Ce code de 4 chiffres + 1 lettre est extrait de la nomenclature d'activité française (NAF) de l'Insee.
        \n
        \n
        Nomemclature d'activité française - NAF rév.2 de l'Insee : https://www.insee.fr/fr/information/2120875"
        required:
          - code
          - libelle
        properties:
          code: &activite_principale_code_property
            type: "string"
            title: "Code de l'activité principale"
            example: "88.99B"
            nullable: true
          libelle: &activite_principale_libelle_property
            type: "string"
            title: "Libellé de l'activité principale"
            example: "Action sociale sans hébergement n.c.a."
            nullable: true
      tranche_effectif: &tranche_effectif
        type: "object"
        additionalProperties: false
        title: &tranche_effectif_title "Tranche d'effectif salarié de l'entité"
        description: &tranche_effectif_description "Pour environ la moitié des établissements, la tranche d'effectif salarié n'est pas renseignée. Il s'agit principalement d'établissements récents (créés il y a moins de trois ans). Les délais de récolte et traitement font que les valeurs indiquées datent de l’année N-2 ou N-3. Cette information est issue du répertoire Sirene et ne concerne donc que les associations qui y sont immatriculées."
        required:
          - code
          - libelle
        properties:
          code: &tranche_effectif_code_property
            type: "string"
            nullable: true
            example: "51"
            nullable: true
            description:
              "Le code effectif indique la tranche d'effectif salarié de l'unité légale. Le nombre de salarié est déterminé en fonction de l'effectif de chacun des établissements de l'unité légale :
              \n
              \n
              - NN : Unités non employeuses (pas de salarié au cours de l'année de référence et pas d'effectif au 31/12). Cette tranche peut contenir quelques effectifs inconnus
              \n
              - 00 : 0 salarié (n'ayant pas d'effectif au 31/12 mais ayant employé des salariés au cours de l'année de référence)
              \n
              - 01 : 1 ou 2 salariés
              \n
              - 02 : 3 à 5 salariés
              \n
              - 03 : 6 à 9 salariés
              \n
              - 11 : 10 à 19 salariés
              \n
              - 12 : 20 à 49 salariés
              \n
              - 21 : 50 à 99 salariés
              \n
              - 22 : 100 à 199 salariés
              \n
              - 31 : 200 à 249 salariés
              \n
              - 32 : 250 à 499 salariés
              \n
              - 41 : 500 à 999 salariés
              \n
              - 42 : 1 000 à 1 999 salariés
              \n
              - 51 : 2 000 à 4 999 salariés
              \n
              - 52 : 5 000 à 9 999 salariés
              \n
              - 53 : 10 000 salariés et plus
              \n
              \n
              Plus d'informations dans la documentation Insee de l'API Sirene : https://www.sirene.fr/sirene/public/variable/tefen."
            enum:
            - "NN"
            - "00"
            - "01"
            - "02"
            - "03"
            - "11"
            - "12"
            - "21"
            - "22"
            - "31"
            - "32"
            - "41"
            - "42"
            - "51"
            - "52"
            - "53"
          libelle: &tranche_effectif_libelle_property
            title: "Intitulé associé au code effectif"
            type: "string"
            nullable: true
            example: "2 000 à 4 999 salariés"

      rhs:
        title: "Information sur les moyens humains"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - annee
            - nombre_benevoles
            - nombre_volontaires
            - nombre_salaries
            - nombre_salaries_etpt
            - nombre_emplois_aides
            - nombre_personnels_detaches
            - nombre_adherents
          properties:
            annee:
              type: "string"
              title: "Année de la donnée"
              example: "2019"
            nombre_benevoles:
              type: "integer"
              title: "Nombre de bénévoles"
              example: 10
            nombre_volontaires:
              type: "integer"
              title: "Nombre de volontaires"
              example: 11
            nombre_salaries:
              type: "integer"
              title: "Nombre de salariés"
              example: 12
            nombre_salaries_etpt:
              type: "number"
              format: "float"
              title: "Nombre de salariés à temps partiel"
              example: 13.0
            nombre_emplois_aides:
              type: "integer"
              title: "Nombre d'emplois aidés"
              example: 14
            nombre_personnels_detaches:
              type: "integer"
              title: "Nombre de personnels détachés"
              example: 15
            nombre_adherents:
              type: "object"
              additionalProperties: false
              title: "Nombre d'adhérents"
              required:
                - total
                - hommes
                - femmes
              properties:
                hommes:
                  type: "integer"
                  title: "Nombre d'adhérents hommes"
                  example: 16
                femmes:
                  type: "integer"
                  title: "Nombre d'adhérentes femmes"
                  example: 17
                total:
                  type: "integer"
                  title: "Nombre d'adhérents total"
                  example: 33
      comptes:
        title: "Comptes de résultat et financements perçus"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - annee
            - commisaire_aux_comptes
            - montant_dons
            - cause_subventions
            - montant_subventions
            - montant_aides_sur_3ans
            - total_charges
            - total_resultat
            - total_produits
          properties:
            annee:
              type: "string"
              title: "Année associée à ce compte"
              example: "2019"
            commisaire_aux_comptes:
              title: "Indique si l'association possède un commissaire aux comptes"
              type: "boolean"
              example: true
            montant_dons:
              title: "Montant des dons perçus"
              type: "number"
              example: 1000.0
            cause_subventions:
              title: "Cause des subventions"
              type: "string"
              example: "Subventions d'investissement"
              nullable: true
            montant_subventions:
              title: "Montant des subventions"
              type: "number"
              example: 1200.0
            montant_aides_sur_3ans:
              title: "Montant total des aides sur 3 ans"
              type: "number"
              example: 1230.0
            total_charges:
              title: "Total des charges"
              type: "number"
              example: 1234.0
            total_resultat:
              title: "Total du résultat"
              type: "number"
              example: 2000.0
            total_produits:
              title: "Total des produits"
              type: "number"
              example: 3000.0

  v4/unite_legale:
    title: "Données association"
    description: "Informations et documents de référence d'une association et de ses établissements, issues du répertoire national des associations (RNA) et des documents administratifs complémentaires (DAC)."
    tags:
      - "Informations générales"
    attributes:
      <<: *unite_legale_shared_flat_attributes
      activites: &unite_legale_activites
        title: "Liste des activités de l'association"
        type: "object"
        additionalProperties: false
        required:
          - objet
          - objet_social1
          - objet_social2
          - champ_action_territorial
          - activite_principale
          - tranche_effectif
          - economie_sociale_et_solidaire
          - date_appartenance_ess
        properties:
          objet:
            title: "Objet de l'association"
            description: "Définit l'objet de l'association et les activités envisagées pour atteindre l'objet. Ce champ délivre l'objet tel que rédigé dans les statuts de l'association."
            type: "string"
            nullable: true
            example: "L'association a pour objet de promouvoir la pratique du sport de haut niveau et de contribuer à la formation des jeunes sportifs."
          objet_social1:
            type: "object"
            additionalProperties: false
            title: "Objet social principal"
            description: &objet_social_description "L'objet social suit la nomenclature nationale Waldec et permet de rattacher l'objet de l'association à une catégorie, comme par exemple : \"centres aérés, colonies de vacances\", \"défense des droits des personnes en situation de handicap\" ou \"loisirs scientifiques et techniques\". La liste exhaustive des objets sociaux est disponible au lien suivant: https://www.data.gouv.fr/fr/datasets/repertoire-national-des-associations-nomenclature-waldec (environ 300 entrées)."
            properties: &objet_social_properties
              code:
                type: "string"
                title: "Code de l'objet social"
                example: "017055"
                nullable: true
              libelle:
                type: "string"
                title: "Libellé de l'objet social"
                example: "accompagnement, aide aux malades"
                nullable: true
          objet_social2:
            type: "object"
            additionalProperties: false
            title: "Objet social secondaire"
            description: *objet_social_description
            properties:
              code:
                type: "string"
                title: "Code de l'objet social"
                example: "009040"
                nullable: true
              libelle:
                type: "string"
                title: "Libellé de l'objet social"
                example: "clubs troisième âge"
                nullable: true
          champ_action_territorial:
            title: "Champ d'action territorial"
            example: "départemental"
            type: "string"
            enum:
              - "national"
              - "international"
              - "régional"
              - "départemental"
              - "local"
            nullable: true
          activite_principale:
            type: "object"
            additionalProperties: false
            title: *activite_principale_title
            description: *activite_principale_title_description
            required:
              - code
              - libelle
              - annee
            properties:
              code: *activite_principale_code_property
              libelle: *activite_principale_libelle_property
              annee:
                title: "Année de l'activité principale"
                type: "string"
                example: "2012"
                nullable: true
          tranche_effectif:
            type: 'object'
            additionalProperties: false
            title: *tranche_effectif_title
            description: *tranche_effectif_description
            required:
              - code
              - libelle
              - annee
            properties:
              code: *tranche_effectif_code_property
              libelle: *tranche_effectif_libelle_property
              annee:
                title: "Année d'affectation du code effectif"
                type: "string"
                example: '2013'
                nullable: true
          economie_sociale_et_solidaire:
            title: "Indique si l'association appartient à de l'économie sociale et solidaire (ESS)"
            type: "boolean"
            nullable: true
            example: true
          date_appartenance_ess:
            title: "Date d'appartenance à l'ESS"
            type: "string"
            format: "date"
            nullable: true
            example: "2019-01-01"
      etablissements:
        title: "Liste des établissements de l'association pour lesquels des informations sont disponibles"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - siren
            - siret
            - siege
            - nom
            - telephone
            - courriel
            - actif
            - date_debut_activite
            - adresse
            - activite_principale
            - tranche_effectif
            - representants_legaux
            - rhs
            - comptes
            - documents_dac
          properties:
            <<: *unite_legale_etablissement_shared_attributes
            representants_legaux:
              title: "Liste des représentants légaux de l'établissement"
              # NOTE: j'exclut les deleted ainsi que les personnes marquées comme est_representant_legal = false
              description: "Les personnes renvoyées dans cette liste sont uniquement celles renseignées comme représentant légal actif. Ces informations proviennent des documents administratifs complémentaires (DAC)."
              type: "array"
              items:
                type: "object"
                additionalProperties: false
                required:
                  - civilite
                  - nom
                  - prenom
                  - courriel
                  - fonction
                  - telephone
                  - valideur_cec
                  - publication_internet
                properties:
                  civilite:
                    type: "string"
                    title: "Civilité du représentant légal"
                    example: "Monsieur"
                  nom:
                    type: "string"
                    title: "Nom du représentant légal"
                    # NOTE voulu car le formatage est random
                    description: "Le nom est systématiquement en majuscule."
                    example: "DUPONT"
                  prenom:
                    type: "string"
                    title: "Prénom du représentant légal"
                    # NOTE voulu car le formatage est random
                    description: "Le prénom est systématiquement en majuscule."
                    example: "JEAN"
                  fonction:
                    type: "string"
                    title: "Fonction du représentant légal"
                    description: "Il s'agit d'un champ déroulant avec possibilité de modification libre, la liste des fonctions est donc non exhaustive."
                    example: "Président"
                  valideur_cec:
                    type: "boolean"
                    title: "Indique si le représentant légal est valideur CEC"
                    description: "Le compte d'engagement citoyen (CEC) est un dispositif visant à valoriser l'engagement bénévoles des responsables associatifs. Pour fonctionner, les bénévoles doivent déclarer leurs engagements, l'exactitude de ces déclarations doit être attestée par un dirigeant bénévole de l'association désigné  \"validateur CEC \".
                    \n
                    \n
                    Pour en savoir plus : https://www.associations.gouv.fr/valideur-cec.html"
                    example: true
                  publication_internet:
                    type: "boolean"
                    title: "Indique si les coordonnées du représentant légal sont publiables"
                    description: "Si ce champ est à  \"true \", le téléphone et le courriel du représentant légal ont la possibilité d'être publiés sur internet."
                    example: true
                  telephone:
                    type: "string"
                    title: "Numéro de téléphone du représentant légal"
                    example: "0623456789"
                    nullable: true
                  courriel:
                    type: "string"
                    title: "Courriel du représentant légal"
                    example: "dupont.jean@association.fr"
                    nullable: true
            documents_dac:
              title: "Liste des documents administratifs complémentaires (DAC) associés à cet établissement"
              description: "Tous les documents DAC sont renvoyés à l'exception des documents marqués comme étant des RIBs ou ceux marqué comme étant supprimés."
              type: "array"
              items:
                type: "object"
                additionalProperties: false
                required:
                  - "nom"
                  - "annee_validite"
                  - "commentaire"
                  - "etat"
                  - "type"
                  - "date_depot"
                  - "url"
                properties:
                  id:
                    type: "string"
                    title: "Identifiant interne du document. L'ID a été hashée pour des raisons de confidentialité."
                    example: "3d53b6bfe05370b45df327123656e54260ce56e1fafd1881853cebae6ead8458"
                  nom:
                    type: "string"
                    title: "Nom du document"
                    example: "Rapport annuel 2019.pdf"
                  annee_validite:
                    type: "string"
                    title: "Année de validité du document"
                    description: "Cette valeur peut-être omise si le document n'est pas lié à une année"
                    example: "2019"
                    nullable: true
                  commentaire:
                    type: "string"
                    title: "Commentaire du document"
                    example: "Les comptes annuels sont consolidés au niveau national"
                    nullable: true
                  etat:
                    type: "string"
                    title: "État du document"
                    example: "courant"
                    enum:
                      - "courant"
                      - "archivé"
                  type:
                    type: "string"
                    title: "Type du document"
                    description: "La liste des types est la suivante (liste non-exhaustive, le champ pouvant être renseigné manuellement):
                      \n
                      \n
                      - Budget prévisionnel
                      \n
                      - Comptes du dernier exercice clos
                      \n
                      - Rapport du commissaire au compte
                      \n
                      - Rapport d'activité (le plus récent)
                      \n
                      - Rapport financier
                      \n
                      - Arrêté de l'agrement
                      \n
                      - Attestation d’affiliation
                      \n
                      - Projet sportif
                        "
                    example: "Budget prévisionnel"
                  date_depot:
                    type: "string"
                    format: "date"
                    title: "Date de dépôt du document"
                    example: "2019-01-01"
                    nullable: true
                  url:
                    type: "string"
                    title: "URL du document"
                    example: "https://associations.api.gouv.fr/documents/rapport_annuel.pdf"
      reseaux_affiliation:
        title: "Affiliation à une union, fédération ou réseau"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - "nom"
            - "numero"
            - "rna"
            - "siret"
            - "objet"
            - "nombre_licencies"
          properties:
            nom:
              type: "string"
              title: "Nom du réseau"
              example: "Réseau des associations de parents d'élèves"
            numero:
              type: "string"
              title: "Numéro d'affiliation à la fédération"
              example: "IDF0234567"
              nullable: true
            rna:
              type: "string"
              title: "Numéro RNA du réseau"
              example: "W123456789"
              nullable: true
            siret:
              type: "string"
              title: "Numéro SIRET du réseau"
              example: "12345678901234"
              nullable: true
            objet:
              type: "string"
              title: "Objet du réseau"
              example: "Promouvoir l'engagement des parents d'élèves dans l'éducation de leurs enfants"
              nullable: true
            adresse:
              title: "Adresse du réseau"
              type: "object"
              additionalProperties: false
              properties: *association_adresse_properties
            telephone:
              type: "string"
              title: "Numéro de téléphone du réseau"
              example: "0123456789"
              nullable: true
            courriel:
              type: "string"
              title: "Courriel du réseau"
              example: "reseau@association.fr"
              nullable: true
            attestation_affiliation_url:
              type: "string"
              title: "URL de l'attestation d'affiliation"
              example: "https://associations.api.gouv.fr/documents/attestation_affiliation.pdf"
              nullable: true
            nombre_licencies:
              type: "object"
              additionalProperties: false
              title: "Nombre de licenciés"
              description: "Ces informations ne sont pas tout le temps renseignées"
              required:
                - total
                - hommes
                - femmes
              properties:
                hommes:
                  type: "integer"
                  title: "Nombre de licenciés hommes"
                  example: 16
                  nullable: true
                femmes:
                  type: "integer"
                  title: "Nombre de licenciées femmes"
                  example: 17
                  nullable: true
                total:
                  type: "integer"
                  title: "Nombre de licenciés total"
                  example: 33
                  nullable: true
      documents_rna: &unite_legale_documents_rna
        title: "Documents de l'association issus du répertoire national des associations (RNA)"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - "type"
            - "sous_type"
            - "date_depot"
            - "url"
          properties:
            id:
              type: "string"
              title: "Identifiant interne du document. L'ID a été hashée pour raisons de confidentialité."
              example: "7ac1b8d7010bb6cd3a3e84e7f90136b880bbc899e428ece49333372911ab9052"
            type:
              type: "string"
              title: "Type du document"
              enum:
                - 'Pièce'
                - 'Récipicé'
              example: "Pièce"
            sous_type:
              type: "object"
              additionalProperties: false
              title: "Sous-type du document"
              required:
                - "code"
                - "libelle"
              properties:
                code:
                  type: "string"
                  title: "Code du sous-type"
                  example: "STC"
                  enum:
                    - STC
                    - LDC
                    - PV
                    - MD
                    - ARR
                    - DCR
                    - FRM
                    - CR
                    - RCS
                    - RCF
                    - LAC
                    - MDT
                    - ADC
                    - ETC
                    - LAD
                    - PV2
                    - FIN
                    - IMC
                    - LAS
                    - RCC
                    - RIN
                    - NJO
                    - CJO
                libelle:
                  type: "string"
                  title: "Libellé du sous-type"
                  example: "Statuts"
                  enum:
                    - Statuts
                    - Liste dirigeants
                    - Procès verbal
                    - Récépissé de modification
                    - Arrêté
                    - Décret
                    - formulaire déclaration
                    - Récepissé de création
                    - télé-récépissé signé automatiquement
                    - Récépissé délivré
                    - Lettre de déclaration
                    - Lettre de mandat
                    - Adhésion(s) (liste complète)
                    - Etablissement(s) (liste complète)
                    - Lettre de démission
                    - Deuxième PV
                    - Document financier
                    - Immeuble(s) (liste complète)
                    - Lettre
                    - Autre
                    - règlement intérieur
            date_depot:
              type: "string"
              format: "date"
              title: "Date de dépôt du document"
              description: "Parfois cette date est vide, vous pouvez vous référer à l'année (clé annee_depot)."
              example: "2019-01-01"
              nullable: true
            annee_depot:
              type: "string"
              title: "Année de dépôt du document"
              example: "2019"
              nullable: true
            url:
              type: "string"
              title: "URL de téléchargement du document"
              example: "https://associations.api.gouv.fr/documents/rapport_annuel.pdf"
    meta: &unite_legale_meta
      internal_id:
        type: "string"
        title: "Identifiant interne de l'entité au sein de l'API manager du Ministère de l'Intérieur"
        example: "1234567890"
      date_derniere_mise_a_jour_sirene:
        title: "Date de dernière mise à jour de l'association dans le répertoire Sirene"
        type: "string"
        format: "date"
        example: "2019-01-01"
        nullable: true
      date_derniere_mise_a_jour_rna:
        title: "Date de dernière mise à jour de l'association dans le répertoire national des associations (RNA)"
        type: "string"
        format: "date"
        example: "2019-01-01"
        nullable: true

  v4/unite_legale_open_data:
    title: "Données association en open data"
    description: "Informations et documents de référence d'une association et de ses établissements, accessibles en open data, issues du répertoire national des associations (RNA)."
    tags:
      - "Informations générales"
    attributes:
      <<: *unite_legale_shared_flat_attributes
      activites: *unite_legale_activites
      etablissements:
        title: "Liste des établissements de l'association pour lesquels des informations sont disponibles"
        type: "array"
        items:
          type: "object"
          additionalProperties: false
          required:
            - siren
            - siret
            - siege
            - nom
            - telephone
            - courriel
            - actif
            - date_debut_activite
            - adresse
            - activite_principale
            - tranche_effectif
            - rhs
            - comptes
          properties:
            <<: *unite_legale_etablissement_shared_attributes
    meta: *unite_legale_meta

