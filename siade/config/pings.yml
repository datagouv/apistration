---
test:
  api_kind:
    with_retriever:
      kind: 'retriever'
      provider: 'whatever'
      status_page:
        name: "With Retriever"
        alerts_wait: 5
      driver_params:
        retriever: 'INPI::RNE::BeneficiairesEffectifs'
        params:
          siren: '900225095'
          inpi_rne_login_username: "<%= Siade.credentials[:inpi_rne_login_ping_username] %>"
          inpi_rne_login_password: "<%= Siade.credentials[:inpi_rne_login_ping_password] %>"

    with_retriever_payload:
      kind: 'retriever_payload'
      provider: 'whatever'
      driver_params:
        retriever: 'INPI::RNE::BeneficiairesEffectifs'
        params:
          siren: '900225095'
          inpi_rne_login_username: "<%= Siade.credentials[:inpi_rne_login_ping_username] %>"
          inpi_rne_login_password: "<%= Siade.credentials[:inpi_rne_login_ping_password] %>"
        key_to_dig: 'a.b.c'
        method_to_test_on_payload: 'any?'

    with_retriever_and_maintenance:
      kind: 'retriever'
      provider: 'provider_which_has_a_window_within_same_day'
      status_page:
        name: "With Retriever and Maintenance"
      driver_params:
        retriever: 'INPI::RNE::BeneficiairesEffectifs'
        params:
          siren: '900225095'
          inpi_rne_login_username: "<%= Siade.credentials[:inpi_rne_login_ping_username] %>"
          inpi_rne_login_password: "<%= Siade.credentials[:inpi_rne_login_ping_password] %>"

    with_retriever_and_cache:
      kind: 'retriever'
      cache: <%= 5.minutes %>
      provider: 'whatever'
      driver_params:
        retriever: 'INPI::RNE::BeneficiairesEffectifs'
        params:
          siren: '900225095'
          inpi_rne_login_username: "<%= Siade.credentials[:inpi_rne_login_ping_username] %>"
          inpi_rne_login_password: "<%= Siade.credentials[:inpi_rne_login_ping_password] %>"

    with_access_logs:
      kind: 'access_logs'
      provider: 'whatever'
      driver_params: &with_access_logs_driver_params
        routes:
          - 'api_kind/api1/source1#show'
          - 'api_kind/api2/source2#show'

    with_access_logs_and_excluded_status:
      kind: 'access_logs'
      provider: 'whatever'
      driver_params:
        <<: *with_access_logs_driver_params
        excluded_statuses:
          - 404

    with_make_request:
      kind: 'make_request'
      provider: 'whatever'
      driver_params:
        make_request: 'ANTS::ExtraitImmatriculationVehicule::MakeRequest'
        params:
          immatriculation: 'AAA-000-AAA'
        status_to_check: 200

    with_make_request_and_token:
      kind: 'make_request'
      provider: 'whatever'
      driver_params:
        make_request: 'FranceTravail::Statut::MakeRequest'
        status_to_check: 404
        params:
          identifiant: 'identifiant'
          user_id: '22222222-2222-2222-2222-222222222222'
        token_interactor: 'FranceTravail::Authenticate'

    with_make_request_and_organizer_params:
      kind: 'make_request'
      provider: 'whatever'
      driver_params:
        make_request: 'CNAV::MakeRequest'
        status_to_check: 404
        organizer_params:
          dss_prestation_name: 'complementaire_sante_solidaire'
        params:
          nom_naissance: 'DUPONT'
          prenoms:
            - 'JEAN'
          annee_date_naissance: 2000
          mois_date_naissance: 1
          jour_date_naissance: 1
          sexe_etat_civil: 'M'
          code_cog_insee_pays_naissance: '99100'
          code_cog_insee_commune_naissance: '17300'
          user_id: 'PING_DINUM'
          request_id: '22222222-2222-2222-2222-222222222222'
        token_interactor: 'CNAV::Authenticate'

