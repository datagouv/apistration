---
test:
  api_kind:
    with_retriever:
      kind: 'retriever'
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
    with_retriever_and_cache:
      kind: 'retriever'
      cache: <%= 5.minutes %>
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
    with_access_logs:
      kind: 'access_logs'
      driver_params:
        period: <%= 5.minutes %>
        routes:
          - 'api_kind/api1/source1#show'
          - 'api_kind/api2/source2#show'
shared:
  api_particulier:
    caf:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
    impots:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'DGFIP::SituationIR'
        params:
          tax_number: '<%= Siade.credentials[:ping_dgfip_svair_numero_fiscal] %>'
          tax_notice_number: '<%= Siade.credentials[:ping_dgfip_svair_reference_avis] %>'
  api_entreprise:
    insee/sirene:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'INSEE::Etablissement'
        params:
          siret: '30613890002979'
    urssaf/attestation_sociale:
      kind: 'access_logs'
      cache: <%= 5.minutes %>
      driver_params:
        period: <%= 10.minutes %>
        routes:
          - 'api_entreprise/v3_and_more/acoss/attestations_sociales#show'
    infogreffe/rcs:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'Infogreffe::ExtraitsRCS'
        params:
          siren: '831386297'
    inpi/rne:
      kind: 'retriever'
      cache: <%= 10.minutes %>
      driver_params:
        retriever: 'INPI::RNE::BeneficiairesEffectifs'
        params:
          siren: '900225095'

    djepva/api-association:
      kind: 'retriever'
      cache: <%= 5.minutes %>
      driver_params:
        retriever: 'DJEPVA::UniteLegale'
        params:
          id: 'W131015526'


