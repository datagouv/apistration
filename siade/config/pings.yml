---
test:
  api_kind:
    with_retriever:
      kind: 'retriever'
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
    with_retriever_and_cache:
      kind: 'retriever'
      cache: <%= 5.minutes %>
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
shared:
  api_particulier:
    caf:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'CNAF::QuotientFamilial'
        params:
          beneficiary_number: '<%= Siade.credentials[:ping_cnaf_numero_allocataire] %>'
          postal_code: '<%= Siade.credentials[:ping_cnaf_postal_code] %>'
    impots:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'DGFIP::SituationIR'
        params:
          tax_number: '<%= Siade.credentials[:ping_dgfip_svair_numero_fiscal] %>'
          tax_notice_number: '<%= Siade.credentials[:ping_dgfip_svair_reference_avis] %>'
  api_entreprise:
    insee/sirene:
      kind: 'retriever'
      cache: <%= 2.minutes %>
      driver_params:
        retriever: 'INSEE::Etablissement'
        params:
          siret: '30613890002979'
