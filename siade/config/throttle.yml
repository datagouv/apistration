    limit: 250
    period: 60
  inpi_rne:
    throttle_type: 'by_single_endpoint'
    limit: 30
    period: 60
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/inpi/rne/beneficiaires_effectifs', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/inpi/rne/beneficiaires_effectifs_open_data', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/inpi/rne/actes_bilans', action: 'show' }
  urssaf_attestation_sociales:
    throttle_type: 'by_single_endpoint'
    limit: 100
    period: 60
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/acoss/attestations_sociales', action: 'show' }
  proxied_files:
    throttle_type: 'by_single_endpoint'
    endpoints:
      - { controller: 'api_entreprise/proxied_files', action: 'show' }
    limit: 50
    period: 60
  gip_mds:
    throttle_type: 'by_group_of_endpoints'
    limit: 100
    period: 60
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/gip_mds/effectifs_annuels_entreprise', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/gip_mds/effectifs_mensuels_etablissement', action: 'show' }

test:
  low_latency_documents:
    limit: 2
  high_latency_documents:
    limit: 2
  json_resources:
    limit: 2
  proxied_files:
    limit: 2
