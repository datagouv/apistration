      - { controller: 'api_entreprise/v3_and_more/insee/etablissements_diffusables', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/insee/adresses_etablissements', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/insee/adresses_etablissements_diffusables', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/insee/sieges_unites_legales', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/insee/sieges_diffusables_unites_legales', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/insee/successions', action: 'show' }
