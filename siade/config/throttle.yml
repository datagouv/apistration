      - { controller: 'api_entreprise/v3_and_more/dgfip/liens_capitalistiques', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/dgfip/chiffres_affaires', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/msa/conformites_cotisations', action: 'show' }
