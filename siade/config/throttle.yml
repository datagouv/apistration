shared:
  low_latency_documents:
    throttle_type: 'by_group_of_endpoints'
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/probtp/attestations_cotisation_retraite', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/fntp/carte_professionnelle_travaux_publics', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/cnetp/attestation_cotisations_conges_payes_chomage_intemperies', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/qualibat/certifications_batiment', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/mi/documents_associations', action: 'show' }
      - { controller: 'api_entreprise/inpi_proxy', action: 'show' }
    limit: 50
    period: 60
  high_latency_documents:
    throttle_type: 'by_single_endpoint'
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/dgfip/attestations_fiscales', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/cibtp/attestation_cotisations_conges_payes_chomage_intemperies', action: 'show' }
    limit: 5
    period: 60
  json_resources:
    throttle_type: 'by_group_of_endpoints'
    endpoints:
      - { controller: 'api_entreprise/v3_and_more/ademe/certificats_rge', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/carif_oref/certifications_qualiopi_france_competences', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/rnm/entreprises_artisanales', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/mi/associations', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/mi/unites_legales', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/mi/unites_legales_open_data', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/dgddi/eori', action: 'show' }
      - { controller: 'api_entreprise/v3_and_more/infogreffe/mandataires_sociaux', action: 'show' }
