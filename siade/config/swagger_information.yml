---
mandatory_params:
  context: "**Cadre de la requête**
    \n
    \n
    Par exemple : aides publiques, marchés publics ou gestion d’un référentiel tiers utilisé pour tel type d’application."
  recipient: "**Bénéficiaire de l’appel**
    \n
    \n
    SIRET de l’administration destinatrice des données."
  object: "**La raison de l’appel ou l’identifiant de la procédure.**
    \n
    \n
    L’identifiant peut être interne à votre organisation ou bien un numéro de marché publique, un nom de procédure ; l’essentiel est que celui-ci vous permette de tracer et de retrouver les informations relatives à l’appel. En effet, vous devez pouvoir justifier de la raison d’un appel auprès du fournisseur de données. Description courte ( < 50 caractères )."

acoss:
  attestation_sociale:
    title: "Attestation de vigilance"
    description: "Obtenir l'attestation validant que l'entreprise s'acquitte de ses obligations déclaratives et du paiement des cotisations et contributions sociales auprès de l'URSSAF Caisse nationale (anciennement ACOSS)."
    tags:
      - "Attestations sociales et fiscales"
    document_url_properties:
      title: "Lien vers l'attestation de vigilance ACOSS"
      description: "Ce document est automatiquement supprimé au bout de 3 mois."
      example: 'https://storage.entreprise.api.gouv.fr/siade/1569139162-b99824d9c764aae19a862a0af-attestation_vigilance_acoss.pdf'

dgddi:
  eori:
    title: 'Immatriculation EORI'
    description: |
      Accéder au statut de l’immatriculation des entreprises de la base des douanes. L'appel se fait par numéro EORI ou SIRET :
      - Appel par numéro EORI: fonctionne pour toutes les entreprises
      - Appel par SIRET: fonctionne uniquement pour les entreprises ayant fait leur immatriculation EORI en France. Une entreprise immatriculée dans un autre pays européen renverra toujours un négatif.
    tags:
      - "Informations générales"
    attributes:
      id:
        title: 'Identifiant EORI'
        description: "Numéro EORI (Economic Operator Registration and Identification) de l'entité: un numéro unique communautaire permettant d’identifier chaque opérateur économique dans ses relations avec les autorités douanières."
        type: 'string'
        example: 'FR16002307300010'
      actif:
        title: 'Actif'
        type: 'boolean'
        description: 'Indique si ce numéro est encore actif (true) ou non (false)'
        example: true
      code_pays:
        title: 'Code Pays'
        type: 'string'
        example: 'FR'
      code_postal:
        title: 'Code Postal'
        type: 'string'
        example: '95520'
      libelle:
        title: "Libellé de l'entité"
        type: 'string'
        description: "Libellé de l'entreprise tel que connu par les douanes, équivalent à la Raison Sociale pour une entreprise Française."
        example: 'CENTRE INFORMATIQUE DOUANIER'
      pays:
        title: 'Pays'
        type: 'string'
        description: "Pays de résidence de l'établissement telle que connue par les douanes"
        example: 'FRANCE'
      rue:
        title: 'Rue'
        type: 'string'
        description: "Rue de l'établissement telle que connue par les douanes"
        example: '27 R DES BEAUX SOLEILS'
      ville:
        title: 'Ville'
        type: 'string'
        description: "Ville de l'établissement telle que connue par les douanes"
        example: 'OSNY'

inpi:
  brevets:
    title: 'Brevets'
    description: |
      Brevets déposés par l'entreprise:
      Cet endpoint appelle les informations à partir d’un SIREN. Le SIREN étant une information facultative lors du dépôt de dossier à l’INPI, le taux de sirénage est donc incomplet.

      Taux de sirénage des déposants (sur personnes morales FR) :

      *Brevets France et brevets Europe délivrés : environ 80% sur les demandes de brevets publiées ces 20 dernières années ;
    tags:
      - 'Propriété intellectuelle'
    type: 'array'
    items:
      properties:
        id:
          title: 'Numéro de publication'
          description: 'Numéro de publication du brevet, constitué du Code zone + Numéro du brevet + Catégorie de publication'
          type: 'string'
          example: 'FR3110115A1'
        titre:
          title: 'Titre'
          description: "Titre du brevet"
          type: 'string'
          example: 'DETERMINATION DE PARAMETRES D&apos;UN MODELE DYNAMIQUE POUR UNE CELLULE ELECTROCHIMIQUE DE BATTERIE'
        date_publication:
          title: 'Date de publication'
          description: 'Date de publication du brevet'
          type: 'string'
          example: '20170616'
        date_depot:
          title: 'Date de dépot'
          description: 'Date de dépot du brevet'
          type: 'string'
          example: '20151214'
        code_zone:
          description: |
            Code de 2 lettres représentent la zone géographique où le brevet a été déposé, en fonction
            de l'organisation qui a enregistré le brevet. Quelques examples:
              - FR: France
              - EP (European Patent): demandes de brevet déposées auprès de l’OEB (Office Européen des Brevets)
              - WO (World): demandes de brevet PCT déposées auprès de l’OMPI (Organisation Mondiale de la Propriété Intellectuelle)
          type: 'string'
          example: 'FR'
        numero_brevet:
          title: 'Numéro du brevet'
          description: |
            Numéro du brevet dans l'organisation ou il a été déposé (déterminée par le code de zone)
          type: 'string'
          example: '3110115'
        categorie_publication:
          title: 'Catégorie'
          description: 'Code représentant la catégorie du brevet (ex: A1 pour une demande de brevet,'
          type: 'string'
          example: 'A1'
    meta:
      count:
        title: 'Nombre de brevets'
        description: "Nombre total des dépots de brevets effectués par l'entreprise."
        type: 'number'
        example: 13161

insee:
  adresse_etablissement:
    title: "Adresse de l'établissement"
    description: "Adresse de l'établissement présente dans le répertoire Sirene."
    tags:
      - "Informations générales"
    attributes:
      numero_voie:
        title: "Numéro dans la voie"
        type: "string"
        example: "22"
      indice_repetition_voie:
        title: "Indice de répétition du numero dans la voie"
        description: "Plus d'infos ici: https://www.sirene.fr/sirene/public/variable/indrep"
        type: "string"
        nullable: true
        enum:
          - 'bis'
          - 'ter'
          - 'quarter'
          - 'quinquies'
          -
      type_voie:
        title: "Type de la voie de localisation"
        example: "RUE"
        description: "Cette information n'est pas toujours renseignée ou il n'en existe pas toujours dans les petites communes.
          \n
          Celle-ci est en majuscule.
          \n
          Plus d'infos: https://www.sirene.fr/sirene/public/variable/typvoie"
        type: 'string'
        nullable: true
        enum: <%= YAML.load_file(Rails.root.join('config/data/insee/types_de_voie.yml')).values.map(&:upcase).concat([nil]).to_json %>
      libelle_voie:
        title: "Libellé de la voie"
        example: "DE LA PAIX"
      complement_adresse:
        title: "Complément d'adresse"
        type: 'string'
        description: "Le complément d'adresse correspond à des éléments situés à l'extérieur du bâtiment qui permettent de compléter l'adresse (résidence, bâtiment, entrée, etc..)"
        example: "ZAE SAINT GUENAULT"
        nullable: true
      code_commune:
        title: "Code commune"
        description: "Le code commune est défini dans le COG disponible ici: https://www.insee.fr/fr/information/2028028
          \n
          \n
          Cette valeur est à nulle pour les entreprises à l'étranger"
        type: 'string'
        example: "75112"
        nullable: true
      code_postal:
        title: "Code postal"
        example: "75016"
        type: 'string'
      distribution_speciale:
        title: "Distribution spéciale"
        description: |
          La distribution spéciale reprend les éléments particuliers qui accompagnent une adresse de distribution spéciale. C'est un élément constitutif de l'adresse.

          Plus d'infos:
          * https://www.sirene.fr/sirene/public/variable/distributionSpecialeEtablissement
          * https://www.sirene.fr/sirene/public/variable/l5-disp"
        example: "CS 72809"
      code_cedex:
        title: "Code cedex"
        nullable: true
        description: "Plus d'infos: https://fr.wikipedia.org/wiki/Courrier_d%27entreprise_%C3%A0_distribution_exceptionnelle"
        example: "75590"
      libelle_cedex:
        title: "Libellé du code cedex"
        type: 'string'
        nullable: true
        example: "PARIS CEDEX 12"
        description: "Cette variable indique le libellé correspondant au code cedex de l'établissement si celui-ci est non null. Ce libellé est le libellé utilisé dans la ligne 6 d'adresse pour l'acheminement postal."
      libelle_commune:
        title: "Libellé de la commune pour une adresse en France"
        description: "Cette valeur est à nulle pour les établissements à l'étranger"
        type: 'string'
        example: "PARIS 12"
        nullable: true
      libelle_commune_etranger:
        title: "Libellé complémentaire pour une adresse à l'étranger"
        description: "Cette valeur est à nulle pour les établissements en France"
        type: 'string'
        nullable: true

      code_pays_etranger:
        title: "Code pays pour les établissements situés à l'étranger"
        description: "La nomenclature se trouve ici: https://www.insee.fr/fr/information/2028273"
        type: 'string'
        example: "99132"
        nullable: true
      libelle_pays_etranger:
        title: "Libellé du pays pour les établissements situés à l'étranger"
        type: 'string'
        nullable: true
        example: "ROYAUME-UNI"

    meta:
      date_derniere_mise_a_jour: &insee_date_derniere_mise_a_jour
        type: 'integer'
        example: 1618396818
        description: "Date de la dernière mise à jour à l'INSEE"

    links:
      entreprise:
        type: 'string'
        example: 'https://entreprises.api.gouv.fr/api/v3/insee/entreprises/130025265/'
        description: "Lien vers la ressource entreprise correspondant à cette adresse d'établissement"
      etablissement:
        type: 'string'
        example: 'https://entreprises.api.gouv.fr/api/v3/insee/etablissements/13002526500013'
        description: "Lien vers la ressource établissement correspondant à cette adresse d'établissement"


  unite_legale:
    title: "Données de références d'une unité légale"
    description: "Obtenir les informations de référence d'une unité légale, qui est soit entreprise, soit administration, soit une association présente dans le répertoire Sirene."
    tags:
      - "Informations générales"
    attributes: &insee_unite_legale_attributes
      siret_siege_social:
        title: "Siret du siège social"
        type: 'string'
        example: '13002526500013'
      type:
        title: "Type de personne"
        type: 'string'
        enum:
        - 'personne_physique'
        - 'personne_morale'
        example: 'personne_morale'
        description: "Détermine si l'unité légale est une personne morale ou une personne physique.
          Cette valeur est déterminée à l'aide du code juridique : 1000 correspond à une personne physique."
      personne_morale_attributs:
        type: 'object'
        title: "Attributs de la personne morale"
        description: "Attributs associé à la personne morale. L'ensemble des valeurs sont à
          null pour les personnes physiques."
        properties:
          raison_sociale:
            title: "Raison sociale de l'unité légale"
            type: 'string'
            example: 'DINUM'
            nullable: true
      personne_physique_attributs:
        type: 'object'
        title: "Attributs de la personne physique"
        description: "Attributs associé à la personne physique. L'ensemble des
          valeurs sont à null pour les personnes morales."
        properties:
          pseudonyme:
            title: "Pseudonyme"
            type: 'string'
            example: "DJ Falcon"
            nullable: true
            description: "Le pseudonyme correspond au nom qu'une
              personne utilise pour se désigner dans l'exercice
              de son activité, généralement littéraire ou artistique."
          prenom_usuel:
            title: "Prénom usuel"
            type: 'string'
            example: 'Jean'
            nullable: true
            description: "Le prénom usuel est le prénom par lequel
              une personne choisit de se faire appeler dans la
              vie courante, parmi l'ensemble de ceux qui lui ont
              été donnés à sa naissance et qui sont inscrits à
              l'état civil."
          prenom_1:
            title: 'Prénom numéro 1 déclaré'
            type: 'string'
            example: 'Jean'
            nullable: true
          prenom_2:
            title: 'Prénom numéro 2 déclaré'
            type: 'string'
            example: 'Jacques'
            nullable: true
          prenom_3:
            title: "Prénom numéro 3 déclaré"
            type: "string"
            example: "Pierre"
            nullable: true
          prenom_4:
            title: "Prénom numéro 4 déclaré"
            type: "string"
            example: "Paul"
            nullable: true
          nom_usage:
            title: "Nom d'usage"
            type: "string"
            example: "Dupont"
            nullable: true
            description: "Nom que la personne physique a choisi d'utiliser"
          nom_naissance:
            title: "Nom de naissance"
            type: "string"
            example: "Dubois"
            nullable: true
          sexe:
            title: "Genre"
            type: 'string'
            example: 'M'
            enum:
              - 'M'
              - 'F'
              - null
            nullable: true
            description: "Caractère féminin ou masculin de la personne
              physique. Cette valeur peut ne pas être renseignée
              pour une personne physique."
      categorie_entreprise:
        title: "Catégorie de l'unité légale"
        type: 'string'
        example: 'GE'
        enum:
        - 'GE'
        - 'ETI'
        - 'PME'
        - null
        description: "Il s'agit d'une
          variable statistique calculée par l'INSEE. Elle ne peut
          prendre que 3 valeurs:
          \n
          \n
          - GE: Grande Entreprise
          \n
          - ETI: Entreprise de Taille Intermédiaire
          \n
          - PME: Petite ou Moyenne Entreprise
          \n
          \n
          Celle-ci peut-être nulle dans
          certains cas : il s’agit soit d’une unité légale nouvellement
          créée, soit d’une unité légale cessée, soit d’une unité
          légale hors champ du calcul de la catégorie (unité légale
          agricole ou ne faisant pas partie du système productif)
          \n
          \n
          La définition peut-être trouvée sur le lien suivant : https://www.insee.fr/fr/metadonnees/definition/c1057"
      numero_tva_intracommunautaire:
        title: "Numéro de TVA intracommunautaire"
        type: 'string'
        example: 'FR07130025265'
        description: "Cette
          valeur est calculée à l'aide du numéro de siren, cette
          donnée est donc théorique: une entreprise dont le siège
          social se trouve à l'étranger n'a probablement pas
          de numéro de TVA français."
      diffusable_commercialement:
        title: "Diffusable commercialement"
        type: 'boolean'
        example: true
        description: "Détermine si l'unité légale est une unité légale
          non-diffusible. Si celle-ci est non-diffusible, ses
          informations ne doivent en aucun cas être accessibles
          au grand public."
      forme_juridique:
        type: 'object'
        title: "Attributs de la forme juridique"
        properties:
          code:
            title: "Code de la forme juridique de l'unité légale."
            type: "string"
            example: '7120'
            description: "Cette variable est à 1000 pour les personnes physiques.
              \n
              \n
              La liste complète se trouve ici: https://www.insee.fr/fr/information/2028129"
          libelle:
            title: "Libellé associé au code de la forme juridique de l'unité légale."
            type: 'string'
            example: "Service central d'un ministère"
            description: "Si le code ne correspond à aucun libellé la valeur 'non référencé' est utilisée."
      activite_principale:
        title: "Attributs de l'activité principale"
        type: 'object'
        properties:
          code:
            title: "Code de l'activité principale (APE) de l'unité légale"
            type: 'string'
            example: '8411Z'
            description: "Ce code est extrait de la nomenclature
              NAF. A noter qu'une entreprise n'ayant pas encore
              de code APE peut se voir affecter la valeur 00.00Z
              de manière provisoire."
          libelle:
            title: "Libellé associé au code APE"
            type: 'string'
            nullable: true
            example: "Administration publique générale"
            description: "Si le code n'est pas renseigné dans la nomenclature 'Naf Rév2'
              (nomenclature en vigueur), le libellé n'est pas
              renseigné ici. Si le code ne correspond à aucun
              libellé au sein de la nomenclature 'Naf Rév2', la
              valeur 'non référencé' est utilisée.
              \n
              \n
              Le lien vers la nomenclature 'Naf Rév2' : https://www.insee.fr/fr/information/2406147"
          nomenclature:
            title: 'Nomenclature associée au code'
            type: 'string'
            example: 'NAFRev2'
      tranche_effectif_salarie:
        type: 'object'
        title: "Attributs de la tranche d'effectif salarié"
        properties:
          code:
            type: 'string'
            nullable: true
            example: '51'
          intitule:
            type: 'string'
            nullable: true
            example: "2 000 à 4 999 salariés"
          date_reference:
            type: 'string'
            nullable: true
            example: '2016'
          de:
            type: 'integer'
            example: 2000
            nullable: true
          a:
            type: "integer"
            example: 4999
            nullable: true
      etat_administratif:
        title: "État administratif de l'unité légale"
        type: 'string'
        enum:
          - 'A'
          - 'C'
        example: 'A'
        description: "
          - A = Active
          \n
          - C = Cessée
          "
      date_cessation:
        title: "Date de cessation de l'unité légale"
        type: 'integer'
        nullable: true
        example: 1634133818
        description: "Cette valeur est renvoyée sous format timestamp"
      date_creation:
        title: "Date de cessation de l'unité légale"
        type: 'integer'
        example: 1634103818
        description: "Cette valeur est renvoyée sous format timestamp"
    links:
      siege_social:
        type: 'string'
        example: 'https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294'
        description: "Lien vers la ressource établissement correspondant au siège social"
      siege_social_adresse:
        type: 'string'
        example: "https://entreprises.api.gouv.fr/api/v3/insee/etablissements/30613890001294/adresse"
        description: "Lien vers la ressource adresse de l'établissement correspondant au siège social"
    meta:
      date_derniere_mise_a_jour: *insee_date_derniere_mise_a_jour

  unite_legale_diffusable:
    title: "Données de références d'une entité légale diffusable commercialement"
    description: "Obtenir les informations de référence d'une unité légale, qui est soit uneentreprise, soit une administration, soit une association, présente dans le répertoire Sirene. Ce endpoint ne renvoi que des entités diffusable commercialement."
    tags:
      - "Informations générales"
    attributes:
      <<: *insee_unite_legale_attributes
      diffusable_commercialement:
        title: "Diffusable commercialement"
        type: 'boolean'
        example: true
        enum:
          - true
        description: "Détermine si l'unité légale est une entreprise
          non-diffusible. Cette valeur est toujours à true. Si vous voulez pouvoir récupérer des unités légales
          non-diffusible, référez-vous à la documentation du endpoint /insee/unites_legales/:siren"

  etablissement:
    title: "Données de référence d'un établissement"
    description: "Obtenir des informations générales concernant un établissement du répertoire Sirene."
    tags:
