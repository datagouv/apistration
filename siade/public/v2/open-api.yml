                        description: Numéro EORI
                        example: FR16002307300010
                        type: string
                    raison_sociale:
                        description: Raison sociale
                        example: CENTRE INFORMATIQUE DOUANIER
                        type: string
                    pays:
                        description: Pays (en majuscule)
                        example: FRANCE
                        type: string
                    rue:
                        description: Numéro et rue
