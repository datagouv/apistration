      description: "Cette API est ouverte et ne nécessite pas de token. <a href='https://entreprise.api.gouv.fr/doc/#api-current-status'>Documentation générale</a>"
      responses: *default_responses

  /watchdoge/stats/provider_availabilities/:
    get:
      tags:
        - *tag_api_complementaires
      summary: "[API Entreprise] Connaître l'historique de disponibilité des API"
      description: "Cette API est ouverte et ne nécessite pas de token. <a href='https://entreprise.api.gouv.fr/doc/#api-disponibilites'>Documentation générale</a>"
      parameters:
        - in: query
          name: period
          required: true
          description: "L'intervale de temps sur lequel renvoyer la disponibilité"
          schema:
            type: string
          example: '15m'
        - in: query
          name: endpoint
          required: true
          description: "API pour laquelle la disponibilité est demandée"
          schema:
            type: string
          example: 'api/v3/entreprises_restored'
      responses: *default_responses

components:
  parameters:
    Context:
      in: query
      name: context
      required: true
      description: "Le cadre dans lequel l'appel est réalisé"
      schema:
        type: string
      example: "Test de l'API"

    Recipient:
      in: query
      name: recipient
      required: true
      schema:
        type: string
      description: "Bénéficiaire de l'appel"
      example: "SIRET du bénéficiaire de l'appel"

    Object:
      in: query
      name: object
      required: true
      schema:
        type: string
      description: "Pourquoi l'appel est réalisé ou identifiant de dossier ou procédure"
      example: "Test API"

    Siren:
      in: path
      name: siren
      description: "Siren de l'entreprise"
      required: true
      schema:
        type: string
        pattern: '^\d{9}$'
      examples:
        siren_octo_technology:
          value: "418166096"
          summary: SIREN Octo Technology
        siren_non_diffusible:
          value: "005572466"
          summary: SIREN entreprise non diffusible
        siren_artisant:
          value: "301123626"
          summary: SIREN entreprise artisanale
        siren_fntp:
          value: "339379984"
          summary: SIREN pour FNTP
        siren_cnetp:
          value: "542036207"
          summary: SIREN pour CNETP
        siren_opqibi:
          value: "515228211"
          summary: SIREN pour OPQIBI

    Siret:
      in: path
      name: siret
      description: "Siret de l'établissement"
      required: true
      schema:
        type: string
        pattern: '^\d{14}$'
      examples:
        siret_octo_technology:
          value: "41816609600069"
          summary: SIRET Octo Technology
        siret_non_diffusible:
          value: "00557246600026"
          summary: SIRET établissement non diffusible
        siret_probtp:
          value: "43841606700017"
          summary: SIRET pour ProBTP
        siret_qualibat:
          value: "78824266700020"
          summary: SIRET pour Qualibat

    AssociationId:
      in: path
      name: association_id
      description: "Siret de l'association ou le numéro RNA"
      required: true
      schema:
        type: string
      examples:
        openstreetmap_france:
          value: W751212517
          summary: ID RNA Openstreetmap France
        croix_rouge:
          value: "77567227221138"
          summary: SIRET de la Croix-Rouge France

    SiretOrEORI:
      in: path
      name: siret_or_eori
      description: "Siret ou numéro EORI de l'entreprise"
      required: true
      schema:
        type: string
      examples:
        french_siret:
          value: '16002307300010'
          summary: 'Siret français'
        french_eori:
          value: 'FR16002307300010'
          summary: 'Numéro EORI français'
        spanish_eori:
          value: 'ESA08536583'
          summary: 'Numéro EORI espagnol'

    NotDiffusable:
      in: query
      name: non_diffusables
      description: "Inclure les entreprises non diffusables"
      schema:
        type: boolean
        default: false
      required: false
      allowEmptyValue: true

    Month:
      in: path
      name: mois
      description: "Mois (MM)"
      schema:
        type: string
        pattern: '^\d{2}$'
      required: true

    Year:
      in: path
      name: annee
      description: "Année (YYYY)"
      schema:
        type: string
        pattern: '^\d{4}$'
      required: true

    Email:
      in: query
      name: email
      description: "Email de l'utilisateur faisant la demande"
      schema:
        type: string
      required: false
      allowEmptyValue: true

  responses:
    Incomplete:
      description: "Réponse incomplete - Un des fournisseurs de données a renvoyé une erreur, la réponse est incomplète (les valeurs concernées contiennent le message par défaut: Donnée indisponible)"
      content:
        application/json: {}

    BadRequest:
      description: "Mauvaise requête"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '400'
            - message: "Le format de la requête est incorrecte"

    Unauthorized:
      description: "Non authorisé"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '401'
            - message: "Token invalide ou manquant"

    Forbidden:
      description: "Interdit"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '403'
            - message: "Votre jeton ne vous donne pas accès à cette ressource"

    NotFound:
      description: "Non trouvé"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '404'
            - message: "La ressource demandée n'a pas été trouvée"

    UnprocessableEntity:
      description: "Entité non traitable"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '422'
            - message: "Le format de la donnée passée en paramètre n'est pas accepté"

    LegalyUnavailable:
      description: "Indisponible pour des raisons légales"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '451'
            - message: "Une entreprise est non diffusée par l'INSEE"

    InternalError:
      description: "Erreur interne"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '500'
            - message: "Une erreur interne est survenue"

    BadGateway:
      description: "Passerelle incorrecte"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '502'
            - message: "Mauvaise réponse envoyée par le fournisseur de données"

    ServiceUnvailable:
      description: "Service non disponible"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '503'
            - message: "Service temporairement indisponible ou en maintenance"

    ProviderTimeout:
      description: "Intermédiaire hors délai"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            - code: '504'
            - message: "Le(s) producteur(s) de données ont mis trop de temps à répondre, nous limitons notre temps d'attente de leur retour à 10 secondes."

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
  securitySchemes:
    jwt_bearer_token:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token d'authentification JWT.

        Si vous n'avez pas encore de jeton vous pouvez faire des tests sur le serveur **https://staging.entreprise.api.gouv.fr** avec ce JWT.

        Les retours des API contiendront des données fictives.

        ---

        *eyJhbGciOiJIUzI1NiJ9..xID66pIlMnBR5_6nG-GidFBzK4Tuuy5ZsWfkMEVB_Ek*

security:
  - jwt_bearer_token: []
