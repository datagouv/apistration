paths:
  /api/v2/complementaire-sante-solidaire:
    get:
      summary: Complémentaire santé solidaire
      description: "Savoir si un particulier est bénéficiaire de la complémentaire santé solidaire (C2S).
        \n\n
        Pour de plus amples informations sur cette api et y avoir accès en avant première, veuillez contacter l'équipe API Particulier.
        \n
        **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/complementaire_sante_solidaire)
        "
      tags:
        - Prochainement
      parameters:
        - name: recipient
          in: query
          description: |-
            "**Bénéficiaire de l’appel**

            SIRET de l’administration destinatrice des données."
          example: '13002526500013'
          required: true
          schema:
            type: string
        - name: "nomUsage"
          schema:
            type: "string"
          in: "query"
          # Paramètres transmis en majuscule à la fin
          description: "Nom d'usage"
          required: false
        - name: "nomNaissance"
          schema:
            type: "string"
          in: "query"
          # Paramètres transmis en majuscule à la fin
          description: "Nom de naissance"
          required: false
        - name: "prenoms[]"
          # La MSA s'attend à une liste séparée par des virgules, c'est cependant plus propre en tableau. Le `[]` est une spécificité rails (notre backend).
          in: "query"
          description: "Liste des prénoms"
          required: false
          schema:
            type: "array"
            minItems: 1
            items:
              type: 'string'
        - name: "anneeDateDeNaissance"
          description: "Année de naissance. Ne pas la renseigner si celle-ci est inconnue"
          required: false
          in: "query"
          schema:
            type: integer
            example: 1990
        - name: "moisDateDeNaissance"
          description: "Mois de naissance. Ne pas le renseigner si celui-ci est inconnu. Cette valeur est ignorée si anneeDateDeNaissance est vide."
          required: false
          in: "query"
          schema:
            type: integer
            example: 1
        - name: "jourDateDeNaissance"
          description: "Jour de naissance. Ne pas le renseigner si celui-ci est inconnu. Cette valeur est ignorée si moisDateDeNaissance ou anneeDateDeNaissance est vide."
          required: false
          in: "query"
          schema:
            type: integer
            example: 1
        - name: "codeInseeLieuDeNaissance"
          in: "query"
          schema:
            type: string
            minLength: 5
            maxLength: 5
            example: '08480'
          description: "Code Insee à 5 chiffres du lieu de naissance de la personne sur 5 chiffres. Ne pas remplir si la personne est née à l'étranger."
          required: false
        - name: "codePaysLieuDeNaissance"
          in: "query"
          description: "Code Insee à 5 chiffres du pays de naissance (France = 99100)"
          schema:
            type: string
            minLength: 5
            maxLength: 5
            example: '99100'
          required: true
        - name: "sexe"
          in: "query"
          description: "Sexe de la personne, masculin ou féminin"
          required: true
          schema:
            enum:
              - M
              - F
      responses:
        "200":
          x-operationId: 'api_particulier_v2_cnaf_complementaire_sante_solidaire'
          description: ""
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    title: "Statut bénéficiaire de la complémentaire santé solidaire (C2S)"
                    type: string
                    description: "Indique si le particulier est bénéficiaire de la complémentaire de santé solidaire au moment de l'appel. Cet indicateur précise sous quelle forme la C2S est attribuée (avec ou sans participation financière).
                    \n
                    \n
                    - Si le statut est 'beneficiaire_sans_participation_financiere', cela signifie que le particulier est bénéficiaire d'une C2S sans participation financière.
                    \n
                    - Si le statut est 'beneficiaire_avec_participation_financiere', cela signifie que le particulier est d'une bénéficiaire de C2S avec participation financière.
                    \n
                    - Si le statut est 'non_beneficiaire_css', cela signifie que le particulier n'est pas concerné par la C2S."
                    enum:
                      - "beneficiaire_sans_participation_financiere"
                      - "beneficiaire_avec_participation_financiere"
                      - "non_beneficiaire_css"
                  dateDebut:
                    title: "Date d'ouverture du droit à la C2S"
                    type: string
                    format: date
                    nullable: true
                    description: "Date de début de droit à la complémentaire santé solidaire (C2S) si le particulier est bénéficiaire.
                    \n                    
                    Dans le cas d'un particulier bénéficiant de plusieurs C2S, la date d'ouverture de droit la plus récente est transmise.
                    \n
                    Ce champs est null dans le cas où le particulier n'est pas bénéficiaire de la C2S."
                    example: 1992-11-29
                  dateFin:
                    title: "Date de fermeture du droit à la C2S"
                    type: string
                    format: date
                    nullable: true
                    description: "Date de fin de droit à la complémentaire santé solidaire (C2S) du particulier bénéficiaire.
                    \n
                    Ce champs est calculé en ajoutant 12 mois à la date de début de droit à la C2S.
                    \n
                    Ce champs sera null dans le cas où le particulier n'est pas bénéficiaire de la C2S."
        "400":
          description: Mauvais paramètres d'appels
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: bad_request
                  reason:
                    type: string
                    example: Le codePaysLieuDeNaissance est manquant
                  message:
                    type: string
                    example: Le codePaysLieuDeNaissance est manquant
        "401":
          description: Votre jeton d'API n'a pas été trouvé ou n'est pas actif
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: access_denied
                  reason:
                    type: string
                    example: Token not found or inactive
                  message:
                    type: string
                    example: Votre jeton d'API n'a pas été trouvé ou n'est pas actif
        "404":
          description: Dossier allocataire inexistant. Le document ne peut être édité.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not_found
                  reason:
                    type: string
                    example: Dossier allocataire inexistant. Le document ne peut être édité.
                  message:
                    type: string
                    example: Dossier allocataire inexistant. Le document ne peut être édité.
        "500":
          description: Une erreur interne s'est produite, l'équipe a été prévenue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: error
                  reason:
                    type: string
                    example: Internal server error
                  message:
                    type: string
                    example: Une erreur interne s'est produite, l'équipe a été prévenue.
        "503":
          description: Une erreur est survenue lors de l'appel au fournisseur de donnée
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: network_error
                  reason:
                    type: string
                    example: timeout of 10000 ms exceeded
                  message:
                    type: string
                    example: Une erreur est survenue lors de l'appel au fournisseur de donnée
