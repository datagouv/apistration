---
info:
  title: API Particulier
  version: 2.2.0
  contact:
    email: api-particulier@api.gouv.fr
    name: Contact API Particulier
    url: https://api.gouv.fr/les-api/api-particulier
  termsOfService: https://api.gouv.fr/resources/CGU%20API%20Particulier.pdf
  license:
    name: GNU Affero General Public License v3.0
    url: https://github.com/betagouv/api-particulier/blob/master/LICENSE
  description: >
    Check spec/swagger_helper.rb
openapi: 3.0.0
servers:
  - url: https://staging.particulier.api.gouv.fr
    description: Serveur de bac à sable
  - url: https://particulier.api.gouv.fr
    description: Serveur de production
security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Jeton d'authentification obtenu suite à la validation de votre <a
        href="https://datapass.api.gouv.fr/">demande d'habilitation</a>, visible
        sur <a href="https://particulier.api.gouv.fr/compte">le portail API
        Particulier</a>
paths:
  /api/v2/composition-familiale:
    get:
      summary: Quotient familial (CAF)
      deprecated: true
      description: >-
        Quotient familial et composition de la famille d'un allocataire de la Caisse nationale des allocations familiales (CNAV). Attention, le quotient familial de la CAF n'a rien à voir avec le quotient familial fiscal utilisé pour le calcul de l'impôt sur le revenu


        **Paramètres d'appel :** numéro d'allocataire et code postal


        **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/api_particulier_v2_cnav_quotient_familial)
      parameters:
        - name: numeroAllocataire
          in: query
          description: Numéro d'allocataire. Numéro de 1 à 7 chiffres. Le numéro d'allocataire n'est pas un numéro unique. Pour être identifiant, il doit être accompagné d'un code postal.
          required: true
          schema:
            type: number
            format: string
            example: 1234567
        - name: codePostal
          in: query
          description: Code postal français (métropôle & DROM COM). Cette donnée permet de faire la correspondance avec la CAF de rattachement de l’allocataire.
          required: true
          schema:
            type: number
            format: string
            example: 75001
        - name: recipient
          in: query
          description: |-
            "**Bénéficiaire de l’appel**

            SIRET de l’administration destinatrice des données."
          example: '13002526500013'
          required: false
          schema:
            type: string
      tags:
        - Quotient familial
      responses:
        "200":
          x-operationId: api_particulier_v2_cnav_quotient_familial
          description: Foyer tel qu'il est déclaré à la CAF
          content:
            application/json:
              schema:
                type: object
                properties:
                  allocataires:
                    title: Informations sur les parents composant la famille
                    type: array
                    items:
                      type: object
                      properties:
                        nomPrenom:
                          title: Nom et prénoms
                          type: string
                          description: Nom et prénoms du parent allocataire de la CAF
                          example: "JEAN JACQUES"
                        dateDeNaissance:
                          title: Date de naissance
                          type: string
                          pattern: ^\d{8}$
                          description: "Date de naissance au format JJMMAAAA"
                          example: "01021970"
                        sexe:
                          title: Sexe
                          description: Sexe du parent
                          type: string
                          example: "M"
                          enum:
                            - F
                            - M
                  enfants:
                    title: Informations sur les enfants composant la famille
                    description: "La liste des enfants correspond à la notion d'enfant à charge au sens de la législation familiale. Il n'y a notamment pas d'obligation de lien de parenté avec l’enfant. Pour en savoir plus, consultez la FAQ https://particulier.api.gouv.fr/catalogue/cnav/quotient_familial#faq_entry_2_api_particulier_endpoint_cnav_quotient_familial:"
                    type: array
                    items:
                      type: object
                      properties:
                        nomPrenom:
                          title: Nom et prénoms
                          type: string
                          description: Nom et prénoms de l'enfant des allocataires
                          example: "JESSICA JACQUES"
                        dateDeNaissance:
                          title: Date de naissance
                          type: string
                          pattern: ^\d{8}$
                          description: "Date de naissance au format JJMMAAAA"
                          example: "01031995"
                        sexe:
                          title: Sexe
                          description: Sexe de l'enfant
                          type: string
                          example: "F"
                          enum:
                            - F
                            - M
                  adresse:
                    title: Adresse de la famille
                    type: object
                    description: Adresse structurée au format de la poste. C'est l'adresse connue de la CNAV, il s'agit d'une information déclarative.
                    properties:
                      identite:
                        title: Identité du destinataire
                        type: string
                        example: "Monsieur JEAN JACQUES"
                        description: "L'identité se compose de la civilité, du titre ou de la qualité, suivis du nom et
                          du prénom."
                      complementIdentite:
                        title: Complément d'information du destinataire ou point de remise
                        description: "Numéro d'appartement, escalier"
                        type: string
                        nullable: true
                        example: null
                      complementIdentiteGeo:
                        title: Complément d'information du point géographique
                        type: string
                        nullable: true
                        example: null
                        description: "Entrée, tour, immeuble, bâtiment, résidence"
                      numeroRue:
                        title: Voie
                        type: string
                        description: Numéro et libellé de la voie
                        example: "1 RUE DE LA GARE"
                      lieuDit:
                        title: Lieu-dit
                        type: string
                        nullable: true
                        example: null
                        description: "Lieu-dit ou service particulier de distribution : poste restante,
                          boîte postale"
                      codePostalVille:
                        title: Code postal
                        type: string
                        description: Code postal et localité de destination
                        example: '75002'
                      pays:
                        title: Pays
                        type: string
                        example: 'FRANCE'
                  quotientFamilial:
                    title: Quotient familial CAF de la famille
                    type: integer
                    description: Valeur du quotient familial calculée par la CAF
                    example: 1045
                  annee:
                    title: Année du quotient familial
                    type: integer
                    description: Il s'agit toujours de l'année du mois précédent l'appel.
                    example: 2021
                  mois:
                    title: Mois du quotient familial
                    type: integer
                    description: Le quotient familial transmis correspond au QF du mois M-1 (M étant le mois de l'appel).
                    example: 6
        "401":
          &a6
          description: Votre jeton d'API n'a pas été trouvé ou n'est pas actif
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: access_denied
                  reason:
                    type: string
                    example: Token not found or inactive
                  message:
                    type: string
                    example: Votre jeton d'API n'a pas été trouvé ou n'est pas actif

        "404":
          &a13
          description: Dossier allocataire inexistant. Le document ne peut être édité.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not_found
                  reason:
                    type: string
                    example: Dossier allocataire inexistant. Le document ne peut être édité.
                  message:
                    type: string
                    example: Dossier allocataire inexistant. Le document ne peut être édité.

        "500":
          &a8
          description: Une erreur interne s'est produite, l'équipe a été prévenue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: error
                  reason:
                    type: string
                    example: Internal server error
                  message:
                    type: string
                    example: Une erreur interne s'est produite, l'équipe a été prévenue.

        "503":
          &a14
          description: Erreur inconnue du fournisseur de donnée (CNAV)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: data_provider_error
                  reason:
                    type: string
                    example: Unknown error code 134
                  message:
                    type: string
                    example: Erreur inconnue du fournisseur de donnée (CNAV)

  /api/v2/situations-pole-emploi:
    get:
      summary: Statut demandeur d'emploi
      description: >-
        Données d'identité, de contact et de statut du demandeur d'emploi.

        **Paramètres d'appel :** Nom d’utilisateur France Travail choisi par le particulier lors de la création de son espace personnel en ligne

        **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/api_particulier_v2_pole_emploi_statut)
      parameters:
        - name: identifiant
          required: true
          in: query
          description: Identifiant France Travail choisi par le particulier lors de la création de son espace personnel en ligne.
          schema:
            type: string
        - name: recipient
          in: query
          description: |-
            "**Bénéficiaire de l’appel**

            SIRET de l’administration destinatrice des données."
          example: '13002526500013'
          required: false
          schema:
            type: string
      tags:
        - Situation France Travail
      responses:
        "200":
          x-operationId: api_particulier_v2_pole_emploi_statut
          description: La situation France Travail d'un individu
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifiant:
                    title: Nom d'utilisateur France Travail
                    type: string
                    description: Identifiant France Travail, tel qu'il a été renseigné en paramètre d'appel. Cet identifiant est le nom d'utilisateur tel que choisi par le particulier lors de la création de son espace personnel en ligne.
                    example: 'martin.jacques'
                  civilite:
                    title: Civilité
                    description: Civilité du demandeur d'emploi, Madame ou Monsieur
                    type: string
                    example: 'M.'
                    enum:
                    - 'MME'
                    - 'M.'
                  nom:
                    title: Nom de naissance
                    type: string
                    description: Nom de naissance du demandeur d'emploi
                    example: 'MARTIN'
                  nomUsage:
                    title: Nom d'usage
                    type: string
                    description: Nom d'usage du demandeur d'emploi
                    nullable: true
                    example: null
                  prenom:
                    title: Prénom
                    type: string
                    example: 'JACQUES'
                    description: Prénom ddu demandeur d'emploi, limité à 13 caractères
                  sexe:
                    title: Sexe
                    type: string
                    description: Sexe du demandeur d'emploi
                    example: 'Masculin'
                  dateNaissance:
                    title: Date de naissance
                    format: date
                    type: string
                    description: Date de naissance du demandeur d'emploi au format YYYY-MM-DD
                    example: 1995-02-02
                  codeCertificationCNAV:
                    title: Code du statut de certification d'identité CNAV
                    type: string
                    description: "France Travail dépend d'un flux de certification d'identité émis par la CNAV, un particulier peut avoir été certifié ou non.
                    Sont considérés comme certifés, les statuts suivants :
                    - VC IDENTITE CERTIFIEE
                    - IC : IDENTITE ASSIMILEE CERTIFIEE
                    - PC : IDENTITE CERTIFIEE PARTIELLEMENT
                    Sont considérés comme non-certifiés :
                    - AC : ATTENTE TRAITEMENT RETOUR CNAV
                    - DC : DEMANDE CERTIF. ENVOYEE
                    - EC : ECHEC DE CERTIFICATION CNAV
                    - null : IDENTITE NON CERTIFIEE
                    - RC : REFUS PROPOSITION DE CERTIFICATION"
                    example: VC
                    enum:
                      - VC
                      - IC
                      - PC
                      - AC
                      - DC
                      - RC
                      - null
                  telephone:
                    title: Téléphone principal
                    type: string
                    description: Numéro de téléphone principal du demandeur d'emploi
                    example: '0636676767'
                  telephone2:
                    title: Téléphone secondaire
                    type: string
                    description: Numéro de téléphone secondaire du demandeur d'emploi
                    nullable: true
                    example: '1122334455'
                  email:
                    title: E-mail
                    type: string
                    nullable: true
                    description: Adresse e-mail du demandeur d'emploi
                    example: martin.jacques@france.fr
                  adresse:
                    title: Adresse
                    type: object
                    description: Adresse du demandeur d'emploi, déclarée par le particulier lors de son inscription à France Travail ou suite à une déclaration de changement d’adresse.
                    properties:
                      codePostal:
                        type: string
                        description: Code postal
                        example: '75001'
                      INSEECommune:
                        type: string
                        example: '75101'
                      localite:
                        type: string
                        example: '75001 Paris'
                      ligneVoie:
                        type: string
                        example: '21 RUE DES MARMOTS'
                      ligneComplementDestinaire:
                        type: string
                        nullable: true
                        example: null
                      ligneComplementAdresse:
                        type: string
                        nullable: true
                        example: null
                      ligneComplementDistribution:
                        type: string
                        nullable: true
                        example: null
                      ligneNom:
                        type: string
                        example: MARTIN
                  dateInscription:
                    title: Date d'inscription
                    format: date
                    type: string
                    description: Date d'inscription à France Travail au format YYYY-MM-DD
                    example: 2021-01-07
                  dateCessationInscription:
                    title: Date de cessation d'inscription au format YYYY-MM-DD
                    description: Date de cessation d'inscription à France Travail
                    type: string
                    format: date
                    nullable: true
                    example: 2023-03-12
                  codeCategorieInscription:
                    title: Code de la catégorie d'inscription
                    description: |
                      Code de la catégorie d'inscription du particulier à France Travail.
                        - 1 : PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN TPS
                        - 2 : PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PARTIEL
                        - 3 : PERSONNE SANS EMPLOI DISPONIBLE DUREE DETERMINEE OU SAISON
                        - 4 : PERSONNE SANS EMPLOI NON DISPONIBLE IMMEDIATEMENT
                        - 5 : PERSONNE POURVUE D'UN EMPLOI A LA RECHERCHE D'UN AUTRE"
                    type: integer
                    example: 1
                    enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                  libelleCategorieInscription:
                    title: Libellé de la catégorie d'inscription
                    description: Libellé de la catégorie d'inscription du particulier à France Travail, associé au cod précédent.
                    type: string
                    example: PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN TPS
                    enum:
                    - PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PLEIN TPS
                    - PERSONNE SANS EMPLOI DISPONIBLE DUREE INDETERMINEE PARTIEL
                    - PERSONNE SANS EMPLOI DISPONIBLE DUREE DETERMINEE OU SAISON
                    - PERSONNE SANS EMPLOI NON DISPONIBLE IMMEDIATEMENT
                    - PERSONNE POURVUE D'UN EMPLOI A LA RECHERCHE D'UN AUTRE
        "401": *a6
        "404":
          description: Aucune situation France Travail n'a pu être trouvée avec les critères
            de recherche fournis
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not_found
                  reason:
                    type: string
                    example: Situation not found
                  message:
                    type: string
                    example: Aucune situation France Travail n'a pu être trouvée avec les critères de
                      recherche fournis
        "500":
          &a9
          description: La réponse du fournisseur de donnée est inexploitable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_response
                  reason:
                    type: string
                    example: Data provider returned an invalid data format.
                  message:
                    type: string
                    example: La réponse du fournisseur de donnée est inexploitable

        "503":
          &a10
          description: Une erreur est survenue lors de l'appel au fournisseur de donnée
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: network_error
                  reason:
                    type: string
                    example: timeout of 10000 ms exceeded
                  message:
                    type: string
                    example: Une erreur est survenue lors de l'appel au fournisseur de donnée
  /api/v2/etudiants:
    get:
      tags:
        - Statut étudiant
      parameters:
        - name: ine
          description: Identifiant National Étudiant (INE). Cet identifiant est unique à chaque étudiant sur le territoire français. Il est composé de 11 caractères, 10 chiffres et 1 lettre, et depuis la rentrée 2018, 9 chiffres et 2 lettres. Les étudiants peuvent retrouver leur numéro INE sur leur carte étudiant et leur certificat de scolarité.
          in: query
          schema:
            type: string
            pattern: ^[0-9a-zA-Z]{11}$
            example: '1234567890G'
        - name: nom
          description: Nom de naissance de l'étudiant
          in: query
          schema:
            type: string
        - name: prenom
          description: Prénom de l'étudiant
          in: query
          schema:
            type: string
        - name: dateDeNaissance
          description: Date de naissance de l'étudiant
          in: query
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            example: '1992-11-29'
        - name: lieuDeNaissance
          description: |
            Le lieu de naissance est donné par le code Insee composé de 5 caractères.

            - Dans le cas d'un étudiant né en France, il s'agit du code Insee de la commune de naissance.

            - Dans le cas d'un étudiant né à l'étranger, il s'agit du code Insee du pays de naissance, construit avec deux caractères « 99 » auxquels sont concaténés les 3 caractères du code pays de la BCN. Ce champ est facultatif, même s'il est recommandé en cas de doublon."
          in: query
          required: false
          schema:
            type: string
        - name: sexe
          description: Sexe de l'étudiant
          in: query
          schema:
            type: string
        - name: recipient
          in: query
          description: |-
            "**Bénéficiaire de l’appel**

            SIRET de l’administration destinatrice des données."
          example: '13002526500013'
          required: false
          schema:
            type: string
      summary: Statut étudiant
      description: >-
        Admissions et inscriptions d'un étudiant aux établissements d'enseignement supérieur.

        **Paramètres d'appel :** Pour appeler l'API statut étudiant, deux modes d'appel sont possibles :
         - INE, l'identifiant national étudiant ;
         - l'état civil de l'étudiant: nom, prénom, date de naissance, sexe et lieu de naissance.

        **Données disponibles en bac à sable :** [liste](https://github.com/etalab/siade_staging_data/blob/develop/payloads/api_particulier_v2_mesri_student_status)
      security:
      - franceConnectToken: []
        apiKey: []
      responses:
        "200":
          x-operationId: api_particulier_v2_mesri_student_status
          description: La situation d'un étudiant et ses inscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  nom:
                    title: Nom de naissance
                    type: string
                    description: Nom de naissance de l'étudiant
                    example: Moustaki
                  prenom:
                    title: Prénom
                    type: string
                    description: Prénom de l'étudiant
                    example: Georges
                  dateNaissance:
                    title: Date de naissance
                    type: string
                    format: date
                    description: Date de naissance de l'étudiant
                    example: 1992-11-29
                  inscriptions:
                    title: Liste des admissions et inscriptions de l'étudiant pour l'année en cours
                    type: array
                    items:
                      type: object
                      properties:
                        dateDebutInscription:
                          title: Date de début d'inscription
                          type: string
                          format: date
                          description: Date de début de la période d'études dans l'établissement
                          example: 2022-09-01
                        dateFinInscription:
                          title: Date de fin d'inscription
                          type: string
                          format: date
                          description: Date de fin de la période d'étude dans l'établissement
                          example: 2023-08-31
                        statut:
                          title: Statut de l'inscription
                          type: string
                          description: |
                            Statut de l'inscription de l'étudiant. Il existe deux modalités différentes :
                            - admis : l'étudiant est pré-inscrit dans l'établissement mais la procédure complète d'inscription et le règlement des droits d'inscription ne sont pas terminés. Les étudiants "admis" passent au statut "inscrit" une fois leurs droits d'inscription régularisés (paiement des droits, premier versement des droits ou acquittement des droits selon la situation de l'étudiant et les règles de l'établissement.) Tous les étudiants "admis" ne sont donc pas forcément de futurs étudiants "inscrits".

                            - inscrit : l'étudiant est inscrit dans l'établissement car il est en règle de ses droits d'inscription. L'étudiant peut être inscrit dans plusieurs établissements."
                          example: admis
                          enum:
                            - admis
                            - inscrit
                        regime:
                          title: Régime de formation
                          type: string
                          description: |
                            Régime de formation de l'étudiant. Il existe deux modalités différentes :

                              - formation initiale : Ce champ indique que l'étudiant est en formation initiale sous statut étudiant (y compris dans le cadre de reprise d’études) ou en en apprentissage ;

                              - formation continue : Ce champ indique que l'étudiant est en formation continue ou en contrat de professionalisation."
                          example: formation initiale
                          enum:
                            - formation initiale
                            - formation continue
                        codeCommune:
                          title: Lieu d'études
                          type: string
                          description: Code officiel géographique (code COG de l'Insee) de la commune du lieu d'études.
                          example: "29085"
                        etablissement:
                          title: Établissement de l'inscription
                          type: object
                          properties:
                            uai:
                              title: Identifiant de l'établissement UAI
                              type: string
                              description: Code UAI (Unité administrative immatriculée) de l'établissement. Cet identifiant unique de l'établissement scolaire est composé de 7 chiffres et d’une lettre, les trois premiers chiffres correspondant au numéro de département de l’établissement.
                              example: 0011402U
                            nom:
                              title: Nom de l'établissement
                              type: string
                              description: Appelation officielle de l'établissement associée au code UAI
                              example: EGC AIN BOURG EN BRESSE EC GESTION ET COMMERCE (01000)
        "401": *a6
        "404":
          &a15
          description: Aucun étudiant n'a pu être trouvé avec les critères de recherche
            fournis
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not_found
                  reason:
                    type: string
                    example: Student not found
                  message:
                    type: string
                    example: Aucun étudiant n'a pu être trouvé avec les critères de recherche
                      fournis
        "500": *a8
        "503": *a10
  /api/v2/etudiants-boursiers:
    get:
      tags:
        - Statut étudiant boursier
      parameters:
        - name: ine
          description: Identifiant National Étudiant (INE). Cet identifiant est unique à chaque étudiant sur le territoire français. Il est composé de 11 caractères, 10 chiffres et 1 lettre, et depuis la rentrée 2018, 9 chiffres et 2 lettres. Les étudiants peuvent retrouver leur numéro INE sur leur carte étudiant et leur certificat de scolarité.
          in: query
          schema:
            type: string
            pattern: ^[0-9a-zA-Z]{11}$
            example: '1234567890G'
        - name: nom
          description: Nom de naissance de l'étudiant
          in: query
          schema:
            type: string
        - name: prenoms
          description: Prénoms de l'étudiant, à séparer uniquement avec des espaces et non des virgules ou points-virgules.
          in: query
          schema:
            type: string
        - name: dateDeNaissance
          description: "Date de naissance de l'étudiant. Format: YYYY-MM-DD"
          in: query
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            example: '1992-11-29'
        - name: lieuDeNaissance
          description: Lieu de naissance de l'étudiant
          in: query
          required: false
          schema:
            type: string
            example: 'Angers'
        - name: sexe
          description: Sexe de l'étudiant
          in: query
          schema:
            type: string
