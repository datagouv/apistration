---
openapi: 3.0.1
info:
  title: API Entreprise
  version: v3
paths:
  "/v3/acoss/attestations_sociales/{siren}":
    get:
      summary: Récupération de l'attestation sociale d'une entreprise
      tags:
      - Attestations sociales et fiscales
      parameters:
      - name: context
        in: query
        schema:
          type: string
      - name: recipient
        in: query
        schema:
          type: string
      - name: object
        in: query
        schema:
          type: string
      - name: siren
        in: path
        required: true
        schema:
          type: string
      security:
      - jwt_bearer_token: []
      description: Le jeton ne possède pas les droits nécessaires
      responses:
        '403':
          description: Accès interdit
        '200':
          description: Entreprise found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '511101651'
                      type:
                        type: string
                        example: document
                        enum:
                        - document
                      attributes:
                        type: object
                        properties:
                          document_url:
                            type: string
                            example: https://storage.entreprise.api.gouv.fr/siade/1569139162-b99824d9c764aae19a862a0af-attestation_vigilance_acoss.pdf
                            description: Lien vers l'attestation de vigilance ACOSS.
                              Ce document est automatiquement supprimé au bout de
                              3 mois.
                        required:
                        - document_url
                    required:
                    - id
                    - type
                    - attributes
                required:
                - data
        '404':
          description: Entreprise non trouvée
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/NotFound"
  "/v3/mi/associations/{id}":
    get:
      summary: Récupération d'une association
      tags:
      - Informations générales
      parameters:
      - name: context
        in: query
        schema:
          type: string
      - name: recipient
        in: query
        schema:
          type: string
      - name: object
        in: query
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - jwt_bearer_token: []
      description: Le jeton ne possède pas les droits nécessaires
      responses:
        '403':
          description: Accès interdit
        '200':
          description: Association found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: W751227325
                        description: Débutant par W et composé de 9 chiffres, il s'agit
                          du numéro RNA, identifiant national de l'association. Ce
                          numéro est attribué automatiquement lors de la déclaration
                          de création d’une association. Une association ne disposant
                          pas d’un numéro RNA s’en voit attribuer un à chaque modification
                          effectuée auprès des services de l’État (modification de
                          statuts ou des dirigeants de l’associations). Le numéro
                          figure alors sur le récépissé délivré par la préfecture.ID
                          RNA ou Siret demandé
                      attributes:
                        type: object
                        properties:
                          titre:
                            type: string
                            example: LA PRÉVENTION ROUTIERE
                          objet:
                            type: string
                            example: Accroitre la sécurité des usagers en encourageant
                              toutes mesures ou initiatives propres à réduire les
                              accidents
                            description: Il s'agit d'une description courte mais exhaustive
                              des activités de l'organisme.
                          siret:
                            type: string
                            nullable: true
                            example:
                          siret_siege_social:
                            type: string
                            example: '77571979202650'
                          date_creation:
                            type: string
                            example: '1955-01-01'
                            description: Il s'agit du jour de dépôt du dossier de
                              création de l'association à la Préfecture.
                          date_declaration:
                            type: string
                            example: '1955-01-01'
                            description: Jour de la dernière déclaration faîte par
                              l'association.
                          date_publication:
                            type: string
                            nullable: true
                            example:
                            description: Jour de la publication au journal officiel
                              de l'avis de création de l'association. Toutes les assoiations
                              ne sont pas forcément 'déclarées'. La publication au
                              Journal Officiel permet à l'association de devenir une
                              personne morale, a contrario des 'associations de fait',
                              non déclarées au JO.
                          date_dissolution:
                            type: string
                            nullable: true
                            example:
                            description: Si l'association est dissolue, ce champ indique
                              la date de dissolution, autrement, il est indiqué 'null'.
                          adresse_siege:
                            type: object
                            properties:
                              complement:
                                type: string
                                example: "  "
                              numero_voie:
                                type: string
                                example: '33'
                              type_voie:
                                type: string
                                example: rue
                              libelle_voie:
                                type: string
                                example: de Modagor
                              distribution:
                                type: string
                                nullable: true
                                example:
                              code_insee:
                                type: string
                                example: '75108'
                              code_postal:
                                type: string
                                example: '75009'
                              commune:
                                type: string
                                example: Paris
                          etat:
                            type: string
                            example: 'true'
                          groupement:
                            type: string
                            nullable: true
                            example:
                            description: 'Trois modalités possibles : si l''association
                              n''est pas un groupement, il est indiqué ''Simple''
                              ; si l''association est un groupement, la valeur est
                              ''Union'' ou ''Fédération''. La valeur peut aussi être
                              manquante (nil).'
                          mise_a_jour:
                            type: string
                            example: '1955-01-01'
  "/v3/probtp/attestations_cotisation_retraite/{siret}":
    get:
      summary: Récupération d'une attestation
      tags:
      - Attestations sociales et fiscales
      parameters:
      - name: context
        in: query
        schema:
          type: string
      - name: recipient
        in: query
        schema:
          type: string
      - name: object
        in: query
        schema:
          type: string
      - name: siret
        in: path
        required: true
        schema:
          type: string
      security:
      - jwt_bearer_token: []
      description: Le jeton ne possède pas les droits nécessaires
      responses:
        '403':
          description: Accès interdit
        '200':
          description: Attestation found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '34909797200021'
                      type:
                        type: string
                        example: document
                        enum:
                        - document
                      attributes:
                        type: object
                        properties:
                          document_url:
                            type: string
                            example: https://storage.entreprise.api.gouv.fr/siade/1569139162-b99824d9c764aae19a862a0af-attestation_cotisation_retraite_probtp.pdf
                            description: Lien vers l'attestation ProBtp. Ce document
                              est automatiquement supprimé au bout de 3 mois.
                        required:
                        - document_url
                    required:
                    - id
                    - type
                    - attributes
                required:
                - data
        '404':
          description: Attestation non trouvée
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/NotFound"
  "/v3/rnm/entreprises/{siren}":
    get:
      summary: Récupération des informations d'une entreprise artisanale
      tags:
      - Informations générales
      parameters:
      - name: context
        in: query
        schema:
          type: string
      - name: recipient
        in: query
        schema:
          type: string
      - name: object
        in: query
        schema:
          type: string
      - name: siren
        in: path
        required: true
        schema:
          type: string
      security:
      - jwt_bearer_token: []
      description: Le jeton ne possède pas les droits nécessaires
      responses:
        '403':
          description: Accès interdit
        '200':
          description: Entreprise found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '301123626'
                      attributes:
                        type: object
                        properties:
                          siren:
                            type: string
                            example: '301123626'
                            description: Siren de l'entreprise
                          modalite_exercice:
                            type: string
                            example: P
                            description: "Détermine si l'entreprise a une activité
                              permanente ou saisonnière.\n                      \n\n
                              \                     L'activité est dite saisonnière
                              si chaque année, l'entreprise cesse totalement ses activités
                              pendant plus de 3 mois consécutifs.\n                      \n\n
                              \                     \n\n                      Les
                              valeurs possibles sont:\n                      \n\n
                              \                     - P => Permanent\n                      \n\n
                              \                     - S => Saisonnière\n                      \n\n
                              \                     - NR => Non renseignée"
                            enum:
                            - P
                            - S
                            - NR
                          non_sedentaire:
                            type: string
                            example: '0'
                            description: "Indique si l'entreprise a une activité ambulante.\n
                              \                       \n\n                        \n\n
                              \                       Les valeurs possibles sont:\n
                              \                       \n\n                        -
                              0 => sédentaire\n                        \n\n                        -
                              1 => non-sédentaire"
                            enum:
                            - '0'
                            - '1'
                        required:
                        - siren
                        - modalite_exercice
                        - non_sedentaire
                      relationships:
                        type: object
                        properties:
                          adresse:
                            type: object
                            properties:
                              data:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: '301123626'
                                  type:
                                    type: string
                                    enum:
                                    - adresse
                                    example: adresse
                              links:
                                type: object
                                properties:
                                  related:
                                    type: string
                                    example: https://entreprises.api.gouv.fr/api/v3/insee/adresse/301123626
                    required:
                    - id
                required:
                - data
        '404':
          description: Entreprise non trouvée
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/NotFound"
servers:
- url: https://entreprise.api.gouv.fr
  description: Environnement de production
- url: https://staging.entreprise.api.gouv.fr
  description: Environnement de staging
components:
  schemas:
    NotFound:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: Resource not found
              detail:
                type: string
                example: Le siret ou siren indiqué n'existe pas, n'est pas connu ou
                  ne comporte aucune information pour cet appel
            required:
            - title
            - detail
      required:
      - errors
  securitySchemes:
    jwt_bearer_token:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token
