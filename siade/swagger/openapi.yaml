      responses:
        '403':
          description: Accès interdit
        '200':
          description: Entreprise found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '301123626'
                      attributes:
                        type: object
                        properties:
                          siren:
                            type: string
                            example: '301123626'
                            description: Siren de l'entreprise
                          modalite_exercice:
                            type: string
                            example: P
                            description: "Détermine si l'entreprise a une activité
                              permanente ou saisonnière.\n                      \n\n
                              \                     L'activité est dite saisonnière
                              si chaque année, l'entreprise cesse totalement ses activités
                              pendant plus de 3 mois consécutifs.\n                      \n\n
                              \                     \n\n                      Les
                              valeurs possibles sont:\n                      \n\n
                              \                     - P => Permanent\n                      \n\n
                              \                     - S => Saisonnière\n                      \n\n
                              \                     - NR => Non renseignée"
                            enum:
                            - P
                            - S
                            - NR
                          non_sedentaire:
                            type: string
                            example: '0'
                            description: "Indique si l'entreprise a une activité ambulante.\n
                              \                       \n\n                        \n\n
                              \                       Les valeurs possibles sont:\n
                              \                       \n\n                        -
                              0 => sédentaire\n                        \n\n                        -
                              1 => non-sédentaire"
                            enum:
                            - '0'
                            - '1'
                        required:
                        - siren
                        - modalite_exercice
                        - non_sedentaire
                      relationships:
                        type: object
                        properties:
                          adresse:
                            type: object
                            properties:
                              data:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: '301123626'
                                  type:
