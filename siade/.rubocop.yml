inherit_from: .rubocop_todo.yml

require:
  - rubocop-rspec
  - rubocop-rails

AllCops:
  NewCops: enable
  Exclude:
    - "Gemfile"
    - "Guardfile"
    - "Rakefile"
    - "bin/**/*"
    - "db/**/*"
    - "config/**/*"
    - "vendor/**/*"
    - "app/controllers/api/v2/**/*"
    - "lib/siade/v2/**/*"
    - "spec/lib/siade/v2/**/*"
    - "lib/siade/v3/**/*"
    - "spec/lib/siade/v3/**/*"

Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Layout/SpaceInsideHashLiteralBraces:
  EnforcedStyle: space

Lint/UnreachableCode:
  Exclude:
    - "app/concepts/**/*"

Metrics/BlockLength:
  Exclude:
    - "spec/spec_helper.rb"
    - "spec/support/shared_examples/*"
    - "spec/factories/**/*"
  IgnoredMethods:
    - "describe"
    - "context"
    - "namespace"
    - "shared_examples"
    - "let"
    - "path"
    - "get"
    - "response"

Layout/LineLength:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Naming/MethodParameterName:
  AllowedNames:
    - "_"
    - "nb"

Naming/VariableNumber:
  EnforcedStyle: snake_case

Style/AsciiComments:
  Enabled: false

Style/BlockComments:
  Exclude:
    - "spec/spec_helper.rb"

Style/ClassAndModuleChildren:
  EnforcedStyle: compact
  Exclude:
    - "app/channels/**/*"
    - "app/concepts/**/*"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/MethodCalledOnDoEndBlock:
  Enabled: false

# Do not force use of fail or raise only both have their use
Style/SignalException:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

# No line between definitions is OK for oneliners
Layout/EmptyLineBetweenDefs:
  AllowAdjacentOneLineDefs: true

# Necessary to use NotImplementedError
Lint/InheritException:
  Enabled: false

# Can't agree on this rule so we disable
Style/MethodCallWithArgsParentheses:
  Enabled: false

# Allowing uppercase in some method names
Naming/MethodName:
  IgnoredPatterns:
    - starts_with_FR?

# False positive with RSwag
RSpec/EmptyExampleGroup:
  Exclude:
    - "spec/requests/**/*"

# Not relevant for RSwag
RSpec/DescribeClass:
  Exclude:
    - "spec/requests/**/*"
    - "spec/acceptances/**/*"
