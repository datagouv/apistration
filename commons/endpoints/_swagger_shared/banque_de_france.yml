banque_de_france:
  bilans_entreprise:
    title: "3 derniers bilans annuels"
    description: "Obtenir les trois derniers bilans d’une entreprise détenus par la Banque de France."
    cache_duration: "Le cache est valide jusqu'à la fin de la journée."
    tags:
      - "Informations financières"
    attributes:
      annee:
        title: "Année du bilan"
        type: 'string'
        example: '2020'
      date_arrete_exercice:
        title: "Date d’arrêté de l’exercice"
        description: "Le format est YYYY-MM, le jour du mois n'est pas renseigné."
        type: 'string'
        example: '202012'
      valeurs_calculees:
        type: 'array'
        items:
          type: 'object'
          additionalProperties: false
          properties:
            disponibilites:
              type: 'object'
              additionalProperties: false
              title: "Disponibilités"
              description: "Correspond aux disponibilités présentés à l'actif du bilan diminués des provisions constatées sur ce poste.
                \n
                Les disponibilités font référence à toutes les formes de trésorerie dont l'entreprise est capable de disposer instantanément, il s'agit de l'actif liquide de l'entreprise.
                \n
                Les disponibilités peuvent servir à financer le besoin en fonds de roulement d'exploitation."
              properties:
                valeur: &valeur_euros
                  title: "Valeur en euros"
                  type: 'string'
                  example: '9001'
                evolution: &evolution_attribute
                  title: "Évolution en pourcentage"
                  type: 'number'
                  example: 12.34
                  nullable: true
            total_dettes_stables:
              type: 'object'
              additionalProperties: false
              title: "Total des dettes stables"
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            valeur_ajoutee_bdf:
              type: 'object'
              additionalProperties: false
              title: "Valeur ajoutée"
              description: "La valeur ajoutée est un solde intermédiaire de gestion issu du compte de résultat définie comme tel : il correspond à la différence entre la valeur finale de la production (valorisée par le chiffre d'affaires) et la valeur des biens qui ont été consommés par le processus de production (consommations intermédiaires, comme les matières premières)."
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            besoin_en_fonds_de_roulement:
              type: 'object'
              additionalProperties: false
              title: "Besoin en fonds de roulement"
              description: "Représente le montant nécessaire au financement du cycle d'exploitation qui est né du décalage entre les encaissements (clients) et les décaissements (fournisseurs, salaires et charges sociales) et du portage des stocks avant leur utilisation dans le cycle de production ou de commercialisation."
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            excedent_brut_exploitation:
              type: 'object'
              additionalProperties: false
              title: "Excédent brut d’exploitation"
              description: "Solde intermédiaire de gestion issu du compte de résultat défini comme tel : il correspond principalement à la différence entre la valeur ajoutée augmentée des subventions d'exploitation et diminuées de la charge du personnel et des impôts et taxes.
                \n
                Il mesure la rentabilité d'exploitation brute de l'entreprise"
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            capacite_autofinancement:
              type: 'object'
              additionalProperties: false
              title: "Capacité d’autofinancement"
              description: "Correspond à la somme du résultat net et des charges non décaissables diminuées des produits non encaissables (les éléments non décaissables et non encaissables correspondent essentiellement aux dotations nettes aux amortissements et aux provisions).
                \n
La capacité d'autofinancement représente l'essentiel du flux de trésorerie d'exploitation généré par l'entreprise. Elle contribue au financement des dépenses autres que celles enregistrées dans le compte de résultat (dividendes, investissements, remboursement emprunts etc...)"
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            fonds_roulement_net_global:
              type: 'object'
              additionalProperties: false
              title: "Fonds de roulement net global"
              description: "Correspond à la part des capitaux permanents non absorbée par le financement des valeurs immobilisées et qui est disponible pour le financement des besoins lié au cycle d'exploitation (besoins en fonds de roulement)
(1) Capitaux permanents = capitaux propres + autres fonds propres + prov. pour risques et charges + total dettes financieres - dettes financières CT à l'origine (concours bancaires courants et soldes créditeurs de banque notamment)"
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
            ratio_fonds_roulement_net_global_sur_besoin_en_fonds_de_roulement:
              type: 'object'
              additionalProperties: false
              title: "Ratio fonds de roulement net global sur besoin en fonds de roulement"
              properties:
                valeur: &valeur_percent
                  title: "Valeur en pourcentage"
                  type: 'number'
                  example: 23.45
                evolution: *evolution_attribute
            dettes4_maturite_a_un_an_au_plus:
              type: 'object'
              additionalProperties: false
              title: "Dettes à maturité à un an au plus"
              description: "Correspond à la somme des références fiscales 2057VG2 et 2057VH2"
              properties:
                valeur: *valeur_euros
                evolution: *evolution_attribute
      declarations:
        type: 'array'
        items:
          type: 'object'
          additionalProperties: false
          required:
            - numero_imprime
            - donnees
          properties:
            numero_imprime:
              title: "Numéro d'imprimé"
              type: 'string'
              description: "Numéro du formulaire de la liasse fiscale souscrit par unité légale."
              example: "2051"
            donnees:
              type: 'array'
              items:
                type: 'object'
                additionalProperties: false
                title: "Données de l'imprimé"
                description: "Chaque entrée du tableau correspondant à couple code / valeur, spécifique au numéro d'imprimé référencé à la clé `numero_imprime`"
                required:
                  - 'code_nref'
                  - 'valeurs'
                  - 'evolution'
                properties:
                  code:
                    title: 'Code'
                    type: 'string'
                    description: "Code permettant d'identifier la donnée, constitué de 2 lettres de AA à ZZ (cf. Code EDI)"
                    example: 'GR'
                  code_EDI:
                    title: 'Code EDI'
                    type: 'string'
                    description: "Le code EDI est utilisé lorsque la liasses fiscale a été souscrite via la filière EDI/TDFC. Il permet l’échange des données de nature comptable et/ou fiscale avec la norme EDIFACT entre la DGFIP et les utilisateurs des téléprocédures EDI "
                    example: 'GR:C889:7111:1:TBX'
                  evolution:
                    title: "Évolution de la donnée"
                    type: 'number'
                    example: 4.56
                    nullable: true
                  code_absolu:
                    title: 'Code absolu'
                    type: 'string'
                    description: 'Ce code interne à la DGFIP identifie une seule donnée sur un seul formulaire'
                    example: '2006744'
                  code_type_donnee:
                    title: 'Code Type Donnée'
                    description: 'Ce code détermine la nature de la donnée, le nombre et type des caractères qu’elle peut contenir'
                    type: 'string'
                    example: 'CCI'
                  intitule:
                    title: 'Intitulé'
                    description: 'Intitulé de la donnée. Désigne une donnée correspondant à une case à cocher présente en haut de certains
  tableaux de la liasse fiscale'
                    type: 'string'
                    example: 'Déposé néant'
                  code_nref:
                    title: "A un code N-REF correspond un code absolu pour les liasses fiscales. Ces deux codes désignent une seule donnée présente sur un seul formulaire"
                    type: 'string'
                    example: '304651'
                  valeurs:
                    title: "Valeurs associés à l'entrée"
                    description: "Si une entrée de l'imprimé est répétable, le tableau contient plusieurs entrées et sont ordonnées en fonction de l'indice de répétition."
                    type: "array"
                    minItems: 1
                    items:
                      type: 'string'
                    example:
                      - '4245'
    meta:
      count:
        title: "Nombre de bilans"
        type: 'integer'
        example: 1
