---
fiche:
  - uid: 'qualifelec/certificats'
    path: '/v3/qualifelec/etablissements/{siret}/certificats'
    ping_url: 'https://entreprise.api.gouv.fr/ping/qualifelec/certificats'
    position: 350
    perimeter:
      entity_type_description: |+
        ✅ Toutes les **entreprises du génie électrique et énergétique** ayant obtenu une certification par [Qualifelec](https://www.qualifelec.fr/){:target="_blank"}. Toutes les certifications sont concernées : RGE ou non, accréditées ou non, probatoire ou classique.

        Cela représente environ 5000 établissements.
      geographical_scope_description:  |+
        - ✅ France métropolitaine
        - ✅ DROM COM
      updating_rules_description: |+
        Les données sont **mises à jour en temps réel**, l'API étant directement reliée au système d'information de Qualifelec.
      entities:
        - entreprises
    # Texte libre
    call_id: "SIRET"
    # La liste des clés disponible est stockée dans la locale `provider_uids` du fichier provider_uids.fr.yml
    provider_uids:
      - 'qualifelec'
    keywords:
      - 'qualifelec'
      - 'certificat'
      - 'capacite'
      - 'habilitation'
      - 'rge'
      - 'reconnu garant environnement'
      - 'energie'
      - 'electricite'
      - 'assurance'
      - 'decennale'
      - 'responsabilite civile'
      - 'mention'
      - 'classification'
      - 'qualification'
      - 'indice'
      - 'effectif'
    data:
      description: |+
        Cette API permet d'obtenir **la liste des certificats Qualifelec valides** obtenus par l'établissement. Tous les types de certificats Qualifelec sont disponibles, [y compris ceux non labellisés RGE](#difference-api-rge). Pour chaque certificat, l'API délivre les données suivantes :
        - **informations relatives au certificat** : numéro, dates de validité ;
        - **informations sur la qualification obtenue** : labellisée RGE ou non, libellé, dates de validité, indices, mentions, domaines et la classification qui donne l'effectif du personnel d'execution et d'encadrement disponible pour cette qualification ;
        - **assurances décennale et de responsabilité civile** ;
        - l'url de téléchargement du certificat au **format PDF**.

        {:.fr-h6 .fr-mt-4w}
        ### Exemple de certificat PDF&nbsp;:

        <div class="fr-download">
         <p>
          <a href="/files/exemple-certificat-qualifelec.pdf" download class="fr-download__link">
           Télécharger un exemple de certificat Qualifelec
           <span class="fr-download__detail">
           PDF – 756 Ko
           </span>
          </a>
         </p>
        </div>
    opening: public
    parameters:
      - Numéro de SIRET de l'établissement
    format:
      - Donnée structurée JSON et URL vers le certificat en PDF
    faq:
      - q: <a name="difference-api-rge"></a>Périmètre de cette API par rapport à l'API Certification RGE de l'Ademe
        a: |+
          L'[API Certification RGE](<%= endpoint_path(uid: 'ademe/certifications_rge') %>) délivre également des certificats Qualifelec. Cependant, elle ne couvre que les certifications Qualifelec labellisées RGE et ne vous permet donc pas d'accéder à la totalité des certificats Qualifelec.
    swagger:
      qualifelec:
        certificats:
          title: Certification Qualifelec
          description: "Certification délivrée par Qualifelec, attestant des qualifications d'une entreprise dans le génie électrique et énergétique."
          tags:
            - "Certifications professionnelles"
          parameters:
            siret:
              type: string
              description: "Siret de l'entreprise dont vous souhaitez obtenir la certification et les qualifications."
              example: "12345678901234"
              required: true
          meta:
            total:
              title: "Total"
              description: "Nombre de résultats (certificats) totaux"
              type: "number"
              example: 8
          attributes:
            document_url:
              title: "URL de téléchargement du certificat Qualifelec"
              type: string
              description: "Ce lien délivre le certificat Qualifelec de l'entreprise au format PDF tel qu'accessible depuis le site https://www.qualifelec.fr/."
              example: "https://raw.githubusercontent.com/datagouv/apistration/refs/heads/develop/mocks/payloads/api_entreprise_v3_qualifelec_certificats/exemple-certificat-qualifelec-bac-a-sable.jpg"
            numero:
              title: 'Numéro du certificat'
              type: "number"
              description: "Le numéro d'attribution du certificat"
              example: 5430
            rge:
              title: "Label RGE de l'entreprise"
              type: boolean
              description: "Indique si l'entreprise est également labellisée RGE, soit \"Reconnu Garant de l'Environnement\". Ce label concerne les entreprises spécialisées dans les travaux d'efficacité énergétique en rénovation et l'installation d'équipements utilisant des énergies renouvelables."
              example: true
            date_debut:
              title: 'Date de début du certificat'
              type: string
              format: date
              description: "Date de début de validité du certificat"
              example: '2019-01-01'
            date_fin:
              title: 'Date de fin du certificat'
              type: string
              format: date
              description: "Date de fin de validité du certificat"
              example: '2021-12-31'
            qualification:
              title: "Informations détaillées de la qualification"
              type: object
              properties:
                label:
                  title: 'Libellé de la qualification'
                  type: string
                  description: "Libellé de la qualification"
                  example: "Installations Électriques Logement Commerce Petit Tertiaire - LCPT"
                date_debut:
                  title: 'Date de début de la qualification'
                  type: string
                  format: date
                  description: "Date de début de validité de la qualification"
                  example: '2019-01-01'
                date_fin:
                  title: 'Date de fin de la qualification'
                  type: string
                  format: date
                  description: "Date de fin de validité de la qualification. La durée d'une qualification est de 4 ans. Cette durée est réduite à 2 années pour les qualifications probatoires."            
                  example: '2024-12-31'
                indices:
                  title: "Indices"
                  description: "Ces indices précisent le type et le volume du marché, la puissance ou le rendement d'un équipement et une technicité spécifique. Une qualification peut être accompagnée de plusieurs indices."
                  type: array
                  minItems: 1
                  items:
                    title: "Codes et libéllés des indices de la qualification"
                    type: object
                    properties: 
                      code: 
                        title: "Code de l'indice"
                        type: string
                        description: "Code de l'indice associé à la qualification."
                        example: "IRVE1"
                      label: 
                        title: "Libellé de l'indice"
                        type: string
                        description: "Indice de la qualification."
                        example: "IRVE – indice 1 (station de recharge – puissance maximale appelable inférieure ou égale à 36 kVA)"
                mentions:
                  title: "mentions"
                  description: "La mention valorise un complément d’activité associé à la qualification. Une qualification peut être accompagnée d'une ou plusieurs mentions."
                  type: array
                  minItems: 1
                  items:
                    title: "Codes et libéllés des mentions de la qualification"
                    type: object
                    properties: 
                      code: 
                        title: "Code de la mention"
                        type: string
                        description: "Code de la mention associé à la qualification."
                        example: "PRGE"
                      label: 
                        title: "Libellé de la mention"
                        type: string
                        description: "Libellé de la mention de la qualification."
                        example: "Probatoire Reconnu Garant de l’Environnement"
                domaines:
                  title: "Domaines"
                  description: "Le domaine correspond à une activité particulière au sein de l'activité principale de la qualification. Une qualification peut être accompagnée de plusieurs domaines."
                  type: array
                  items:
                    title: "Codes et libéllés des domaines de la qualification"
                    type: object
                    properties: 
                      code: 
                        title: "Code du domaine"
                        type: string
                        description: "Code du domaine associé à la qualification."
                        example: "SU"
                      label: 
                        title: "Libellé du domaine"
                        type: string
                        description: "Libellé du domaine de la qualification."
                        example: "Sûreté"
                classification: 
                  title: "Classification de la qualification"
                  description: "La classification indique les moyens humains possédés par l'entreprise pour réaliser les travaux liées à la qualification. Elle précise l'effectif du personnel d'exécution et d'encadrement permanent de l'entreprise. Ce champ peut être nul dans le cas où la qualification est une qualification probatoire."
                  type: object
                  properties: 
                    code: 
                      title: "Code de la classification"
                      type: integer
                      description: "Code de la classification associé à la qualification."
                      example: "1"
                      nullable: true
                    label: 
                      title: "Libellé de la classification"
                      type: string
                      description: "Libellé de la classification de la qualification."
                      example: "Classe 1 - de 1 à 3 exécutants"
                      nullable: true
            assurance_decennale: 
              title: "Assurance décennale vérifiée au moment de l'édition du certificat"
              type: object
              properties:
                nom:
                  title: "Nom de l'assurance décennale"
                  type: string
                  description: "Avant de délivrer le certificat, Qualifelec demande à l'entreprise son attestation d'assurance décennale. Ce justificatif est redemandé chaque année lors de la mise à jour du dossier annuel qui permet la génération du certificat annuel. Pour certaines activités, l'assurance décennale n'est pas obligatoire."
                  example: "AXA"
                date_debut:
                  title: "Date de début de validité"
                  type: string
                  format: date
                  description: "Date de début de validité de l’attestation d’assurance décennale"
                  nullable: true
                  example: '2024-01-31'
                date_fin:
                  title: "Date de fin de validité"
                  type: string
                  format: date
                  description: "Date de fin de validité de l’attestation d’assurance décennale"
                  nullable: true
                  example: '2024-12-31'
            assurance_civile:
              title: "Assurance civile vérifiée au moment de l'édition du certificat"
              description: "Avant de délivrer le certificat, Qualifelec demande à l'entreprise son attestation d'assurance responsabilité civile. Ce justificatif est redemandé chaque année lors de la mise à jour du dossier annuel qui permet la génération du certificat annuel."
              type: object
              properties:
                nom:
                  title: "Assurance responsabilité civile"
                  type: string
                  description: "nom de l’assurance responsabilité civile"
                  example: "HISCOX"
                date_debut:
                  title: "Date de début de validité"
                  type: string
                  format: date
                  description: "Date de début de validité de l’attestation d’assurance responsabilité civile"
                  nullable: true
                  example: '2024-01-31'
                date_fin:
                  title: "Date de fin de validité"
                  type: string
                  format: date
                  description: "Date de fin de validité de l’attestation d’assurance responsabilité civile"
                  nullable: true
                  example: '2024-12-31'
