              title: "Résultats de la vérification d'identité"
              type: "object"
              description: "Résultats de la comparaison entre l'identité FranceConnect et l'identité du demandeur d'immatriculation. A noter que la validation demande exclusivement une correspondance sur le nom de famille et le prénom. La correspondance sur la date de naissance n'est pas prise en compte dans cette validation mais est fournie à titre informatif."
              properties:
                family_name:
