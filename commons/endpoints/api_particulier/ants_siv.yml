                given_name:
                  title: "Prénom correspond"
                  type: "number"
                  format: "float"
                  description: "Indique si le prénom correspond entre FranceConnect et l'identité ANTS."
                  example: 1.0
                birth_date:
                  title: "Date de naissance correspond"
                  type: "number"
                  format: "float"
                  description: "Indique si la date de naissance correspond entre FranceConnect et l'identité ANTS."
                  example: 0.0
                overall_match:
