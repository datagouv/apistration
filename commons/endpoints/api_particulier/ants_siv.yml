                - date_premiere_immatriculation
                - statut_location
              properties:
                numero_immatriculation:
                  title: "Numéro d'immatriculation"
                  type: "string"
                  description: "Le numéro d'immatriculation du véhicule."
                  example: "AA-123-BB"
                date_premiere_immatriculation:
                  title: "Date de première immatriculation"
                  type: "string"
                  description: "La date de la première immatriculation du véhicule."
                  example: "2024-01-15"
                statut_location:
                  title: "Statut de location"
                  type: "object"
                  description: "Le statut de location du véhicule, si applicable. Les codes LLD, LCB, LCL correspondent à une location longue durée."
                  required:
                    - code
                    - label
                  properties:
