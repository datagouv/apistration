mesri:
  commons:
    title: Statut étudiant
    description: Admissions et inscriptions d'un étudiant aux établissements d'enseignement supérieur.
    tags:
      - Statut étudiant

    identity_attributes: &identity_attributes
      identite:
        title: Données d'identité de l'étudiant
        description: "Données d'identité de l'étudiant corrigées et certifiées via l'API Ines qui croise l'état civil et le numéro INE de l'étudiant."
        type: object
        properties: 
          nom_naissance:
            title: Nom de naissance
            type: string
            description: |+
              Nom de naissance de l'étudiant. Il s'agit du nom de famille tel qu'indiqué sur l'acte de naissance, de mariage, sur le livret de famille, etc. Ce nom figure toujours sur la pièce d'identité en premier, avant le nom d'usage si le particulier en a un. 
        
              En cas de changement de nom de naissance, une mention avec le nouveau nom de famille est inscrite sur l'acte de naissance.
            example: Moustaki
          prenom:
            title: Prénom
            type: string
            description: Prénom de l'étudiant.
            example: Georges
          date_naissance:
            title: Date de naissance
            type: string
            format: date
            description: Date de naissance de l'étudiant.
            example: 1992-11-29
    attributes_without_identity: &attributes_without_identity
      admissions:
        title: Liste des admissions de l'étudiant dans les établissements
        description: |+
          Liste des admissions de l'étudiant dans un ou plusieurs établissements d'enseignement supérieur pour l'année en cours. 

          Chaque objet listé correspond à un établissement dans lequel l'étudiant est au minimum admis. C'est-à-dire que l'étudiant est au minimum pré-inscrit dans l'établissement.
          
          Si l'étudiant est inscrit dans l'établissement (procédure complète et règlement des droits d'inscription terminés), la clé est_inscrit sera alors à true pour l'objet concerné.
        type: array
        items:
          type: object
          properties:
            date_debut:
              title: Date de début de période d'études
              type: string
              format: date
              description: Date de début de la période d'études dans l'établissement.
              example: 2022-09-01
            date_fin:
              title: Date de fin de période d'études
              type: string
              format: date
              description: Date de fin de la période d'étude dans l'établissement.
              example: 2023-08-31
            est_inscrit:
              title: Est inscrit
              type: boolean
              example: true
              enum:
              - true
              - false
              description: |
                Indique que l'étudiant est inscrit dans l'établissement.
                
                Si le champ est à false, c'est que l'étudiant n'est pas inscrit, mais seulement admis dans l'établissement. C'est-à-dire que l'étudiant est pré-inscrit dans l'établissement mais que la procédure complète d'inscription et le règlement des droits d'inscription ne sont pas terminés. Les étudiants admis deviennent inscrits, une fois leurs droits d'inscription régularisés (paiement des droits, premier versement des droits ou acquittement des droits selon la situation de l'étudiant et les règles de l'établissement.). Tous les étudiants admis ne seront pas forcément de futurs étudiants inscrits dans l'établissement.
            regime_formation:
              title: Régime de formation
              description: |+
                Régime de formation de l'étudiant. La liste des régimes possibles est la suivante : 
                  - RF1 : formation initiale
                  - RF2 : formation initiale hors apprentissage
                  - RF3 : reprise d'études non financée sans convention
                  - RF4 : contrat d'apprentissage
                  - RF5 : formation continue
                  - RF6 : formation continue hors contrat professionnel
                  - RF7 : contrat de professionnalisation
              type: object
              properties:
                libelle:
                  title: Libellé
                  type: string
                  description: |
                    Libellé de la formation de l'étudiant.
                  example: formation initiale
                  enum:
                    - formation initiale
                    - formation initiale hors apprentissage
                    - reprise d'études non financée sans convention
                    - contrat d'apprentissage
                    - formation continue
                    - formation continue hors contrat professionnel
                    - contrat de professionnalisation
                code:
                  title: Code
                  type: string
                  description: |
                    Code de la formation correspondant au régime. C'est un code technique pour exploiter différents mécanismes indépendament du label du régime.
                  example: RF1
                  enum:
                    - RF1
                    - RF2
                    - RF3
                    - RF4
                    - RF5
                    - RF6
                    - RF7
            code_cog_insee_commune:
              title: COG de la commune de l'établissement d'études
              type: string
              description: Code officiel géographique (COG) de la commune de l'établissement d'études de l'étudiant.
              example: '29085'
            etablissement_etudes:
              title: Établissement d'études
              description: |+
                Code UAI et libellé de l'établissement d'enseignement supérieur dans lequel l'étudiant est admis. 
              
                Pour retrouver d'autres informations sur l'établissement, vous pouvez utiliser l'[API "Annuaire de l'éducation nationale"](https://api.gouv.fr/les-api/api-annuaire-education) ou le site https://annuaire-education.fr.
              type: object
              properties:
                uai:
                  title: Code UAI
                  type: string
                  description: |+
                    Code d'unité administrative immatriculée (code UAI) de l'établissement où est scolarisé l'élève. Ce code unique inscrit au répertoire national des établissements est composé de 7 chiffres et d'une lettre ; les trois premiers chiffres correspondent au numéro de département de l'établissement.
                  pattern: '^\d{7}\w$'
                  example: 0011402U
                nom:
                  title: Appelation officielle
                  type: string
                  description: Appelation officielle de l'établissement associée au code UAI.
                  example: EGC AIN BOURG EN BRESSE EC GESTION ET COMMERCE (01000)
    attributes: 
      <<: [*identity_attributes, *attributes_without_identity]
  statut_etudiant:
    parameters:
      ine: 
        title: INE
        description: Identifiant National Étudiant (INE). Cet identifiant est unique
          à chaque étudiant sur le territoire français. Il est composé de 11 caractères,
          10 chiffres et 1 lettre, et depuis la rentrée 2018, 9 chiffres et 2 lettres.
          Les étudiants peuvent retrouver leur numéro INE sur leur carte étudiant
          et leur certificat de scolarité.
        pattern: "^[0-9a-zA-Z]{11}$"
        example: 1234567890G

