  statut_etudiant: 
    <<: *commons
    prenoms:
      <<: *prenoms
      description: |-
        **Liste des prénoms**. 
        
        Dans le cadre de cette API, il n'est possible de fournir qu'un seul prenom.
      maxItems: 1
