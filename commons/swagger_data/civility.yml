civility: 
  commons: &commons
    nomNaissance: &nomNaissance
      type: "string"
      description: |-
        **Nom de naissance, également appelé nom de famille**. 
        
        Le nom de naissance est indiqué sur l'acte de naissance, de mariage, sur le livret de famille, etc. Le nom de famille/naissance figure toujours sur la pièce d'identité en premier, avant le nom d'usage si le particulier en a un. 
        
        En cas de changement de nom de naissance, une mention avec le nouveau nom de famille est inscrite sur l'acte de naissance. Pour appeler l'API, le nom de naissance/famille nécessaire est bien le nom de famille modifié.
      example: "DURANT"
    nomUsage: &nomUsage
      type: "string"
      description: |-
        **Nom d'usage**. 
        
        Si le particulier a un nom d'usage, c'est le nom qu'il utilise généralement au quotidien. Le nom d'usage est facultatif et peut changer au cours de la vie. Il correspond au nom de famille/naissance d'un parent, d'un époux ou d'une épouse, seul ou accolé au nom de famille/naissance. Par exemple, le nom d'usage ne peut pas être le nom de famille/naissance d'un concubin ou d'un partenaire de pacs. 
        
        Si le particulier en a fait la demande, le nom d'usage peut être inscrit derrière le nom de naissance sur la carte d'identité ou le passeport ; il peut également être celui utilisé par l'administration sur les courriers. Le nom d'usage ne remplace pas le nom de famille/naissance qui reste le seul mentionné. 
        Dans nos APIs, le nom d'usage n'est jamais identique au nom de famille.
        
        Pour en savoir plus : https://www.service-public.fr/particuliers/vosdroits/F868.
      example: "DUPONT DURANT"
    prenoms: &prenoms
      description: |-
        **Liste des prénoms**. 
        
        Fournir plusieurs prénoms maximise les chances que l'API retrouve le particulier car cela permet de limiter le risque d’homonymie.
      type: "array"
      minItems: 1
      maxItems: 3
      example: ['PIERRE', 'RICHARD']
    anneeDateNaissance: &anneeDateNaissance
      description: |-
        **Année de naissance**. 
        
        Pour un particulier né en France, dans le cadre d'un appel à l'API avec l'utilisation du paramètre 'nomCommuneNaissance', ce paramètre est obligatoire (ainsi que le paramètre 'codeCogInseeDepartementNaissance') afin de retrouver le code COG de la commune de naissance.
      type: integer
      example: 1990
    moisDateNaissance: &moisDateNaissance
      description: |-
        **Mois de naissance**.
      type: integer
      example: 1
    jourDateNaissance: &jourDateNaissance
      description: |-
        **Jour de naissance**.
      type: integer
      example: 1
    sexeEtatCivil: &sexeEtatCivil
      description: |- 
        **Sexe de la personne tel qu'indiqué sur les actes d'état civil**, comme par exemple l'acte de naissance ou de mariage. 
        
        Dans la majorité des cas, il s'agit également de la mention indiquée sur la pièce d'identité et le passeport. Cette mention peut être masculin ('M') ou féminin ('F'). 
        Dans le cas d'un particulier ayant demandé une modification de sa mention de sexe à l'état civil, le changement est indiqué en marge de l'acte de naissance une fois la décision rendue. Le changement intervient sur les titres d'identité seulement si le particulier en demande le renouvellement.
      type: string
      example: M
      enum:
        - M
        - F
    codeCogInseePaysNaissance: &codeCogInseePaysNaissance
      description: |-
        **Code Insee à 5 chiffres du pays de naissance**.
        
        - Code Insee France = 99100 ;
        - Liste de tous les codes Insee des pays étrangers depuis 1943 : https://explore.data.gouv.fr/fr/datasets/58c984b088ee386cdb1261f3/#/resources/150889d3-ffda-4ea5-8709-6ee67415294f.
      type: string
      minLength: 5
      maxLength: 5
      example: '99100'
    codeCogInseeCommuneNaissance: &codeCogInseeCommuneNaissance
      type: string
      minLength: 5
      maxLength: 5
      example: '08480'
      description: |-
        **Code Insee à 5 chiffres de la commune de naissance**. 
        
        Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre est une des deux options disponibles pour renseigner la commune de naissance. En l'absence de l'utilisation de la seconde option (triplet 'nomCommuneNaissance', 'anneeDateNaissance', 'codeInseeDepartementNaissance').

        Ne pas remplir si la personne est née à l'étranger.
    nomCommuneNaissance: &nomCommuneNaissance
      type: string
      minLength: 1
      example: 'Gennevilliers'
      description: |-
        **Nom en toute lettre de la commune de naissance**. 
        
        Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre est une des deux options disponibles pour renseigner la commune de naissance. En l'absence de l'utilisation du 'codeCogInseeCommuneNaissance', ce paramètre est obligatoire si la personne est née en France ; il doit être obligatoirement accompagné des paramètres 'codeCogInseeDepartementNaissance' et 'anneeDateNaissance'.

        Ne pas remplir si la personne est née à l'étranger.
    codeCogInseeDepartementNaissance: &codeCogInseeDepartementNaissance
      type: string
      minLength: 2
      maxLength: 3
      example: '92'
      description: |-
        **Code INSEE du département de naissance**. 
        
        Pour retrouver un particulier né en France, il est nécessaire d'indiquer sa commune de naissance. Ce paramètre fait partie d'une des deux options disponibles pour renseigner la commune de naissance. Lorsque le paramètre 'nomCommuneNaissance' est utilisé, ce paramètre est obligatoire si la personne est née en France et permet de retrouver le code COG avec le paramètre 'anneeDateNaissance'.

        Ne pas remplir si la personne est née à l'étranger.
